function mdToHtml(src) {
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = (t) =>
    t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/_(.+?)_/g, "<em>$1</em>");
  const lines = esc(src || "").split("\n");
  let html = "", inList = false;
  for (const line of lines) {
    const h = line.match(/^(#{1,3})\s+(.*)$/);
    const bullet = line.match(/^\s*[-*]\s+(.*)$/);
    if (bullet) {
      if (!inList) { html += "<ul>"; inList = true; }
      html += "<li>" + inline(bullet[1]) + "</li>";
      continue;
    }
    if (inList) { html += "</ul>"; inList = false; }
    if (h) {
      const lvl = h[1].length + 1;
      html += "<h" + lvl + ">" + inline(h[2]) + "</h" + lvl + ">";
    } else if (line.trim() === "") {
      html += "";
    } else {
      html += "<p>" + inline(line) + "</p>";
    }
  }
  if (inList) html += "</ul>";
  return html || "<p class='nedempty'>Rien à afficher.</p>";
}

function NotesEditor({ value, onChange, rows = 5, placeholder, variant = "note" }) {
  const [preview, setPreview] = useState(!!(value && String(value).trim()));
  const ref = useRef(null);
  const val = value || "";
  const wrapInline = (before, after) => {
    const el = ref.current;
    if (!el) { onChange(val + before + after); return; }
    const s = el.selectionStart, e = el.selectionEnd;
    const sel = val.slice(s, e) || "texte";
    onChange(val.slice(0, s) + before + sel + after + val.slice(e));
  };
  const prefixLines = (pfx) => {
    const el = ref.current;
    const s = el ? el.selectionStart : val.length;
    const e = el ? el.selectionEnd : val.length;
    const lineStart = val.lastIndexOf("\n", s - 1) + 1;
    const seg = val.slice(lineStart, e) || "";
    const out = (seg || "").split("\n").map((l) => pfx + l).join("\n");
    onChange(val.slice(0, lineStart) + out + val.slice(e));
  };
  return (
    <div className="ned">
      <div className="nedbar">
        {!preview && (
          <>
            <button type="button" onClick={() => prefixLines("## ")} title="Titre">Titre</button>
            <button type="button" onClick={() => wrapInline("**", "**")} title="Gras"><b>G</b></button>
            <button type="button" onClick={() => prefixLines("- ")} title="Puce">• Puce</button>
          </>
        )}
        <span className="nedspacer" />
        <button type="button" className={"nedtab" + (preview ? "" : " on")} onClick={() => setPreview(false)}>Écrire</button>
        <button type="button" className={"nedtab" + (preview ? " on" : "")} onClick={() => setPreview(true)}>Aperçu</button>
      </div>
      {preview ? (
        <div className={"nedpreview " + variant} dangerouslySetInnerHTML={{ __html: mdToHtml(val) }} />
      ) : (
        <textarea ref={ref} rows={rows} placeholder={placeholder} value={val} onChange={(e) => onChange(e.target.value)} />
      )}
    </div>
  );
}

// Un item de boîte de réception vient d'une automatisation : on ne lui fait pas
// confiance. On ne garde que des chaînes, sur des clés connues. Rien d'autre n'entre.
function inboxToMeeting(it) {
  const str = (v) => (typeof v === "string" ? v : "");
  const norm = (rows, keys) =>
    (Array.isArray(rows) ? rows : []).slice(0, 30).map((r) => {
      const o = { id: rid("oto") };
      keys.forEach((k) => { o[k] = str(r && r[k]); });
      return o;
    });
  const ts = Date.now();
  return {
    id: ts + Math.floor(Math.random() * 1000),
    ts,
    date: str(it.date) || formatDateShort(ts),
    title: str(it.title) || "Compte-rendu importé",
    kind: it.kind === "atelier" ? "atelier" : "1to1",
    themes: (Array.isArray(it.themes) ? it.themes : []).filter((t) => typeof t === "string").slice(0, 10),
    epistemic: str(it.epistemic),
    arbitrages: norm(it.arbitrages, ["titre", "corps", "analyse", "question"]),
    actions: norm(it.actions, ["titre", "note"]).map((a) => ({ ...a, done: false })),
    risques: norm(it.risques, ["titre", "corps", "note"]),
    notes: str(it.notes),
    sourceId: String(it.sourceId || it.__id || ""),
    sourceUrl: /^https:\/\//.test(str(it.sourceUrl)) ? str(it.sourceUrl) : "",
    unread: true,
  };
}

function otoHas(m) {
  return (

  const list = filterTheme ? meetings.filter((m) => (m.themes || []).includes(filterTheme)) : meetings;
  return (

  );
}

      <div className="block">
        <div className="entryinput big">

              <button className={kind === "jalon" ? "on jalon" : "jalon"} onClick={() => setKind("jalon")}>Jalon</button>

/* ---------------- helpers ---------------- */
function formatDate(ts) {
  try {
    return new Intl.DateTimeFormat("fr-FR", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" }).format(new Date(ts));
  } catch (e) {
    return new Date(ts).toLocaleString();
  }
}

/* Jalons : date cible <-> valeur d'input date, en heure locale (pas d'UTC) */
function dateInputToTs(v) {
  if (!v) return null;
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(v);
  if (!m) return null;
  return new Date(+m[1], +m[2] - 1, +m[3], 12, 0, 0).getTime();
}
function tsToDateInput(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}
function jalonTs(e) {
  return e.at || e.ts;
}
function isFutureJalon(e) {
  return jalonTs(e) > Date.now();
}

function formatDateShort(ts) {
  try {
    return new Intl.DateTimeFormat("fr-FR", { day: "2-digit", month: "short", year: "numeric" }).format(new Date(ts));
  } catch (e) {
    return new Date(ts).toLocaleDateString();
  }
}

/* Blocs exportables par section (pour l'export ciblé) */
const SECTION_BLOCKS = {
  marche: [["texte", "Texte"], ["tsom", "TAM / SAM / SOM"]],
  segments: [["segments", "Segments"], ["personas", "Personas"]],
  hypotheses: [["problemes", "Problématiques"], ["hypotheses", "Hypothèses"], ["opportunites", "Opportunités"]],
  tech: [["stack", "Architecture & stack"], ["services", "Intégrations & services"], ["decisions", "Décisions techniques"], ["chantiers", "Chantiers"]],
};

function sectionMd(state, k, blocks) {
  const on = (b) => !blocks || blocks.indexOf(b) >= 0;
  let md = "";
  {
    const s = SECTIONS[k];
    const v = state.fields[k];
    if (on("texte")) {
      if (s.type === "text" || s.type === "finances") {
        if (v.body && v.body.trim()) md += `${v.body.trim()}\n\n`;
      } else if (s.fields) {
        s.fields.forEach(([fk, label]) => {
          if (v[fk] && v[fk].trim()) md += `**${label}**\n${v[fk].trim()}\n\n`;
        });
      }
    }
    if (k === "finances") {
      const cap = num(state.finance.capital);
      const tr = state.finance.months.reduce((a, m) => a + num(m.revenue), 0);
      const te = state.finance.months.reduce((a, m) => a + num(m.expense), 0);
      md += `Capital : ${eur(cap)} · Revenus : ${eur(tr)} · Dépenses : ${eur(te)} · Net : ${eur(tr - te)}\n\n`;
    }
    if (k === "equipe") {
      const rows = state.captable.filter((r) => r.holder || r.share);
      if (rows.length) { md += `**Cap table**\n`; rows.forEach((r) => (md += `- ${r.holder || "?"} : ${r.share || "?"}%\n`)); md += `\n`; }
    }
    if (k === "levee") {
      const rows = state.crm.filter((r) => r.name);
      if (rows.length) { md += `**Pipeline**\n`; rows.forEach((r) => (md += `- ${r.name} (${r.type || "—"}) · ${r.status} · ${r.next || "—"}\n`)); md += `\n`; }
    }
    if (k === "roadmap" && state.roadmap) {
      state.roadmap.forEach((p) => {
        md += `### ${p.tag} — ${p.title}${p.timeframe ? " (" + p.timeframe + ")" : ""}\n`;
        if (p.subtitle) md += `_${p.subtitle}_\n`;
        p.features.forEach((f) => (md += `- ${f.done ? "[x]" : "[ ]"} ${f.name}${f.seg && SEGMENTS[f.seg] ? " [" + SEGMENTS[f.seg].name + "]" : ""}${f.desc ? " — " + f.desc : ""}\n`));
        md += `\n`;
      });
    }
    if (k === "concurrents" && state.competitors) {
      const c = state.competitors;
      if (c.cols && c.cols.length) {
        md += `| Critère | ${c.cols.join(" | ")} |\n`;
        md += `| --- ${c.cols.map(() => "| ---").join(" ")} |\n`;
        (c.rows || []).forEach((r) => {
          md += `| ${r.crit} | ${r.cells.map((x) => (x || "").replace(/\n/g, " ")).join(" | ")} |\n`;
        });
        md += `\n`;
      }
      if (c.edge) md += `**Avantage différenciateur** — ${c.edge}\n\n`;
      const nb = state.fields.concurrents && state.fields.concurrents.body;
      if (nb && nb.trim()) md += `${nb.trim()}\n\n`;
    }
    if (k === "canvas" && state.bmc) {
      BMC_BLOCKS.forEach((b) => {
        const v = state.bmc[b.key];
        if (v && v.trim()) md += `**${b.title}**\n${v.trim()}\n\n`;
      });
    }
    if (k === "produit" && state.produit) {
      const pr = state.produit;
      if (pr.intro) md += `${pr.intro}\n\n`;
      if (Array.isArray(pr.briques) && pr.briques.length) {
        md += `**Briques produit**\n`;
        pr.briques.forEach((b) => (md += `- ${b.icon} ${b.title} — ${b.desc}\n`));
        md += `\n`;
      }
      if (Array.isArray(pr.parcours) && pr.parcours.length) {
        md += `**Parcours utilisateur**\n`;
        pr.parcours.forEach((s, i) => (md += `${i + 1}. ${s.icon} ${s.title}${s.badge ? " [" + s.badge + "]" : ""} — ${s.desc}\n`));
        md += `\n`;
      }
      if (Array.isArray(pr.stack) && pr.stack.filter(Boolean).length) md += `**Stack** : ${pr.stack.filter(Boolean).join(" · ")}\n\n`;
      if (pr.notes && pr.notes.trim()) md += `${pr.notes.trim()}\n\n`;
    }
    if (k === "tarification" && state.pricing && Array.isArray(state.pricing.tiers)) {
      state.pricing.tiers.forEach((t) => {
        md += `### ${t.name}${t.cible ? " — " + t.cible : ""} · ${t.price}${t.period ? " " + t.period : ""}${t.featured && t.tag ? " (" + t.tag + ")" : ""}\n`;
        (t.features || []).filter(Boolean).forEach((f) => (md += `- ${f}\n`));
        md += `\n`;
      });
    }
    if (k === "marche" && state.tsom && on("tsom")) {
      const ts = state.tsom;
      const L = { tam: "TAM", sam: "SAM", som: "SOM" };
      const anyLvl = ["tam", "sam", "som"].some((x) => ts[x] && (ts[x].label || ts[x].amount || ts[x].method || ts[x].source));
      if ((ts.axis && ts.axis.trim()) || anyLvl) {
        md += `**TAM / SAM / SOM**\n`;
        if (ts.axis && ts.axis.trim()) md += `_Axe : ${ts.axis.trim()}_\n`;
        ["tam", "sam", "som"].forEach((x) => {
          const lv = ts[x] || {};
          const stt = (TSOM_STATUS[lv.status] || TSOM_STATUS.asourcer).label;
          md += `- **${L[x]}** — ${lv.amount && lv.amount.trim() ? lv.amount.trim() : "—"} [${stt}]${lv.label && lv.label.trim() ? " · " + lv.label.trim() : ""}\n`;
          if (lv.method && lv.method.trim()) md += `  - Méthode : ${lv.method.trim()}\n`;
          if (lv.source && lv.source.trim()) md += `  - Source : ${lv.source.trim()}\n`;
        });
        md += `\n`;
      }
    }
    if (k === "segments" && state.segper) {
      const sp = state.segper;
      const sg = on("segments") ? (sp.segments || []).filter((s) => s.name) : [];
      if (sg.length) { md += `**Segments**\n`; sg.forEach((s) => (md += `- ${s.name} (${s.type})${s.desc ? " — " + s.desc : ""}\n`)); md += `\n`; }
      const pe = on("personas") ? (sp.personas || []).filter((p) => p.name) : [];
      if (pe.length) {
        md += `**Personas**\n`;
        pe.forEach((p) => {
          md += `- ${p.name}${p.tagline ? " · " + p.tagline : ""} (${p.type})\n`;
          if (p.context) md += `  - Contexte : ${p.context}\n`;
          if (p.goals) md += `  - Objectifs : ${p.goals}\n`;
          if (p.pains) md += `  - Frustrations : ${p.pains}\n`;
          if (p.quote) md += `  - « ${p.quote} »\n`;
        });
        md += `\n`;
      }
    }
    if (k === "tech" && state.tech) {
      const tc = state.tech;
      if (on("stack") && tc.stack && tc.stack.trim()) md += `**Architecture & stack**\n${tc.stack.trim()}\n\n`;
      const sv = on("services") ? (tc.services || []).filter((s) => s.name) : [];
      if (sv.length) { md += `**Intégrations & services**\n`; sv.forEach((s) => (md += `- ${s.name}${s.role ? " (" + s.role + ")" : ""} · ${s.status}\n`)); md += `\n`; }
      const dc = on("decisions") ? (tc.decisions || []).filter((d) => d.decision) : [];
      if (dc.length) { md += `**Décisions techniques**\n`; dc.forEach((d) => (md += `- ${d.decision}${d.why ? " — " + d.why : ""}${d.date ? " (" + d.date + ")" : ""}\n`)); md += `\n`; }
      const ch = on("chantiers") ? (tc.chantiers || []).filter((c) => c.label) : [];
      if (ch.length) { md += `**Chantiers & dette technique**\n`; ch.forEach((c) => (md += `- [${c.status}] ${c.label}\n`)); md += `\n`; }
    }
    if (k === "hypotheses" && Array.isArray(state.hypotheses) && on("hypotheses")) {
      const labelOf = (pid) => ((state.discovery && state.discovery.problems || []).find((p) => p.id === pid) || {}).intitule || "";
      state.hypotheses.forEach((h) => {
        const t = HYP_TYPE[h.type] ? HYP_TYPE[h.type].name : "";
        const st = HYP_STATUS[h.status] ? HYP_STATUS[h.status].name : "";
        md += `- **${h.claim || "(sans énoncé)"}** [${t} · ${st}]${h.crit ? " ★ critique" : ""}\n`;
        if (h.method) md += `  - Méthode : ${h.method}\n`;
        if (h.preuve) md += `  - Preuve : ${h.preuve}\n`;
        const hl = (h.probs || []).map(labelOf).filter(Boolean);
        if (hl.length) md += `  - Problématiques liées : ${hl.join(" · ")}\n`;
        if (h.note) md += `  - Note : ${h.note}\n`;
        if (h.next) md += `  - Prochaine action : ${h.next}\n`;
        md += `  - Importance : ${(h.importance || "high") === "high" ? "Élevée" : "Faible"} · Certitude : ${(h.certainty || "low") === "high" ? "Élevée" : "Faible"}\n`;
      });
      md += `\n`;
    }
    if (k === "hypotheses" && state.discovery) {
      const dv = state.discovery;
      const labelOf = (pid) => ((dv.problems || []).find((p) => p.id === pid) || {}).intitule || "";
      const pr = on("problemes") ? (dv.problems || []) : [];
      if (pr.length) {
        md += `**Problématiques**\n`;
        pr.forEach((p) => {
          const cl = ((dv.clusters || []).find((c) => c.id === p.cluster) || {}).label || "—";
          const prio = (PROB_PRIORITY[p.priorite] || PROB_PRIORITY.nonprio).label;
          md += `- ${p.intitule || "(sans intitulé)"} [${cl} · ${prio}]\n`;
          (p.verbatims || []).forEach((v) => { md += `  - « ${v.text} »${v.src ? " — " + v.src : ""}\n`; });
        });
        md += `\n`;
      }
      const op = on("opportunites") ? (dv.opps || []) : [];
      if (op.length) {
        md += `**Opportunités**\n`;
        op.forEach((o) => {
          const stt = (OPP_STATUS[o.statut] || OPP_STATUS.emergente).label;
          md += `- ${o.intitule || "(sans intitulé)"} [${stt}]${o.source ? " · source : " + o.source : ""}\n`;
          const links = (o.probs || []).map(labelOf).filter(Boolean);
          if (links.length) md += `  - Liées : ${links.join(" · ")}\n`;
        });
        md += `\n`;
      }
    }
  }
  return md;
}

function buildMarkdown(state, pct) {
  let md = `# Crown On Me — Cockpit\n\n_Avancement : ${pct}%_\n\n`;
  ALL_KEYS.forEach((k) => {
    md += `## ${SECTIONS[k].label} — ${isStarted(state, k) ? "Entamée" : "À remplir"}\n\n`;
    md += sectionMd(state, k);
  });
  if (state.journal.length) {
    md += `## Journal\n\n`;
    state.journal.forEach((e) => {
      const secL = e.section === "general" ? "Général" : (SECTIONS[e.section] || {}).label || e.section;
      md += `- [${formatDate(e.ts)}]${e.kind === "jalon" ? " **JALON**" : ""}${e.kind === "jalon" && e.at ? ` (${isFutureJalon(e) ? "visé le " : "daté du "}${formatDateShort(e.at)})` : ""} (${secL}) ${e.text}\n`;
    });
    md += `\n`;
  }
  if (state.meetings && state.meetings.length) {
    md += `## Réunions & ateliers\n\n`;
    state.meetings.forEach((m) => {
      md += `### ${m.title || "Sans titre"}${m.date ? " — " + m.date : ""}\n`;
      if (m.themes && m.themes.length) md += `_Thématiques : ${m.themes.join(", ")}_\n`;
      md += `\n`;
      if (m.notes) md += `${m.notes}\n\n`;
    });
  }
  if (state.interviews && state.interviews.length) {
    const SL = { todo: "À planifier", planned: "Planifiée", done: "Faite" };
    md += `## Interviews\n\n`;
    state.interviews.forEach((m) => {
      md += `### ${m.person || "Sans nom"}${m.date ? " — " + m.date : ""}\n`;
      md += `- Statut : ${SL[m.status] || m.status}${m.segment ? " · Segment : " + m.segment : ""}\n`;
      if (m.learnings) md += `- Apprentissages : ${m.learnings}\n`;
      if (m.verbatim) md += `- « ${m.verbatim} »\n`;
      md += `\n`;
    });
  }
  if (state.todos && state.todos.length) {
    md += `## Ma to-do\n\n`;
    state.todos.forEach((t) => {
      md += `- [${t.done ? "x" : " "}] ${t.text}\n`;
    });
    md += `\n`;
  }
  if (state.resources && state.resources.length) {
    md += `## Ressources\n\n`;
    const cats = [...new Set(state.resources.map((r) => r.cat))].filter(Boolean);
    cats.forEach((c) => {
      md += `### ${c}\n`;
      state.resources.filter((r) => r.cat === c).forEach((r) => {
        md += `- ${r.label || "(sans nom)"}${r.url ? " — " + r.url : " — (lien à ajouter)"}${r.note ? " · " + r.note : ""}\n`;
      });
      md += `\n`;
    });
  }
  return md;
}

/* ---------------- styles ---------------- */
function StyleTag() {

.secbadge{font-size:11px;color:var(--plum);background:var(--sand-2);padding:2px 8px;border-radius:999px;}
.entrytext{margin:0;font-size:14px;color:var(--ink);white-space:pre-wrap;}
.entrydel{position:absolute;top:10px;right:10px;width:26px;height:26px;font-size:16px;}
.empty{color:var(--ink-soft);font-style:italic;font-size:14px;padding:8px 0;}

/* roadmap */
.roadmap{display:flex;flex-direction:column;gap:16px;}
.rmbar{display:flex;justify-content:space-between;align-items:center;}
.rmcount{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-soft);}
.rmedit{background:transparent;border:1px solid var(--line);color:var(--plum);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;}
.rmedit:hover{background:var(--sand-2);}
.rmedit.on{background:var(--plum);color:#fff;border-color:var(--plum);}
.phase{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;position:relative;overflow:hidden;}
.phase::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--plum);}
.phase.complete::before{background:var(--emerald);}
.phasehead{margin-bottom:12px;padding-left:6px;}
.phasenum{position:absolute;right:14px;top:12px;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--sand-2);line-height:1;}
.phasetop{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ptagchip{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--plum);background:var(--sand-2);padding:3px 9px;border-radius:999px;}
.phasetop h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;margin:0;color:var(--ink);}
.ptimechip{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gold-deep);}
.psubtxt{margin:5px 0 8px;font-size:13px;color:var(--ink-soft);}
.phasebar{height:5px;background:var(--sand-2);border-radius:999px;overflow:hidden;max-width:280px;}
.phasefill{height:100%;background:linear-gradient(90deg,var(--gold),var(--emerald));border-radius:999px;transition:width .4s ease;}
.phaseedit{display:flex;flex-direction:column;gap:6px;position:relative;padding-right:34px;}
.phaseedit .ptag{max-width:120px;} .phaseedit input{font-size:13px;}
.phasedel{position:absolute;right:0;top:0;}

.features{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;}
.feature{border:1px solid var(--line);border-radius:10px;background:#fffdf8;transition:border-color .15s;}
.feature.open{border-color:var(--gold);}
.feature.done{background:#f4f8f2;}
.featurerow{display:flex;align-items:center;gap:10px;padding:4px 6px;}
.draghandle{flex:none;cursor:grab;color:var(--band-line);font-size:14px;line-height:1;padding:2px 2px;user-select:none;letter-spacing:-2px;}
.draghandle:hover{color:var(--gold);}
.draghandle:active{cursor:grabbing;}
.feature.dragging{opacity:.5;border-color:var(--gold);}
.donedot{flex:none;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--band-line);background:#fff;color:#fff;font-size:12px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:.15s;padding:0;}
.donedot.on{background:var(--emerald);border-color:var(--emerald);}
.fname.btn{flex:1;display:flex;justify-content:space-between;align-items:center;gap:8px;background:transparent;border:none;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink);padding:8px 6px;width:auto;}
.feature.done .fnametext{text-decoration:line-through;color:var(--ink-soft);text-decoration-color:var(--emerald);}
.chev{flex:none;font-family:'DM Sans',sans-serif;color:var(--gold-deep);font-size:16px;width:16px;text-align:center;}
.fname.btn .fnametext{flex:1;text-align:left;}
input.fname{flex:1;font-weight:500;}
.fdesc{margin:0;padding:0 12px 12px 40px;font-size:13px;color:var(--ink-soft);animation:rise .2s ease;}
.fdesc-edit{margin:0 8px 8px 38px;width:calc(100% - 46px);}
.addphase{background:transparent;border:1px dashed var(--plum);color:var(--plum);border-radius:11px;padding:10px 14px;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;}
.addphase:hover{background:var(--sand-2);}

/* roadmap timeline + segments */
.rmtimeline{display:flex;align-items:stretch;gap:10px;margin:4px 0 6px;}
.tlall{flex:none;align-self:center;background:transparent;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--ink-soft);cursor:pointer;transition:.15s;}
.tlall.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.tlaxis{flex:1;display:flex;gap:0;overflow-x:auto;position:relative;padding:6px 2px;}
.tlaxis::before{content:"";position:absolute;left:14px;right:14px;top:16px;height:2px;background:var(--line);}
.tlnode{position:relative;flex:1;min-width:110px;display:flex;flex-direction:column;align-items:flex-start;gap:3px;background:transparent;border:none;cursor:pointer;padding:0 8px;text-align:left;}
.tldot{width:14px;height:14px;border-radius:50%;background:var(--sand);border:2px solid var(--band-line);z-index:1;transition:.2s;}
.tlnode.done .tldot{background:var(--emerald);border-color:var(--emerald);}
.tlnode.on .tldot{border-color:var(--gold);background:var(--gold);box-shadow:0 0 0 4px rgba(199,154,59,.22);}
.tltag{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.04em;color:var(--ink-soft);transition:.15s;}
.tlnode.on .tltag{color:var(--plum);font-weight:700;}
.tltime{font-size:11px;color:var(--stone);}

.seglegend{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 4px;}
.segchip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid;white-space:nowrap;line-height:1.4;}
.segchip.mini{font-size:10px;padding:2px 7px;flex:none;}
.feditrow{display:flex;flex-direction:column;gap:8px;margin:0 8px 8px 38px;}
.segselect{max-width:200px;}

/* competitors */
.competitors{display:flex;flex-direction:column;gap:16px;}
.cmpscroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--card);}
.cmptable{border-collapse:collapse;width:100%;min-width:560px;font-size:13px;}
.cmptable th,.cmptable td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top;}
.cmptable thead th{background:var(--sand-2);font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink);position:sticky;top:0;}
.cmptable .critcol{background:#fbf4e8;font-weight:600;color:var(--ink);white-space:nowrap;position:sticky;left:0;z-index:1;}
.cmptable thead .critcol{z-index:2;}
.cmptable .uscol{background:#f7efff;}
.cmptable thead th.uscol{background:var(--plum);color:#fff;}
.cellval{white-space:pre-line;color:var(--ink-soft);}
.cmptable .uscol .cellval{color:var(--ink);}
.thedit{display:flex;gap:6px;align-items:center;}
.thedit input{min-width:90px;font-size:12px;padding:6px 8px;}
.cmptable td textarea{font-size:12px;padding:6px 8px;min-width:120px;}
.cmpbtns{display:flex;gap:8px;}
.cmpbtns .addrow{margin-top:0;}

.edge{display:flex;gap:12px;align-items:flex-start;background:linear-gradient(180deg,#fff7ea,#fdf1df);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:14px 16px;}
.edgeicon{flex:none;width:26px;height:26px;border-radius:50%;background:var(--gold);color:#2a1a05;display:grid;place-items:center;font-size:14px;}
.edgebody{flex:1;}
.edgelabel{margin:0 0 4px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:15px;color:var(--ink);}
.edgetext{margin:0;font-size:14px;color:var(--ink-soft);}

/* hypotheses */
.hyp{display:flex;flex-direction:column;gap:12px;}
/* assumptions map */
.amap{background:var(--sand-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:4px;}
.amaphead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
/* Carte des assomptions — agrandissement */
.amapzoom{background:none;border:1px solid var(--band-line);color:var(--gold-deep);font-family:'DM Sans',sans-serif;font-size:10.5px;letter-spacing:.08em;border-radius:999px;padding:4px 11px;cursor:pointer;flex:none;transition:background .15s,border-color .15s;}
.amapzoom:hover{background:var(--band-faint);border-color:var(--gold);}
.achipstar{color:var(--gold);margin-right:4px;}
.achipcrit{border-color:var(--gold);}
.amapmodal{position:fixed;inset:0;background:rgba(13,13,11,.72);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto;}
.amapmodalbox{background:var(--sand);border:1px solid var(--ink);width:100%;max-width:1000px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.amapmodalhead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:18px 22px;border-bottom:1px solid var(--line);background:var(--card);}
.amapmodalhead h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;margin:0 0 3px;color:var(--ink);}
.amapclose{background:none;border:none;font-size:26px;line-height:1;color:var(--stone);cursor:pointer;padding:0 4px;flex:none;}
.amapclose:hover{color:var(--ink);}
.amapmodalbody{padding:22px;overflow:auto;flex:1;}
.amapmodalbody .amapgrid{gap:12px;}
.amapmodalbody .amapcell{min-height:190px;}
.amapmodalbody .achip{white-space:normal;text-align:left;line-height:1.4;}
.amapmodalbody .amapqlabel{font-size:13px;}
@media (max-width:560px){
  .amapmodal{padding:10px;}
  .amapmodalbody{padding:14px;}
  .amapmodalbody .amapcell{min-height:120px;}
  .amaphead{align-items:flex-start;}
}
.amaphead h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;margin:0;color:var(--ink);}
.amaphint{font-size:12px;color:var(--ink-soft);}
.amapwrap{display:flex;gap:8px;align-items:stretch;}
.amapy{writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.1em;color:var(--stone);flex:none;}
.amapmain{flex:1;min-width:0;}
.amapgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.amapcell{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;min-height:96px;display:flex;flex-direction:column;gap:6px;}
.amapcell.prio{background:var(--band-faint);border-color:var(--gold);}
.amapqlabel{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink);}
.amapqlabel span{font-weight:400;color:var(--stone);}
.amapcell.prio .amapqlabel{color:var(--gold-deep);}
.amapchips{display:flex;flex-wrap:wrap;gap:5px;}
.amapempty{color:var(--band-line);font-size:13px;}
.achip{background:var(--sand);border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink);cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.achip:hover{border-color:var(--gold);color:var(--gold-deep);}
.amapx{text-align:center;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.1em;color:var(--stone);margin-top:6px;}
.hcard{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--stone);border-radius:0 12px 12px 0;padding:12px 14px;}
.hhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hstat,.htype{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid;white-space:nowrap;flex:none;}
.hclaimbtn{flex:1;min-width:180px;display:flex;justify-content:space-between;align-items:center;gap:8px;background:transparent;border:none;text-align:left;cursor:pointer;padding:6px 2px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink);width:auto;}
.hclaimtext{flex:1;}
.hbody{display:flex;flex-direction:column;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);animation:rise .2s ease;}
.hselrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hbody .field label{font-size:12px;color:var(--ink-soft);font-weight:600;}
.hdel{width:auto;height:auto;padding:7px 14px;font-size:13px;align-self:flex-start;border-radius:8px;}
@media (max-width:640px){ .hselrow{grid-template-columns:1fr;} }

/* business model canvas */
.bmc{display:flex;flex-direction:column;gap:12px;}
.bmchint{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-soft);}
.bmcgrid{
  display:grid;gap:10px;
  grid-template-columns:repeat(5,1fr);
  grid-auto-rows:minmax(128px,1fr);
  grid-template-areas:
    "prob sol uvp adv seg"
    "prob met uvp cha seg"
    "cost cost cost rev rev";
}
.area-prob{grid-area:prob;} .area-sol{grid-area:sol;} .area-met{grid-area:met;}
.area-uvp{grid-area:uvp;} .area-adv{grid-area:adv;} .area-cha{grid-area:cha;}
.area-seg{grid-area:seg;} .area-cost{grid-area:cost;} .area-rev{grid-area:rev;}
.bmccell{display:flex;flex-direction:column;gap:8px;align-items:stretch;text-align:left;background:var(--card);border:1px solid var(--line);border-top:3px solid var(--stone);border-radius:12px;padding:12px;cursor:pointer;transition:.15s;overflow:hidden;font-family:'DM Sans',sans-serif;}
.bmccell:hover{box-shadow:0 3px 14px rgba(13,13,11,.1);transform:translateY(-1px);}
.bmccell.tone-left{border-top-color:#6c2b4d;} .bmccell.tone-value{border-top-color:#c79a3b;background:#fffaef;}
.bmccell.tone-right{border-top-color:#2f8a9a;} .bmccell.tone-cost{border-top-color:#b5462a;} .bmccell.tone-rev{border-top-color:#2d7a5f;}
.bmccell.filled{background:#fffdf7;}
.bmccell.tone-value.filled{background:#fff6e2;}
.bmctop{display:flex;align-items:center;gap:8px;}
.bmcicon{font-size:16px;flex:none;}
.bmctitle{font-weight:600;font-size:13px;color:var(--ink);line-height:1.2;}
.bmcpreview{font-size:12px;color:var(--ink-soft);white-space:pre-line;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
.bmcempty{font-size:12px;color:var(--stone);font-style:italic;}

.bmcmodal-scrim{position:fixed;inset:0;background:rgba(13,13,11,.45);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;}
.bmcmodal{background:var(--card);border-radius:16px;max-width:560px;width:100%;padding:20px 20px 18px;border-top:4px solid var(--stone);box-shadow:0 20px 50px rgba(13,13,11,.3);animation:rise .2s ease;}
.bmcmodal.tone-left{border-top-color:#6c2b4d;} .bmcmodal.tone-value{border-top-color:#c79a3b;}
.bmcmodal.tone-right{border-top-color:#2f8a9a;} .bmcmodal.tone-cost{border-top-color:#b5462a;} .bmcmodal.tone-rev{border-top-color:#2d7a5f;}
.bmcmodalhead{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.bmcicon.big{font-size:22px;}
.bmcmodalhead h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:20px;margin:0;color:var(--ink);}
.bmcclose{margin-left:auto;background:transparent;border:none;font-size:24px;line-height:1;color:var(--ink-soft);cursor:pointer;padding:0 4px;}
.bmcclose:hover{color:var(--ink);}
.bmcmodalq{margin:0 0 12px;font-size:13px;color:var(--ink-soft);font-style:italic;}
.bmcmodaltext{width:100%;}
.bmcmodalfoot{display:flex;justify-content:flex-end;margin-top:12px;}

@media (max-width:860px){
  .bmcgrid{grid-template-columns:1fr;grid-auto-rows:auto;grid-template-areas:"prob" "sol" "met" "uvp" "adv" "cha" "seg" "cost" "rev";}
  .bmccell{min-height:auto;}
  .bmcpreview{-webkit-line-clamp:3;}
}

/* pricing */
.pricing{display:flex;flex-direction:column;gap:14px;}
.pricegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
.pricecard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 15px;display:flex;flex-direction:column;gap:8px;position:relative;}
.pricecard.featured{border-color:var(--gold);box-shadow:0 6px 22px rgba(199,154,59,.18);background:#fffaef;}
.pricetag{position:absolute;top:-10px;left:15px;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:var(--gold);color:#2a1a05;padding:3px 10px;border-radius:999px;}
.pricecible{margin:0;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--plum);}
.pricename{margin:0;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:20px;color:var(--ink);}
.priceval{margin:0 0 4px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;color:var(--ink);}
.priceper{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--ink-soft);}
.pricefeatures{list-style:none;margin:4px 0 0;padding:0;display:flex;flex-direction:column;gap:7px;}
.pricefeatures li{position:relative;padding-left:20px;font-size:13px;color:var(--ink-soft);}
.pricefeatures li::before{content:"✓";position:absolute;left:0;top:0;color:var(--emerald);font-weight:700;}
.priceedit{display:flex;flex-direction:column;gap:6px;}
.priceedit label{font-size:12px;font-weight:600;color:var(--ink);margin-top:4px;}
.priceedit label.featline{display:flex;align-items:center;gap:8px;font-weight:500;margin-top:8px;}
.priceedit label.featline input{width:auto;}
.priceedit input{font-size:13px;padding:8px 10px;}
.featrow{display:flex;gap:6px;align-items:center;}
.featrow input{flex:1;}
.tierdel{width:auto;height:auto;padding:8px 12px;font-size:13px;border-radius:8px;margin-top:8px;}
@media (max-width:860px){ .pricegrid{grid-template-columns:1fr 1fr;} }
@media (max-width:560px){ .pricegrid{grid-template-columns:1fr;} }

/* produit */
.produit{display:flex;flex-direction:column;gap:14px;}
.prodintro{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;line-height:1.5;color:var(--ink);margin:0;}
.prodintro-edit{width:100%;}
.prodsub{margin:6px 0 -2px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);}
.briques{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.brique{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px;}
.briqueicon{font-size:22px;}
.briquetitle{font-weight:600;font-size:14px;color:var(--ink);}
.briquedesc{font-size:13px;color:var(--ink-soft);}
.briquehead,.stephead{display:flex;gap:6px;align-items:center;}
.bicon{width:44px;flex:none;text-align:center;padding:8px 4px;}
.btitle{flex:1;font-weight:600;}
.briqueedit,.stepedit{display:flex;flex-direction:column;gap:6px;}

.parcours{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;counter-reset:none;}
.pstep{display:flex;gap:12px;align-items:flex-start;}
.pnum{flex:none;width:28px;height:28px;border-radius:50%;background:var(--plum);color:#fff;display:grid;place-items:center;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:14px;margin-top:2px;}
.pbody{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:4px;}
.ptop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.picon{font-size:16px;}
.ptitle{font-weight:600;font-size:14px;color:var(--ink);}
.pbadge{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.04em;background:var(--sand-2);color:var(--plum);padding:2px 8px;border-radius:999px;}
.pdesc{font-size:13px;color:var(--ink-soft);}
.pbadgein{font-size:12px;}

.stackchips{display:flex;flex-wrap:wrap;gap:8px;}
.stackchip{font-family:'DM Sans',sans-serif;font-size:12px;background:var(--ink);color:var(--sand);padding:6px 12px;border-radius:8px;}
.stackedit{display:flex;flex-direction:column;gap:6px;max-width:320px;}
.prodrenvoi{margin:4px 0 0;font-size:13px;color:var(--ink-soft);font-style:italic;}
@media (max-width:820px){ .briques{grid-template-columns:1fr 1fr;} }
@media (max-width:560px){ .briques{grid-template-columns:1fr;} }

/* dév technique */
.tech{display:flex;flex-direction:column;gap:4px;}
.techrow{flex-wrap:wrap;}
.techstatus{width:130px;flex:none;cursor:pointer;}
.techdate{width:110px;flex:none;}
@media (max-width:560px){
  .techrow .grow{flex-basis:100%;}
  .techstatus,.techdate{flex:1;}
}
/* segments & personas */
.segper{display:flex;flex-direction:column;gap:4px;}
.segperbar{display:flex;justify-content:flex-end;margin-bottom:2px;}
.segperhead2{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-top:8px;}
.segcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:6px;}
.segcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
.segbadge{display:inline-block;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;border:1px solid;border-radius:999px;padding:3px 9px;}
.segname{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:20px;margin:8px 0 4px;color:var(--ink);}
.segdesc{font-size:13px;line-height:1.55;color:var(--ink-soft);margin:0;}
.percardsv{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.percardv{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.pernamev{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;margin:10px 0 6px;color:var(--ink);}
.pertagv{font-style:italic;font-weight:400;color:var(--gold-deep);}
.perctx{font-size:13px;line-height:1.6;color:var(--ink-soft);margin:0 0 10px;}
.perblockv{margin-bottom:8px;}
.perblockv p{font-size:13px;line-height:1.55;color:var(--ink);margin:2px 0 0;}
.perlblv{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);}
.perquotev{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--ink);margin:10px 0 0;padding-left:12px;border-left:2px solid var(--gold);}
.segper .segrow{flex-wrap:wrap;}
.segtype{width:88px;flex:none;cursor:pointer;}
.segrow .grow2{flex:2;min-width:160px;}
@media (max-width:560px){ .segrow .grow,.segrow .grow2{flex-basis:100%;} .segrow .segtype{flex:1;} }
.miniaction{background:transparent;border:1px solid var(--gold);color:var(--gold-deep);border-radius:999px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.miniaction:hover{background:var(--band-faint);}
.percards{display:flex;flex-direction:column;gap:12px;}
.percard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
.perhead{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.pername{flex:1;min-width:120px;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;}
.pertag{flex:1;min-width:120px;font-style:italic;}
.perlbl{display:block;font-size:11px;letter-spacing:.06em;color:var(--stone);margin:8px 0 3px;}
/* Discovery */
.disco{display:flex;flex-direction:column;gap:10px;}
.discofilter{display:flex;flex-direction:column;align-items:flex-start;gap:7px;margin-bottom:10px;}
.discofilterlbl{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--stone);}
.discofilter .filterbar{flex-wrap:wrap;overflow-x:visible;margin:0;padding-bottom:0;width:100%;}
.discofilter .filterbar button{white-space:normal;text-align:left;line-height:1.3;max-width:100%;}
.discohead{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin:14px 0 6px;padding-top:10px;border-top:1px solid var(--line);}
.discohead:first-of-type{border-top:none;padding-top:0;}
.discohead h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--ink);margin:0;}
.discohint{font-size:12px;color:var(--ink-soft);max-width:60%;text-align:right;}
.rmbaractions{display:flex;gap:8px;align-items:center;}
.clusteredit{display:flex;flex-direction:column;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;}
.probcard,.oppcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.probhead{display:flex;gap:8px;align-items:center;}
.probbadge{display:inline-block;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;border:1px solid;border-radius:999px;padding:2px 8px;white-space:nowrap;}
.probmeta{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0 0;font-size:11.5px;color:var(--ink-soft);}
.probretro{color:var(--gold-deep);}
.muted{opacity:.6;}
.hcritzone{border:1px solid var(--gold);background:var(--band-faint);border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.hcrittitle{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:6px;}
.hcritbadge{display:inline-block;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--gold);border-radius:999px;padding:2px 8px;}
.hlinks{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.hlinkchip{font-size:11px;color:var(--ink-soft);background:var(--sand-2);border-radius:999px;padding:2px 9px;}
.hlock{font-size:11.5px;color:var(--danger);margin:2px 0 6px;font-style:italic;}
.reqhint{font-size:10px;color:var(--stone);text-transform:none;letter-spacing:0;}
.linkhint{font-size:12px;color:var(--ink-soft);font-style:italic;margin:2px 0;}
.linkpick{display:flex;flex-direction:column;gap:4px;}
.linkopt{display:flex;gap:7px;align-items:flex-start;font-size:13px;color:var(--ink);cursor:pointer;padding:4px 6px;border-radius:8px;}
.linkopt.on{background:var(--band-faint);}
.critcheck{display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--ink-soft);margin:6px 0;cursor:pointer;}
@media (max-width:560px){
  .discohint{max-width:100%;text-align:left;}
  .rmbaractions{width:100%;flex-wrap:wrap;}
  .rmbaractions .miniaction,.rmbaractions .addrow{flex:1;}
  .discofilter .filterbar button{font-size:12.5px;padding:5px 11px;}
  .probmeta{gap:6px;}
  .hcritzone{padding:8px 9px;}
}
/* Groupe « Plus tard » — hors décompte d'avancement */
.navlater{margin-top:4px;padding-top:10px;border-top:1px dashed var(--line);}
.navlater .navgrouptitle{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
.navlaterhint{font-size:8.5px;letter-spacing:.08em;text-transform:none;color:var(--stone);font-style:italic;opacity:.85;}
.navlater .navitem{opacity:.62;}
.navlater .navitem:hover,.navlater .navitem.on{opacity:1;}
/* Pitch — aperçu éditorial */
.pitchmod{display:flex;flex-direction:column;gap:4px;}
.pitchpreview{display:flex;flex-direction:column;}
.pitchpart{display:flex;gap:16px;align-items:flex-start;padding:16px 2px;border-bottom:1px solid var(--line);}
.pitchpart:last-of-type{border-bottom:none;}
.pitchnum{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold);line-height:1;flex:none;width:34px;text-align:right;}
.pitchbody{flex:1;}
.pitcheyebrow{display:block;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:6px;}
.pitchtext{font-size:15px;line-height:1.65;color:var(--ink);margin:0;white-space:pre-wrap;}
.pitchtodo{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);font-size:12px;color:var(--stone);font-style:italic;}
@media (max-width:560px){
  .pitchpart{gap:10px;padding:14px 0;}
  .pitchnum{font-size:20px;width:24px;}
  .pitchtext{font-size:14.5px;}
}
/* Dév technique — aperçu */
.techbar{display:flex;justify-content:flex-end;margin-bottom:10px;}
.tech .resblock{margin-bottom:14px;}
.techbadge{display:inline-block;font-family:'DM Sans',sans-serif;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;border:1px solid;border-radius:999px;padding:3px 9px;white-space:nowrap;flex:none;}
.techdateview{font-size:12px;color:var(--stone);white-space:nowrap;flex:none;}
.techstackview{margin:0;padding:16px 20px;font-size:14.5px;line-height:1.7;color:var(--ink);white-space:pre-wrap;}
@media (max-width:560px){
  .techstackview{padding:14px 16px;font-size:14px;}
  .techbadge,.techdateview{white-space:normal;}
}
/* Ressources */
.resview .rmedit{float:right;}
.resgroups{display:flex;flex-direction:column;gap:18px;}
.resblock{border:1px solid var(--ink);}
.resband{background:var(--ink);color:var(--band-line);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;padding:14px 20px;}
.resrows{background:var(--sand);}
.resline{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 20px;border-bottom:1px solid var(--line);}
.resline:last-child{border-bottom:none;}
.restxt{display:flex;flex-direction:column;gap:4px;min-width:0;}
.reslabel{font-size:16px;color:var(--ink);line-height:1.25;}
.resnote{font-size:13px;color:var(--stone);line-height:1.45;}
.resdom{font-size:13px;color:var(--gold);text-decoration:none;border-bottom:1px solid var(--gold);padding-bottom:2px;white-space:nowrap;flex:none;transition:color .15s,border-color .15s;}
.resdom:hover{color:var(--gold-deep);border-color:var(--gold-deep);}
.resmissing{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--stone);font-style:italic;opacity:.7;white-space:nowrap;flex:none;}
.resedit{display:flex;flex-direction:column;gap:8px;}
.resrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.resrow .grow{flex:1;min-width:150px;}
.resrow .grow2{flex:2;min-width:180px;}
.rescat{width:130px;flex:none;cursor:pointer;}
.resnoteinput{flex:1;min-width:140px;}
@media (max-width:560px){
  .resrow .grow,.resrow .grow2,.resrow .rescat,.resrow .resnoteinput{flex-basis:100%;width:100%;}
  .resline{flex-direction:column;align-items:flex-start;gap:8px;padding:14px 16px;}
  .resband{padding:12px 16px;font-size:10px;}
  .resdom,.resmissing{white-space:normal;}
}
/* TAM / SAM / SOM */
.tsom{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--line);}
.tsombar{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.tsomtitle{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--ink);letter-spacing:.02em;}
.tsomrings{position:relative;width:320px;height:320px;margin:6px auto 2px;}
.tsomring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;display:flex;justify-content:center;align-items:flex-start;}
.tsom-tam{width:320px;height:320px;background:var(--card);border:1.5px solid var(--ink);}
.tsom-sam{width:212px;height:212px;background:var(--sand-2);border:1.5px solid var(--ink);}
.tsom-som{width:118px;height:118px;background:var(--gold);border:1.5px solid var(--gold-deep);}
.tsomringtop{display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:13px;background:rgba(253,251,244,.92);border:1px solid var(--line);border-radius:9px;padding:5px 10px;}
.tsom-som .tsomringtop{margin-top:15px;}
.tsomtag{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--stone);}
.tsomamt{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;color:var(--ink);line-height:1;}
.tsombadge{display:inline-block;font-family:'DM Sans',sans-serif;font-size:8.5px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;border:1px solid;border-radius:999px;padding:2px 7px;white-space:nowrap;}
.tsomaxisline{font-size:13px;color:var(--ink-soft);text-align:center;margin:0;}
.tsomaxisline span{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-right:7px;}
.tsomdetails{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.tsomdet{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.tsomdethead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px;}
.tsomlabel{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--ink);margin:0 0 7px;line-height:1.25;}
.tsommeta{font-size:11.5px;color:var(--ink-soft);margin:3px 0;line-height:1.45;}
.tsommeta span{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);margin-right:6px;}
.tsommuted{opacity:.65;font-style:italic;}
.tsomlegend{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:2px 0 2px;}
.tsomlgd{display:flex;flex-direction:column;gap:3px;padding:9px 11px;background:var(--card);border:1px solid var(--line);border-radius:9px;}
.tsomlgda{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:.18em;color:var(--gold-deep);}
.tsomlgdf{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ink);line-height:1.15;}
.tsomlgdg{font-size:11px;color:var(--ink-soft);line-height:1.4;}
.tsomedit{display:flex;flex-direction:column;gap:10px;}
.tsomfield{display:flex;flex-direction:column;gap:4px;}
.tsomfield>label,.tsomlvlhead .tsomtag{font-family:'DM Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);}
.tsomfield>label{font-size:10px;}
.tsomlvledit{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:7px;}
.tsomlvlhead{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.tsomlvledit input,.tsomfield input{width:100%;}
.tsomlvlhead select{width:150px;flex:none;cursor:pointer;}
@media (max-width:560px){
  .tsomdetails{grid-template-columns:1fr;}
  .tsomlegend{grid-template-columns:1fr;}
  .tsomrings{width:280px;height:280px;}
  .tsom-tam{width:280px;height:280px;}
  .tsom-sam{width:188px;height:188px;}
  .tsom-som{width:106px;height:106px;}
  .tsomlvlhead{flex-wrap:wrap;}
  .tsomlvlhead select{width:100%;}
}
/* ---- One to One : rendu éditorial ---- */
.otoprev{border:1px solid var(--ink);background:var(--card);}
.otohead{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;padding:26px 28px;border-bottom:1px solid var(--ink);}
.otoeyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.ototitle{font-family:'Cormorant Garamond',serif;font-size:29px;font-weight:500;line-height:1.05;color:var(--ink);}
.otometa{font-size:11px;color:var(--stone);letter-spacing:.08em;text-align:right;white-space:nowrap;}
.otoepi{background:var(--ink);color:var(--band-line);padding:20px 28px;}
.otoepilbl{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:9px;}
.otoepitxt p{margin:0 0 6px;font-size:13px;line-height:1.7;}
.otoepitxt strong{color:var(--sand);font-weight:500;}
.otoepitxt ul{margin:4px 0 4px 16px;}
.otosec{border-top:1px solid var(--ink);}
.otosechead{display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:13px 28px;border-bottom:1px solid var(--ink);}
.otosecname{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
.otoseccount{font-size:11px;color:var(--stone);letter-spacing:.08em;}
.otosecbody{padding:20px 28px;}
.otoitem{padding:16px 0;border-bottom:1px solid var(--line);}
.otoitem:last-child{border-bottom:none;}
.otoitem:first-child{padding-top:0;}
.otoitemtop{display:flex;align-items:baseline;gap:10px;margin-bottom:7px;flex-wrap:wrap;}
.otoitemtitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;line-height:1.25;}
.otobadge{font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--stone);color:var(--stone);border-radius:3px;white-space:nowrap;}
.otobadge.arb{border-color:var(--gold);color:var(--gold-deep);}
.otobadge.ris{background:var(--ink);border-color:var(--ink);color:var(--band-line);}
.otobadge.oto{border-color:var(--gold);color:var(--gold-deep);margin-right:8px;}
.otobadge.unread{background:var(--gold);border-color:var(--gold);color:#fff;margin-right:8px;}
.otounread{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 28px;background:var(--band-faint);border-bottom:1px solid var(--band-line);}
.otounreadtxt{flex:1;min-width:180px;font-size:12px;color:var(--ink-soft);line-height:1.5;}
.inboxbanner{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px;margin-bottom:12px;border:1px solid var(--gold);border-radius:10px;background:var(--band-faint);}
.inboxtxt{flex:1;min-width:200px;font-size:13px;line-height:1.6;color:var(--ink);}
.inboxtxt strong{font-weight:500;}
.inboxdup{display:block;color:var(--stone);font-size:11.5px;margin-top:2px;}
.otometa a{color:var(--gold-deep);text-decoration:none;}
.otometa a:hover{text-decoration:underline;}
.otoitembody p{margin:0 0 6px;font-size:13px;line-height:1.75;}
.otoitembody ul,.otoitemsrc ul{margin:4px 0 4px 16px;}
.otoitemsrc{margin-top:9px;padding-left:11px;border-left:1px solid var(--band-line);}
.otoitemsrc p{margin:0 0 5px;font-size:11.5px;line-height:1.65;color:var(--stone);}
.otoq{margin-top:9px;font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--gold-deep);line-height:1.4;}
.otoact{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);align-items:flex-start;}
.otoact:last-child{border-bottom:none;}
.otoact:first-child{padding-top:0;}
.otoactbox{width:11px;height:11px;border:1px solid var(--ink);flex:none;border-radius:2px;margin-top:4px;}
.otoactbox.on{background:var(--ink);}
.otoacttxt{font-size:13px;line-height:1.6;}
.otodone{text-decoration:line-through;color:var(--stone);}
.otoactnote{display:block;color:var(--stone);font-size:11.5px;margin-top:3px;line-height:1.6;}
.otonotes p{margin:0 0 6px;font-size:13px;line-height:1.7;}
.otonotes ul{margin:4px 0 8px 16px;}
.otonotes h2,.otonotes h3,.otonotes h4{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;margin:14px 0 6px;}
/* éditeur One to One */
.otoed{border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--card);}
.otoedhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px;}
.otoedhead .ovhelp{margin:3px 0 0;}
.otoedrow{display:flex;flex-direction:column;gap:6px;padding:10px 0;border-bottom:1px solid var(--line);}
.otoedrow:last-child{border-bottom:none;}
.otoedactions{display:flex;justify-content:flex-end;align-items:center;gap:10px;}
.otoedcheck{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
.otokindrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.otokind{display:flex;gap:6px;}
@media(max-width:640px){
  .otohead{flex-direction:column;align-items:flex-start;gap:12px;}
  .otometa{text-align:left;}
  .otohead,.otoepi,.otosechead,.otosecbody{padding-left:16px;padding-right:16px;}
  .ototitle{font-size:24px;}
}

/* réunions & ateliers */
.mtglist{display:flex;flex-direction:column;gap:12px;}
.mtgcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
.mtgtop{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.mtgdate{width:120px;flex:none;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-soft);}
.mtgtitle{flex:1;min-width:160px;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;}
.mtgnotes{width:100%;}
/* pages & thématiques (réunions/ateliers) */
.backbtn{background:transparent;border:none;color:var(--plum);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;padding:0;}
.backbtn:hover{color:var(--gold-deep);}
.ghostdel{background:transparent;border:1px solid var(--line);color:var(--stone);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;}
.ghostdel:hover{color:var(--danger);border-color:var(--danger);}
.pageedit{display:flex;flex-direction:column;gap:10px;}
.pagetitle{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;border:none;border-bottom:1px solid var(--band-line);border-radius:0;padding:6px 2px;}
.pagetitle:focus{border-bottom-color:var(--gold);box-shadow:none;}
.pagedate{width:160px;font-size:12px;color:var(--ink-soft);}
.themerow{display:flex;flex-direction:column;gap:6px;}
.themechips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.themechip{display:inline-flex;align-items:center;gap:5px;background:var(--band-faint);border:1px solid var(--gold);color:var(--gold-deep);border-radius:999px;padding:3px 10px;font-size:12px;}
.themechip.sm{background:var(--sand-2);border-color:var(--line);color:var(--stone);}
.themechip button{background:none;border:none;color:inherit;cursor:pointer;font-size:13px;line-height:1;padding:0;}
.themeadd{display:flex;gap:8px;}
.themeadd input{flex:1;max-width:280px;}
.related{margin-top:6px;border-top:1px solid var(--line);padding-top:12px;}
.relatedlist{list-style:none;margin:6px 0 0;padding:0;display:flex;flex-direction:column;gap:6px;}
.relatedlist li{display:flex;justify-content:space-between;gap:10px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:9px;cursor:pointer;}
.relatedlist li:hover{border-color:var(--gold);}
.reltitle{font-weight:500;color:var(--ink);}
.reldate{font-size:12px;color:var(--stone);}
.themefilter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.tfchip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-size:12px;color:var(--ink-soft);cursor:pointer;}
.tfchip.on{background:var(--ink);color:var(--sand);border-color:var(--ink);}
.pagelist{display:flex;flex-direction:column;gap:8px;}
.pagerow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;transition:.12s;}
.pagerow:hover{border-color:var(--gold);box-shadow:0 2px 10px rgba(13,13,11,.06);}
.pagerowtitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--ink);}
.pagerowmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pagerowdate{font-size:12px;color:var(--stone);}
/* notes editor (markdown) */
.ned{display:flex;flex-direction:column;gap:6px;}
.nedbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.nedbar button{background:var(--card);border:1px solid var(--line);border-radius:7px;padding:4px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);cursor:pointer;}
.nedbar button:hover{border-color:var(--gold);}
.nedspacer{flex:1;}
.nedtab.on{background:var(--ink);color:var(--sand);border-color:var(--ink);}
.nedpreview{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.6;color:var(--ink);}
.nedpreview h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin:8px 0 4px;}
.nedpreview h3{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;margin:8px 0 4px;}
.nedpreview h4{font-size:14px;font-weight:600;margin:6px 0 3px;}
.nedpreview p{margin:0 0 6px;}
.nedpreview ul{margin:4px 0 8px;padding-left:20px;}
.nedpreview li{margin:2px 0;}
.nedpreview strong{font-weight:600;}
.nedempty{color:var(--stone);font-style:italic;}
/* aperçu mode document (sections rédactionnelles) */
.nedpreview.doc{background:#fbf6ec;border:1px solid var(--line);border-radius:14px;padding:24px 28px;font-size:15.5px;line-height:1.85;color:var(--ink);}
.nedpreview.doc h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;line-height:1.2;margin:22px 0 8px;color:var(--ink);}
.nedpreview.doc h2:first-child{margin-top:0;}
.nedpreview.doc h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;margin:18px 0 6px;color:var(--ink);}
.nedpreview.doc h4{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin:16px 0 5px;color:var(--gold-deep);}
.nedpreview.doc p{margin:0 0 14px;}
.nedpreview.doc p:first-child{font-size:17px;}
.nedpreview.doc ul{margin:8px 0 16px;padding-left:2px;list-style:none;}
.nedpreview.doc li{position:relative;padding-left:22px;margin:7px 0;}
.nedpreview.doc li::before{content:"";position:absolute;left:3px;top:11px;width:6px;height:6px;border-radius:50%;background:var(--gold);}
.nedpreview.doc strong{font-weight:600;color:var(--ink);}
.nedpreview.doc em{font-style:italic;color:var(--ink-soft);}
.nedpreview.doc > :last-child{margin-bottom:0;}
/* interviews */
.itwlist{display:flex;flex-direction:column;gap:12px;}
.itwcard{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--band-line);border-radius:0 12px 12px 0;padding:14px;}
.itwcard.itw-planned{border-left-color:var(--gold);}
.itwcard.itw-done{border-left-color:var(--emerald);}
.itwtop{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.itwdate{width:118px;flex:none;font-size:12px;color:var(--ink-soft);}
.itwperson{flex:2;min-width:150px;font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;}
.itwseg{flex:1;min-width:110px;}
.itwstatus{width:120px;flex:none;cursor:pointer;}
@media (max-width:560px){ .itwtop input,.itwtop select{flex-basis:100%;width:100%;} }

/* overview */
.overview{animation:rise .3s ease;}
.ovhead{display:flex;gap:16px;align-items:center;margin-bottom:22px;flex-wrap:wrap;}
.ovcrown{width:130px;flex:none;}
.ovheadtext{flex:1;min-width:200px;}
.ovheadtext h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(24px,4vw,32px);margin:0 0 8px;color:var(--ink);}
.ovprog{display:flex;align-items:center;gap:10px;max-width:360px;}
.ovprog .progbar{flex:1;height:9px;}
.ovpct{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gold-deep);}
.ovcounts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.ovc{font-family:'DM Sans',sans-serif;font-size:12px;padding:3px 10px;border-radius:999px;border:1px solid var(--line);}
.ovc.done{color:var(--emerald);border-color:#bfe0cf;}
.ovc.doing{color:var(--gold-deep);border-color:#ead9a8;}
.ovc.todo{color:var(--ink-soft);}

.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px;}
.kancol{background:var(--sand-2);border:1px solid var(--line);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px;}
.kancolhead{display:flex;justify-content:space-between;align-items:center;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);padding:2px 4px;}
.col-todo .kancolhead{color:var(--ink-soft);}
.col-doing .kancolhead{color:var(--gold-deep);}
.col-done .kancolhead{color:var(--emerald);}
.kancount{background:#fff;border:1px solid var(--line);border-radius:999px;padding:1px 8px;font-size:11px;}
.kancards{display:flex;flex-direction:column;gap:8px;min-height:20px;}
.kanempty{text-align:center;color:var(--stone);margin:6px 0;}
.kancard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:6px;}
.kancard:hover{box-shadow:0 3px 12px rgba(13,13,11,.1);transform:translateY(-1px);}
.kangroup{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);}
.kanlabel{font-size:14px;font-weight:600;color:var(--ink);}
.kanmove{display:flex;gap:4px;}
.kanmovebtn{width:26px;height:22px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;font-size:11px;line-height:1;color:var(--stone);padding:0;transition:.12s;}
.kanmovebtn.m-todo.on{background:var(--stone);color:#fff;border-color:var(--stone);}
.kanmovebtn.m-doing.on{background:var(--gold);color:#2a1a05;border-color:var(--gold);}
.kanmovebtn.m-done.on{background:var(--emerald);color:#fff;border-color:var(--emerald);}

.ovtasks{display:flex;flex-direction:column;gap:12px;}
.ovtask{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;}
.ovtaskhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ovtaskhead h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;margin:0;color:var(--ink);}
.ovlink{background:transparent;border:none;color:var(--plum);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.ovlink:hover{text-decoration:underline;}
.ovlist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;}
.ovlist li{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink);cursor:pointer;padding:6px 8px;border-radius:8px;transition:.12s;}
.ovlist li:hover{background:var(--sand-2);}
.ovstatus{flex:none;font-family:'DM Sans',sans-serif;font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink-soft);}
.ovstatus.s-doing{color:var(--gold-deep);border-color:#ead9a8;}
.ovphase{flex:1;font-weight:500;}
.ovphaseprog{display:flex;align-items:center;gap:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-soft);}
.miniprog{width:70px;height:6px;background:var(--sand-2);border-radius:999px;overflow:hidden;}
.minifill{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--emerald));}
.ovnav{margin-bottom:10px;}
.ovnav .navdot.star{color:var(--gold-deep);}

@media (max-width:640px){
  .kanban{grid-template-columns:1fr;}
  .ovcrown{width:100px;}
}

/* focus */
.focus{display:flex;gap:18px;align-items:flex-start;background:#efe4d0;border:1px solid var(--line);border-radius:16px;padding:18px 18px 20px;margin-bottom:22px;flex-wrap:wrap;}
.today{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:16px;}
.todayhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.todaylabel{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--ink);}
.todaydate{font-size:12px;color:var(--stone);letter-spacing:.04em;}
.todaytext{width:100%;}
.todayrow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.starthere{background:var(--ink);color:var(--sand);border:none;border-radius:9px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;}
.starthere:hover{background:var(--gold);color:#2a1a05;}
.ovhelp{font-size:13px;color:var(--ink-soft);margin:2px 0 12px;}
.donut{width:64px;height:64px;flex:none;}
.donuttext{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;fill:var(--ink);}
.ovcountline{font-size:13px;color:var(--ink-soft);margin:0 0 6px;}
.todaytop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.todayq{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--ink);margin:0 0 6px;line-height:1.3;}
.todayline{width:100%;background:transparent;border:none;border-bottom:1px solid var(--band-line);border-radius:0;padding:6px 2px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);resize:vertical;}
.todayline:focus{outline:none;border-bottom-color:var(--gold);box-shadow:none;}
.todayadd{background:transparent;border:none;color:var(--gold-deep);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;padding:4px 2px;}
.todayadd:hover:not(:disabled){text-decoration:underline;}
.todayadd:disabled{color:var(--stone);cursor:default;}
.ovblocktitle{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;color:var(--ink);margin:8px 0 0;}
/* to-do */
.todoblock{margin:8px 0 6px;}
.todohead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
.notionlink{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--plum);text-decoration:none;border-bottom:1px solid var(--line);}
.notionlink:hover{color:var(--gold-deep);border-color:var(--gold);}
.todoadd{display:flex;gap:8px;margin:10px 0 10px;}
.todoadd input{flex:1;}
.todolist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;}
.todoitem{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 10px;}
.todocheck{flex:none;width:20px;height:20px;border-radius:5px;border:1.5px solid var(--band-line);background:#fff;color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.todoitem.done .todocheck{background:var(--emerald);border-color:var(--emerald);}
.todotext{flex:1;font-size:14px;color:var(--ink);cursor:pointer;}
.todoitem.done .todotext{text-decoration:line-through;color:var(--stone);}
.todoprio{flex:none;font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;line-height:1;}
.todoitem.done .todoprio{opacity:.45;}
.todohandle{flex:none;color:var(--band-line);cursor:grab;font-size:14px;line-height:1;user-select:none;padding:0 2px;}
.todohandle:active{cursor:grabbing;}
.todoitem{transition:border-color .12s,background .12s,opacity .12s;}
.todoitem.dragging{opacity:.4;}
.todoitem.dragover{border-color:var(--gold);border-style:dashed;background:var(--band-faint);}
.filterbar-type{margin:18px 0 8px;}
.filterbar-type + .filterbar{margin-top:0;}
.nextaction{margin:14px 0 0;font-size:13px;color:var(--ink);cursor:pointer;}
.nextaction:hover{color:var(--gold-deep);}
.nalabel{font-size:11px;letter-spacing:.06em;color:var(--stone);margin-right:6px;}
.focusbody{flex:1;min-width:220px;}
.focusbody h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(22px,4vw,30px);margin:0 0 8px;color:var(--ink);}
.focusrow{margin-top:14px;}
.flabel{display:block;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:6px;}
.fchips{display:flex;flex-wrap:wrap;gap:7px;}
.fchip{background:var(--card);border:1px solid var(--gold);color:var(--plum);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;}
.fchip:hover{background:var(--gold);color:#2a1a05;}
.fmuted{font-size:13px;color:var(--ink-soft);font-style:italic;}
.factions{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;}
.factions li{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);cursor:pointer;padding:7px 10px;background:var(--card);border:1px solid var(--line);border-radius:9px;transition:.12s;}
.factions li:hover{border-color:var(--plum);}
.factag{flex:none;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--plum);background:var(--sand-2);padding:2px 8px;border-radius:999px;}

/* status map */
.statusmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:4px;}
.smtile{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 11px;cursor:pointer;text-align:left;transition:.12s;}
.smtile:hover{box-shadow:0 2px 10px rgba(13,13,11,.08);transform:translateY(-1px);}
.smdot{flex:none;width:10px;height:10px;border-radius:50%;background:var(--stone);}
.smtile.st-doing .smdot{background:var(--gold);}
.smtile.st-done .smdot{background:var(--emerald);}
.smtext{display:flex;flex-direction:column;min-width:0;}
.smlabel{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.smgroup{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--stone);}

/* chronologie — frise horizontale (jalons) */
.frise{overflow-x:auto;padding:6px 2px 10px;-webkit-overflow-scrolling:touch;}
.frise::-webkit-scrollbar{height:6px;}
.frise::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.frisetrack{display:flex;min-width:min-content;}
.fstep{flex:0 0 auto;width:160px;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;padding:0 4px;}
.fstep:hover .ftext{color:var(--plum);}
.fstep:hover .fdot{transform:scale(1.15);}
.fdate{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink-soft);margin-bottom:8px;white-space:nowrap;}
.fmid{position:relative;width:100%;height:18px;display:flex;align-items:center;justify-content:center;}
.fmid::before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:var(--band-line);transform:translateY(-50%);}
.frise.multi .fstep:first-child .fmid::before{left:50%;}
.frise.multi .fstep:last-child .fmid::before{right:50%;}
.fdot{position:relative;z-index:1;width:15px;height:15px;border-radius:50%;background:var(--gold);border:3px solid var(--sand);box-shadow:0 0 0 2px rgba(199,154,59,.25);transition:transform .15s;}
.ftext{margin-top:8px;font-size:12px;color:var(--ink);line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

@media (max-width:860px){
  .mobiletop{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;background:var(--sand);border-bottom:1px solid var(--line);padding:10px 14px;}
  .mwordmark{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;flex:1;}
  .mpct{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--gold-deep);}
  .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:transform .28s ease;box-shadow:2px 0 24px rgba(13,13,11,.18);}
  .sidebar.open{transform:translateX(0);}
  .content{padding:20px 16px 60px;}
  .fieldgrid{grid-template-columns:1fr;}
  .statcards{grid-template-columns:1fr 1fr;}
  .mrow{grid-template-columns:1.2fr 1fr 1fr;gap:6px;}
  .mrow .mnet,.mrow .del{display:none;}
  .mrow.head span:nth-child(4),.mrow.head span:nth-child(5){display:none;}
  .row.crm{flex-wrap:wrap;}
  .row.crm .type,.crmstatus{width:calc(50% - 4px);}
  .row.crm .next{flex-basis:100%;}
}
@media (prefers-reduced-motion:reduce){
  .section{animation:none;} .progfill{transition:none;} .com-root .spinner{animation:none;}
}
`}</style>

}
