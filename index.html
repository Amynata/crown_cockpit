<script>
// ============================================================
//  CONFIG FIREBASE
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAxCUQmdcSJXue0VcMg9iTqWdSeCDa4O_U",
  authDomain: "crown-on-me-cockpit.firebaseapp.com",
  projectId: "crown-on-me-cockpit",
  storageBucket: "crown-on-me-cockpit.firebasestorage.app",
  messagingSenderId: "819009172478",
  appId: "1:819009172478:web:127b5dcb2ff89b8f9b86af",
  measurementId: "G-978P72FGFE"
};
// ============================================================

(function () {
  var KEY = "crownonme:cockpit:v2";
  var hasConfig = !!(firebaseConfig && firebaseConfig.apiKey);
  var params = new URLSearchParams(location.search);
  var readUid = params.get("read");
  var READONLY = !!readUid;
  window.__READONLY = READONLY;

  var db = null, auth = null, provider = null, authReady = Promise.resolve(null);
  var ownerValue = null;

  if (hasConfig) {
    try {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
      provider = new firebase.auth.GoogleAuthProvider();
      authReady = new Promise(function (res) {
        var first = true;
        auth.onAuthStateChanged(function (u) {
          renderBar(u);
          if (READONLY) startReadMode();
          if (first) { first = false; res(u); }
        });
      });
    } catch (e) { console.error("Firebase init:", e); }
  }

  function currentUser() { return (auth && auth.currentUser) ? auth.currentUser : null; }
  function uid() { var u = currentUser(); return u ? u.uid : null; }

  // ---- helpers pour le panneau Partage (propriétaire) ----
  window.__share = {
    get enabled() { return hasConfig && !READONLY && !!uid(); },
    get uid() { return uid(); },
    get link() { return location.origin + location.pathname + "?read=" + (uid() || ""); },
    getReaders: async function () {
      if (!hasConfig || !uid()) return [];
      try {
        var snap = await db.collection("cockpit").doc(uid()).get();
        return (snap.exists && snap.data() && Array.isArray(snap.data().readers)) ? snap.data().readers : [];
      } catch (e) { return []; }
    },
    setReaders: async function (list) {
      if (!hasConfig || !uid()) return;
      await db.collection("cockpit").doc(uid()).set({ readers: list }, { merge: true });
    }
  };

  // ---- stockage ----
  window.storage = {
    get: async function (key) {
      if (READONLY) { return ownerValue ? { value: ownerValue } : null; }
      if (hasConfig) {
        await authReady;
        var u = uid();
        if (u) {
          try {
            var ref = db.collection("cockpit").doc(u);
            var snap = await ref.get();
            if (snap.exists && snap.data() && typeof snap.data().value === "string") return { value: snap.data().value };
            var local = localStorage.getItem(key);
            if (local) { await ref.set({ value: local, updatedAt: Date.now() }, { merge: true }); return { value: local }; }
            return null;
          } catch (e) { console.error("Firestore get:", e); }
        }
      }
      var v = localStorage.getItem(key);
      return v ? { value: v } : null;
    },
    set: async function (key, value) {
      if (READONLY) return { ok: true };
      try { localStorage.setItem(key, value); } catch (e) {}
      var u = uid();
      if (hasConfig && u) {
        try { await db.collection("cockpit").doc(u).set({ value: value, updatedAt: Date.now() }, { merge: true }); }
        catch (e) { console.error("Firestore set:", e); }
      }
      return { ok: true };
    }
  };

  // ---- boîte de réception : n8n dépose, le cockpit ingère ----
  // n8n n'écrit JAMAIS dans cockpit/{uid} — un seul écrivain sur l'état.
  window.inbox = {
    get enabled() { return hasConfig && !READONLY && !!uid(); },
    list: async function () {
      if (!hasConfig || READONLY) return [];
      await authReady;
      var u = uid();
      if (!u) return [];
      try {
        var snap = await db.collection("cockpit_inbox").doc(u).collection("items").limit(20).get();
        var out = [];
        snap.forEach(function (d) { var v = d.data() || {}; v.__id = d.id; out.push(v); });
        return out;
      } catch (e) { console.error("Inbox list:", e); return []; }
    },
    remove: async function (id) {
      if (!hasConfig || READONLY) return false;
      var u = uid();
      if (!u || !id) return false;
      try {
        await db.collection("cockpit_inbox").doc(u).collection("items").doc(id).delete();
        return true;
      } catch (e) { console.error("Inbox remove:", e); return false; }
    }
  };

  // ---- mode lecture seule ----
  function showReadMsg(title, msg) {
    var r = document.getElementById("root");
    if (!r) return;
    var crown = '<svg viewBox="0 0 72 44" width="66" height="40" aria-hidden="true">'
      + '<path d="M6 38 L18 14 L27 28 L36 10 L45 28 L54 14 L66 38 Z" fill="#0d0d0b"></path>'
      + '<circle cx="18" cy="14" r="2.4" fill="#c9854a"></circle>'
      + '<circle cx="36" cy="10" r="2.6" fill="#c9854a"></circle>'
      + '<circle cx="54" cy="14" r="2.4" fill="#c9854a"></circle></svg>';
    r.innerHTML = '<div class="romsg">' + crown
      + '<div class="romsg-eyebrow">Crown On Me</div>'
      + '<h1 class="romsg-title">' + title + '</h1>'
      + '<p class="romsg-body">' + msg + '</p>'
      + '<p class="romsg-sign">Avec soin, Crown On Me</p></div>';
  }
  var readStarted = false;
  async function startReadMode() {
    await authReady;
    var u = currentUser();
    if (!u) { showReadMsg("Un aperçu, rien que pour toi", "Aminata t'a ouvert son cockpit <b>Crown On Me</b> en lecture seule. Connecte-toi avec Google (bouton en haut à droite) pour y jeter un œil."); return; }
    if (readStarted) return; readStarted = true;
    try {
      var snap = await db.collection("cockpit").doc(readUid).get();
      if (!snap.exists) { showReadMsg("Introuvable", "Ce cockpit partagé est introuvable — vérifie le lien avec Aminata."); return; }
      ownerValue = (snap.data() && typeof snap.data().value === "string") ? snap.data().value : null;
      var rootEl = document.getElementById("root");
      if (rootEl) rootEl.classList.add("readonly");
      if (typeof window.__runApp === "function") window.__runApp();
    } catch (e) {
      readStarted = false;
      showReadMsg("Presque !", "Ton adresse <b>" + (u.email || "") + "</b> n'est pas encore sur la liste. Demande à Aminata de l'ajouter, puis recharge la page.");
    }
  }

  function el(tag, cls, txt) { var e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }

  function renderBar(u) {
    var bar = document.getElementById("syncbar");
    if (!bar) return;
    bar.innerHTML = "";
    var left = el("div", "sb-left");
    var dot = el("span", "sb-dot");
    var status = el("span", "sb-status");

    if (READONLY) {
      dot.classList.add(u ? "synced" : "local");
      status.textContent = u ? ("Lecture seule — " + (u.email || "connectée")) : "Lecture seule — connecte-toi pour voir";
    } else if (!hasConfig) {
      dot.classList.add("local"); status.textContent = "Local — ajoute ta config Firebase pour synchroniser";
    } else if (u) {
      dot.classList.add("synced"); status.textContent = "Synchronisé — " + (u.email || "connectée");
    } else {
      dot.classList.add("local"); status.textContent = "Local — non connectée";
    }
    left.appendChild(dot); left.appendChild(status);

    var right = el("div", "sb-right");
    if (hasConfig && !u) {
      var bi = el("button", "sb-btn primary", "Se connecter avec Google");
      bi.onclick = function () { auth.signInWithPopup(provider).then(function () { location.reload(); }).catch(function (e) { alert("Connexion échouée : " + e.message); }); };
      right.appendChild(bi);
    }
    if (hasConfig && u) {
      var bo = el("button", "sb-btn", "Se déconnecter");
      bo.onclick = function () { auth.signOut().then(function () { location.reload(); }); };
      right.appendChild(bo);
    }
    if (!READONLY) {
      var bs = el("button", "sb-btn", "Sauvegarder .json");
      bs.onclick = async function () {
        var r = await window.storage.get(KEY);
        var data = (r && r.value) ? r.value : "{}";
        var blob = new Blob([data], { type: "application/json" });
        var a = document.createElement("a"); a.href = URL.createObjectURL(blob);
        a.download = "cockpit-sauvegarde.json"; a.click();
      };
      right.appendChild(bs);
      var br = el("button", "sb-btn", "Restaurer .json");
      br.onclick = function () {
        var inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json,application/json";
        inp.onchange = function () {
          var f = inp.files && inp.files[0]; if (!f) return;
          var rd = new FileReader();
          rd.onload = async function () {
            try { JSON.parse(rd.result); await window.storage.set(KEY, String(rd.result)); location.reload(); }
            catch (e) { alert("Fichier .json invalide."); }
          };
          rd.readAsText(f);
        };
        inp.click();
      };
      right.appendChild(br);
    }

    bar.appendChild(left); bar.appendChild(right);
  }

  renderBar(currentUser());
  if (READONLY && !hasConfig) showReadMsg("Indisponible", "Configuration manquante.");

  // ---- diagnostic auto ----
  setTimeout(function () {
    var root = document.getElementById("root");
    if (!root || root.childNodes.length > 0) return;
    function ok(b){ return b ? "OK" : "MANQUANT"; }
    var h = "<div style='padding:20px;font:13px/1.7 monospace;color:#0d0d0b;'>";
    h += "<b>Diagnostic — rien ne s'est affiché :</b><br><br>";
    h += "React : " + ok(typeof React !== "undefined") + "<br>";
    h += "ReactDOM : " + ok(typeof ReactDOM !== "undefined") + "<br>";
    h += "Recharts : " + ok(typeof Recharts !== "undefined") + "<br>";
    h += "Babel : " + ok(typeof Babel !== "undefined") + "<br><br>";
    if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Babel === "undefined")
      h += "Une librairie n'a pas pu se charger. Vérifie ta connexion / un bloqueur, puis recharge.";
    else h += "Librairies chargées mais l'app n'a pas démarré. Console (F12) &gt; copie les lignes rouges.";
    h += "</div>";
    root.innerHTML = h;
  }, 2500);
})();

</script>

const GROUPS = [
  { title: "Cadrage", keys: ["canvas", "pitch"] },
  { title: "Plan", keys: ["concept", "opportunite", "marche", "segments", "produit", "strategie", "concurrents", "marketing", "roadmap", "risques"] },

function isStarted(state, k) {
  return !!(state && state.touched && state.touched[k]);
}

const CRM_STATUS = ["À contacter", "En discussion", "Relance", "Positif", "Négatif"];

function monthLabels(start = new Date(), n = 6) {
  const out = [];
  const fmt = new Intl.DateTimeFormat("fr-FR", { month: "short", year: "2-digit" });
  for (let i = 0; i < n; i++) {
    const d = new Date(start.getFullYear(), start.getMonth() + i, 1);
    out.push(fmt.format(d).replace(".", ""));
  }
  return out;
}

const rid = (p) => `${p}-${Date.now()}-${_rid++}`;

function migrateCanvas(b) {
  const out = BMC_EMPTY();
  if (!b || typeof b !== "object") return out;
  Object.keys(out).forEach((k) => { if (typeof b[k] === "string") out[k] = b[k]; });
  const map = { valeur: "uvp", segments: "segments", canaux: "canaux", revenus: "revenus", couts: "couts" };
  Object.entries(map).forEach(([from, to]) => { if (b[from] && !out[to]) out[to] = b[from]; });
  return out;
}

/* ---------------- Crown ---------------- */
function Crown({ pct }) {
  const n = 7;
  const W = 210;
  const baseY = 54;
  const filled = Math.round((pct / 100) * n);
  const cxOf = (i) => 22 + i * ((W - 44) / (n - 1));
  const toothTop = (i) => baseY - (22 + 11 * Math.sin((Math.PI * i) / (n - 1)));
  return (
    <svg viewBox={`0 0 ${W} 80`} className="crown" role="img" aria-label={`Couronne remplie à ${pct}%`}>
      <path d={`M12 ${baseY} L${W - 12} ${baseY} L${W - 18} 74 L18 74 Z`} fill="var(--plum)" stroke="var(--plum-deep)" strokeWidth="1.5" />
      {Array.from({ length: n }).map((_, i) => {
        const cx = cxOf(i);
        const on = i < filled;
        return (
          <g key={i}>
            <polygon
              points={`${cx - 13},${baseY} ${cx + 13},${baseY} ${cx},${toothTop(i)}`}
              fill={on ? "var(--gold)" : "var(--band-faint)"}
              stroke={on ? "var(--gold-deep)" : "var(--band-line)"}
              strokeWidth="1.4"
              style={{ transition: "fill .4s ease, stroke .3s ease" }}
            />
            <circle cx={cx} cy={toothTop(i) + 4} r="2.8" fill={on ? "var(--gold-deep)" : "var(--band-line)"} />
          </g>
        );
      })}
      <circle cx={W / 2} cy={64} r="3.2" fill="var(--gold)" />
    </svg>
  );
}

/* ---------------- Share (lecture seule) ---------------- */
function ShareModal({ onClose }) {
  const share = (typeof window !== "undefined" && window.__share) || null;
  const [emails, setEmails] = useState([]);
  const [input, setInput] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [busy, setBusy] = useState(false);
  const [copied, setCopied] = useState(false);
  const link = share ? share.link : "";

  useEffect(() => {
    let ok = true;
    if (!share) { setLoaded(true); return; }
    (async () => {
      try { const r = await share.getReaders(); if (ok) setEmails(r || []); } catch (e) {}
      if (ok) setLoaded(true);
    })();
    return () => { ok = false; };
  }, []);

  const save = async (next) => {
    setEmails(next); setBusy(true);
    try { await share.setReaders(next); } catch (e) {}
    setBusy(false);
  };
  const add = () => {
    const e = input.trim().toLowerCase();
    if (!e || !e.includes("@") || emails.includes(e)) { setInput(""); return; }
    save([...emails, e]); setInput("");
  };
  const remove = (e) => save(emails.filter((x) => x !== e));
  const copy = () => {
    try { navigator.clipboard.writeText(link); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch (e) {}
  };

  const notReady = !share || !share.enabled;

  return (
    <div className="bmcmodal-scrim" onClick={onClose}>
      <div className="bmcmodal sharemodal" onClick={(e) => e.stopPropagation()}>
        <div className="bmcmodalhead">
          <span className="bmcicon big">↗</span>
          <h3>Partage en lecture seule</h3>
          <button className="bmcclose" onClick={onClose} aria-label="Fermer">×</button>
        </div>
        {notReady ? (
          <p className="bmcmodalq">Connecte-toi avec Google (barre du haut) pour gérer le partage.</p>
        ) : (
          <>
            <p className="bmcmodalq">Ajoute les <b>e-mails Google</b> des personnes autorisées. Elles pourront <b>voir</b> ton cockpit, sans le modifier.</p>
            <label className="implabel">E-mails autorisés</label>
            <div className="shareadd">
              <input placeholder="prenom@gmail.com" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") add(); }} />
              <button className="addbtn" onClick={add} disabled={!input.trim()}>Ajouter</button>
            </div>
            {!loaded ? (
              <p className="empty">Chargement…</p>
            ) : emails.length === 0 ? (
              <p className="empty">Personne pour l'instant.</p>
            ) : (
              <ul className="sharelist">
                {emails.map((e) => (
                  <li key={e}><span>{e}</span><button className="del" onClick={() => remove(e)} aria-label="Retirer">×</button></li>
                ))}
              </ul>
            )}
            <label className="implabel">Lien à partager</label>
            <div className="shareadd">
              <input readOnly value={link} onFocus={(e) => e.target.select()} />
              <button className="addbtn" onClick={copy}>{copied ? "Copié ✓" : "Copier"}</button>
            </div>
            <p className="imphint">Envoie ce lien à tes proches. Ils devront se connecter avec l'e-mail que tu as ajouté.{busy ? " · Enregistrement…" : ""}</p>
          </>
        )}
      </div>
    </div>
  );
}

/* ---- Import Markdown par section ---- */
/* Découpe un texte en éléments : puces (-, *, •), numérotés (1., 1-, 1)) ou lignes simples.
   Ne devine rien : un élément = une ligne de liste ou un paragraphe. */
function parseMdItems(txt) {
  const out = [];
  const lines = String(txt || "").split("\n");
  let cur = null;
  const push = () => { if (cur && cur.trim()) out.push(cur.trim().replace(/\s+/g, " ")); cur = null; };
  lines.forEach((raw) => {
    const l = raw.trim();
    if (!l) { push(); return; }
    if (/^#{1,6}\s/.test(l)) { push(); return; }              // titre → ignoré
    if (/^([-*_])\1{2,}$/.test(l)) { push(); return; }          // règle horizontale
    const m = /^(?:[-*•▪·]|\d+\s*[.)\-–])\s+(.*)$/.exec(l);
    if (m) { push(); cur = m[1]; return; }
    if (cur !== null) cur += " " + l;                           // continuation
    else cur = l;                                               // ligne simple
  });
  push();
  return out.filter((s) => s.length > 1);
}

/* Où un import peut atterrir, par section */
const IMPORT_INTO = {
  hypotheses: [
    { id: "hypotheses", label: "Hypothèses" },
    { id: "problemes", label: "Problématiques" },
    { id: "opportunites", label: "Opportunités" },
  ],
  segments: [
    { id: "segments", label: "Segments" },
    { id: "personas", label: "Personas" },
  ],
  tech: [
    { id: "services", label: "Intégrations & services" },
    { id: "decisions", label: "Décisions techniques" },
    { id: "chantiers", label: "Chantiers" },
  ],
};

function SectionImport({ k, state, api }) {
  const targets = IMPORT_INTO[k] || null;
  const isText = !targets;
  const [open, setOpen] = useState(false);
  const [txt, setTxt] = useState("");
  const [into, setInto] = useState(targets ? targets[0].id : "body");
  const [mode, setMode] = useState("append");
  const [sel, setSel] = useState([]);
  const [step, setStep] = useState("paste");
  const s = SECTIONS[k];
  const allowed = targets || s.type === "text" || s.type === "finances";

  const items = parseMdItems(txt);

  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { setTxt(String(r.result || "")); };
    r.readAsText(f);
  };

  const goPick = () => {
    const it = parseMdItems(txt);
    setSel(it.map((_, i) => i));
    setStep("pick");
  };

  const toggle = (i) => setSel(sel.indexOf(i) >= 0 ? sel.filter((x) => x !== i) : [...sel, i]);
  const chosen = () => items.filter((_, i) => sel.indexOf(i) >= 0);

  const reset = () => { setTxt(""); setSel([]); setStep("paste"); setOpen(false); };

  if (!allowed) return null;

  const doTextImport = () => {
    const cur = (state.fields[k] && state.fields[k].body) || "";
    const val = mode === "replace" ? txt.trim() : cur ? cur + "\n\n" + txt.trim() : txt.trim();
    api.setField(k, "body", val);
    reset();
  };

  const doItemsImport = () => {
    const list = chosen();
    if (!list.length) return;
    if (into === "hypotheses") {
      api.setHypotheses([
        ...(state.hypotheses || []),
        ...list.map((t) => ({ id: rid("hy"), open: false, claim: t, type: "probleme", status: "atester", importance: "high", certainty: "low", note: "", method: "", next: "", preuve: "", probs: [], crit: false })),
      ]);
    } else if (into === "problemes" || into === "opportunites") {
      const dv = state.discovery && Array.isArray(state.discovery.problems) ? state.discovery : DEFAULT_DISCOVERY();
      if (into === "problemes") {
        api.setDiscovery({ ...dv, problems: [...(dv.problems || []), ...list.map((t) => ({ id: rid("pb"), intitule: t, cluster: "", priorite: "nonprio", open: false, verbatims: [] }))] });
      } else {
        api.setDiscovery({ ...dv, opps: [...(dv.opps || []), ...list.map((t) => ({ id: rid("op"), intitule: t, probs: [], statut: "emergente", source: "", open: false }))] });
      }
    } else if (into === "segments" || into === "personas") {
      const sp = state.segper || DEFAULT_SEGPER();
      if (into === "segments") api.setSegper({ ...sp, segments: [...(sp.segments || []), ...list.map((t) => ({ id: rid("sg"), name: t, type: "B2C", size: "", need: "", note: "" }))] });
      else api.setSegper({ ...sp, personas: [...(sp.personas || []), ...list.map((t) => ({ id: rid("pe"), name: t, tagline: "", type: "B2C", context: "", goals: "", pains: "", quote: "" }))] });
    } else if (into === "services" || into === "decisions" || into === "chantiers") {
      const tc = state.tech || DEFAULT_TECH();
      if (into === "services") api.setTech({ ...tc, services: [...(tc.services || []), ...list.map((t) => ({ id: rid("sv"), name: t, role: "", status: "À intégrer" }))] });
      else if (into === "decisions") api.setTech({ ...tc, decisions: [...(tc.decisions || []), ...list.map((t) => ({ id: rid("dc"), decision: t, why: "", date: "" }))] });
      else api.setTech({ ...tc, chantiers: [...(tc.chantiers || []), ...list.map((t) => ({ id: rid("ch"), label: t, status: "À faire" }))] });
    }
    reset();
  };

  return (
    <div className="secexportwrap">
      <button className={"secexport" + (open ? " on" : "")} onClick={() => setOpen((o) => !o)}>Importer</button>
      {open && (
        <div className="secexportpop secimportpop">
          {step === "paste" ? (
            <>
              <span className="sxlbl">Coller du Markdown / texte</span>
              <textarea className="sximp" rows={6} value={txt} placeholder={"- Hypothèse 1\n- Hypothèse 2\n1- Ça marche aussi"} onChange={(e) => setTxt(e.target.value)} />
              <label className="sxfile">
                <input type="file" accept=".md,.txt,text/markdown,text/plain" onChange={onFile} />
                <span>ou choisir un fichier .md / .txt</span>
              </label>
              {isText ? (
                <>
                  <div className="sxmodes">
                    <button className={mode === "append" ? "on" : ""} onClick={() => setMode("append")}>À la suite</button>
                    <button className={mode === "replace" ? "on" : ""} onClick={() => setMode("replace")}>Remplacer</button>
                  </div>
                  <div className="sxactions">
                    <button className="sxcopy" disabled={!txt.trim()} onClick={doTextImport}>Importer le texte</button>
                  </div>
                </>
              ) : (
                <div className="sxactions">
                  <span className="sxcount">{items.length} détecté{items.length > 1 ? "s" : ""}</span>
                  <button className="sxcopy" disabled={!items.length} onClick={goPick}>Suivant →</button>
                </div>
              )}
            </>
          ) : (
            <>
              <span className="sxlbl">Importer dans</span>
              <select className="sxinto" value={into} onChange={(e) => setInto(e.target.value)}>
                {targets.map((t) => <option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
              <span className="sxlbl">Éléments ({sel.length}/{items.length})</span>
              <div className="sxitems">
                {items.map((t, i) => (
                  <label className={"sxitem" + (sel.indexOf(i) >= 0 ? " on" : "")} key={i}>
                    <input type="checkbox" checked={sel.indexOf(i) >= 0} onChange={() => toggle(i)} />
                    <span>{t}</span>
                  </label>
                ))}
              </div>
              <div className="sxactions">
                <button className="sxmini" onClick={() => setSel(items.map((_, i) => i))}>Tout</button>
                <button className="sxmini" onClick={() => setSel([])}>Rien</button>
                <button className="sxmini" onClick={() => setStep("paste")}>←</button>
                <button className="sxcopy" disabled={!sel.length} onClick={doItemsImport}>Importer {sel.length}</button>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function SectionExport({ k, state }) {
  const blocks = SECTION_BLOCKS[k] || null;
  const [open, setOpen] = useState(false);
  const [sel, setSel] = useState(blocks ? blocks.map(([b]) => b) : []);
  const [done, setDone] = useState(false);

  const copy = async (list) => {
    const body = sectionMd(state, k, list || null).trim();
    const md = `# ${SECTIONS[k].label}\n\n` + (body ? body + "\n" : "_(vide)_\n");
    try {
      await navigator.clipboard.writeText(md);
      setDone(true);
      setTimeout(() => { setDone(false); setOpen(false); }, 1400);
    } catch (e) {}
  };

  if (!blocks) {
    return <button className="secexport" onClick={() => copy(null)}>{done ? "Copié ✓" : "Exporter"}</button>;
  }

  const toggle = (b) => setSel(sel.indexOf(b) >= 0 ? sel.filter((x) => x !== b) : [...sel, b]);

  return (
    <div className="secexportwrap">
      <button className={"secexport" + (open ? " on" : "")} onClick={() => setOpen((o) => !o)}>{done ? "Copié ✓" : "Exporter"}</button>
      {open && (
        <div className="secexportpop">
          <span className="sxlbl">Quels blocs ?</span>
          {blocks.map(([b, label]) => (
            <label className="sxopt" key={b}>
              <input type="checkbox" checked={sel.indexOf(b) >= 0} onChange={() => toggle(b)} />
              {label}
            </label>
          ))}
          <div className="sxactions">
            <button className="sxmini" onClick={() => setSel(blocks.map(([b]) => b))}>Tout</button>
            <button className="sxcopy" onClick={() => copy(sel)} disabled={!sel.length}>Copier</button>
          </div>
        </div>
      )}
    </div>
  );
}

      {s.type === "hypotheses" && <DiscoveryModule discovery={state.discovery || DEFAULT_DISCOVERY()} setDiscovery={setDiscovery} hypotheses={state.hypotheses || []} setHypotheses={setHypotheses} />}
      {s.type === "bmc" && <BMCModule bmc={state.bmc || {}} setBmc={setBmc} />}
      {s.type === "pricing" && <PricingModule pricing={state.pricing || { tiers: [] }} setPricing={setPricing} />}

/* ---------------- Pitch : édition + aperçu éditorial ---------------- */
function PitchModule({ s, vals, setField }) {

  const empty = s.fields.filter(([fk]) => !(vals[fk] && vals[fk].trim()));
  const [edit, setEdit] = useState(filled.length === 0);

  return (
    <div className="pitchmod">
      <div className="segperbar">
        <button className={"rmedit" + (edit ? " on" : "")} onClick={() => setEdit((e) => !e)}>{edit ? "Aperçu" : "Éditer"}</button>
      </div>

        <div className="fieldstack">
          {s.fields.map(([fk, label, hint]) => (
            <div className="field" key={fk}>
              <label>{label}</label>

          ))}
        </div>

        <p className="empty">Rien à afficher. Clique « Éditer » pour rédiger ton pitch.</p>
      ) : (
        <div className="pitchpreview">
          {filled.map(([fk, label], i) => (
            <div className="pitchpart" key={fk}>

          )}
        </div>
      )}

  );
}

/* ---------------- Finance module ---------------- */
function FinanceModule({ fin, setFinance, notes, setNotes }) {
  const months = fin.months;
  const capital = num(fin.capital);

  let running = capital;
  let cumProfit = 0;
  let beLabel = null;
  const data = months.map((m) => {
    const r = num(m.revenue);
    const e = num(m.expense);
    running += r - e;
    cumProfit += r - e;
    if (beLabel === null && (r || e) && cumProfit >= 0) beLabel = m.label;
    return { name: m.label || "—", revenue: r, expense: e, cash: Math.round(running) };
  });

  const totalRev = months.reduce((a, m) => a + num(m.revenue), 0);
  const totalExp = months.reduce((a, m) => a + num(m.expense), 0);
  const net = totalRev - totalExp;
  const hasData = totalRev > 0 || totalExp > 0 || capital > 0;

  const upd = (i, key, v) => setFinance({ ...fin, months: months.map((m, idx) => (idx === i ? { ...m, [key]: v } : m)) });
  const addMonth = () => {
    const last = months[months.length - 1];
    setFinance({ ...fin, months: [...months, { label: last ? last.label + " +" : "Mois", revenue: "", expense: "" }] });
  };
  const delMonth = (i) => setFinance({ ...fin, months: months.filter((_, idx) => idx !== i) });

  return (
    <div className="finance">
      <div className="statcards">
        <StatCard label="Capital / apports" value={eur(capital)} tone="capital" />
        <StatCard label="Revenus totaux" value={eur(totalRev)} tone="rev" />
        <StatCard label="Dépenses totales" value={eur(totalExp)} tone="exp" />
        <StatCard label="Résultat net" value={eur(net)} tone={net >= 0 ? "pos" : "neg"} />
      </div>

      <div className="block chartblock">
        <div className="blockhead">
          <h3>Trésorerie & rentabilité</h3>
          {beLabel && <span className="betag">Break-even : {beLabel}</span>}
        </div>
        {hasData ? (
          <div className="chartwrap">
            <ResponsiveContainer width="100%" height={280}>
              <ComposedChart data={data} margin={{ top: 10, right: 8, left: 0, bottom: 0 }}>
                <CartesianGrid stroke="#e9dcc4" vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize: 11, fill: "#5c4351" }} tickLine={false} axisLine={{ stroke: "#e3d3bb" }} />
                <YAxis tick={{ fontSize: 11, fill: "#5c4351" }} tickLine={false} axisLine={false} width={54} tickFormatter={(v) => eur(v)} />
                <Tooltip formatter={(v, n) => [eur(v), n === "revenue" ? "Revenus" : n === "expense" ? "Dépenses" : "Trésorerie"]} contentStyle={{ borderRadius: 10, border: "1px solid #e3d3bb", fontSize: 12 }} />
                {beLabel && <ReferenceLine x={beLabel} stroke={CHART.be} strokeDasharray="4 3" label={{ value: "Break-even", fill: CHART.be, fontSize: 11, position: "top" }} />}
                <Bar dataKey="revenue" name="revenue" fill={CHART.revenue} radius={[3, 3, 0, 0]} maxBarSize={22} />
                <Bar dataKey="expense" name="expense" fill={CHART.expense} radius={[3, 3, 0, 0]} maxBarSize={22} />
                <Line type="monotone" dataKey="cash" name="cash" stroke={CHART.cash} strokeWidth={2.4} dot={{ r: 2.5 }} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        ) : (
          <p className="empty">Remplis le tableau ci-dessous et le graphe s’anime tout seul.</p>
        )}
      </div>

      <div className="block">
        <div className="blockhead">
          <h3>Hypothèses mensuelles</h3>
        </div>
        <div className="field short capfield">
          <label htmlFor="fin-capital">Capital initial / apports</label>
          <input id="fin-capital" inputMode="decimal" placeholder="€" value={fin.capital} onChange={(e) => setFinance({ ...fin, capital: e.target.value })} />
        </div>
        <div className="montable">
          <div className="mrow head">
            <span>Mois</span>
            <span>Revenus</span>
            <span>Dépenses</span>
            <span>Net</span>
            <span />
          </div>
          {months.map((m, i) => {
            const netM = num(m.revenue) - num(m.expense);
            return (
              <div className="mrow" key={i}>
                <input className="mlabel" value={m.label} onChange={(e) => upd(i, "label", e.target.value)} />
                <input inputMode="decimal" placeholder="0" value={m.revenue} onChange={(e) => upd(i, "revenue", e.target.value)} />
                <input inputMode="decimal" placeholder="0" value={m.expense} onChange={(e) => upd(i, "expense", e.target.value)} />
                <span className={"mnet " + (netM >= 0 ? "pos" : "neg")}>{eur(netM)}</span>
                <button className="del" onClick={() => delMonth(i)} aria-label="Supprimer le mois">×</button>
              </div>
            );
          })}
        </div>
        <button className="addrow" onClick={addMonth}>+ Ajouter un mois</button>
      </div>

      <div className="block">
        <div className="blockhead"><h3>Notes financières</h3></div>
        <NotesEditor rows={4} placeholder="Postes de coûts, hypothèses de croissance, besoin en capital et à quoi il sert…" value={notes} onChange={(v) => setNotes(v)} />
      </div>
    </div>
  );
}

function StatCard({ label, value, tone }) {
  return (
    <div className={"statcard tone-" + tone}>
      <span className="statlabel">{label}</span>
      <span className="statvalue">{value}</span>
    </div>
  );
}

/* ---------------- Roadmap ---------------- */
function RoadmapModule({ phases, setRoadmap }) {
  const [edit, setEdit] = useState(false);
  const [open, setOpen] = useState({}); // featureId -> bool
  const [sel, setSel] = useState("all"); // "all" | phaseId

  const totalF = phases.reduce((a, p) => a + p.features.length, 0);
  const doneF = phases.reduce((a, p) => a + p.features.filter((f) => f.done).length, 0);

  const patchPhase = (pid, patch) => setRoadmap(phases.map((p) => (p.id === pid ? { ...p, ...patch } : p)));
  const patchFeature = (pid, fid, patch) =>
    setRoadmap(
      phases.map((p) =>
        p.id === pid ? { ...p, features: p.features.map((f) => (f.id === fid ? { ...f, ...patch } : f)) } : p
      )
    );
  const addFeature = (pid) =>
    setRoadmap(
      phases.map((p) =>
        p.id === pid ? { ...p, features: [...p.features, { id: rid("ft"), name: "Nouvelle feature", desc: "", seg: null, done: false }] } : p
      )
    );
  const delFeature = (pid, fid) =>
    setRoadmap(phases.map((p) => (p.id === pid ? { ...p, features: p.features.filter((f) => f.id !== fid) } : p)));
  const addPhase = () =>
    setRoadmap([...phases, { id: rid("ph"), tag: "Phase " + (phases.length + 1), title: "Nouvelle phase", subtitle: "", timeframe: "", features: [] }]);
  const delPhase = (pid) => {
    if (sel === pid) setSel("all");
    setRoadmap(phases.filter((p) => p.id !== pid));
  };
  const toggleOpen = (fid) => setOpen((o) => ({ ...o, [fid]: !o[fid] }));

  const [drag, setDrag] = useState(null); // { pid, fid }
  const moveFeature = (toPid, toFid) => {
    if (!drag) return;
    const fromPid = drag.pid, fromFid = drag.fid;
    if (fromPid === toPid && fromFid === toFid) { setDrag(null); return; }
    let moved = null;
    let next = phases.map((p) => {
      if (p.id !== fromPid) return p;
      const idx = p.features.findIndex((f) => f.id === fromFid);
      if (idx < 0) return p;
      moved = p.features[idx];
      return { ...p, features: p.features.filter((f) => f.id !== fromFid) };
    });
    if (!moved) { setDrag(null); return; }
    next = next.map((p) => {
      if (p.id !== toPid) return p;
      const feats = [...p.features];
      const ti = toFid ? feats.findIndex((f) => f.id === toFid) : feats.length;
      feats.splice(ti < 0 ? feats.length : ti, 0, moved);
      return { ...p, features: feats };
    });
    setRoadmap(next);
    setDrag(null);
  };

  const shown = sel === "all" ? phases : phases.filter((p) => p.id === sel);
  const usedSegs = Array.from(new Set(phases.flatMap((p) => p.features.map((f) => f.seg).filter(Boolean))));

  return (
    <div className="roadmap">
      <div className="rmbar">
        <span className="rmcount">
          {doneF}/{totalF} features · {phases.length} phases
        </span>
        <button className={"rmedit" + (edit ? " on" : "")} onClick={() => setEdit((e) => !e)}>
          {edit ? "Aperçu" : "Éditer"}
        </button>
      </div>

      {/* Timeline chronologique */}
      <div className="rmtimeline">
        <button className={"tlall" + (sel === "all" ? " on" : "")} onClick={() => setSel("all")}>
          Toutes
        </button>
        <div className="tlaxis">
          {phases.map((p) => {
            const pd = p.features.length && p.features.every((f) => f.done);
            return (
              <button key={p.id} className={"tlnode" + (sel === p.id ? " on" : "") + (pd ? " done" : "")} onClick={() => setSel(p.id)}>
                <span className="tldot" />
                <span className="tltag">{p.tag}</span>
                {p.timeframe && <span className="tltime">{p.timeframe}</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Légende segments */}
      {usedSegs.length > 0 && (
        <div className="seglegend">
          {usedSegs.map((k) => {
            const seg = SEGMENTS[k];
            if (!seg) return null;
            return (
              <span key={k} className="segchip" style={{ color: seg.color, borderColor: seg.color + "55", background: seg.color + "14" }}>
                {seg.name}
              </span>
            );
          })}
        </div>
      )}

      {shown.map((p) => {
        const pi = phases.indexOf(p);
        const pDone = p.features.length && p.features.every((f) => f.done);
        return (
          <div className={"phase" + (pDone ? " complete" : "")} key={p.id}>
            <div className="phasehead">
              <span className="phasenum">{pi + 1}</span>
              {edit ? (
                <div className="phaseedit">
                  <input className="ptag" value={p.tag} placeholder="Phase" onChange={(e) => patchPhase(p.id, { tag: e.target.value })} />
                  <input className="ptitle" value={p.title} placeholder="Titre" onChange={(e) => patchPhase(p.id, { title: e.target.value })} />
                  <input className="psub" value={p.subtitle} placeholder="Sous-titre" onChange={(e) => patchPhase(p.id, { subtitle: e.target.value })} />
                  <input className="ptime" value={p.timeframe} placeholder="Horizon (ex. 3–6 mois)" onChange={(e) => patchPhase(p.id, { timeframe: e.target.value })} />
                  <button className="del phasedel" onClick={() => delPhase(p.id)} aria-label="Supprimer la phase">×</button>
                </div>
              ) : (
                <div className="phaseinfo">
                  <div className="phasetop">
                    <span className="ptagchip">{p.tag}</span>
                    <h3>{p.title}</h3>
                    {p.timeframe && <span className="ptimechip">{p.timeframe}</span>}
                  </div>
                  {p.subtitle && <p className="psubtxt">{p.subtitle}</p>}
                  <div className="phasebar">
                    <div
                      className="phasefill"
                      style={{ width: (p.features.length ? (p.features.filter((f) => f.done).length / p.features.length) * 100 : 0) + "%" }}
                    />
                  </div>
                </div>
              )}
            </div>

            <ul className="features" onDragOver={(e) => e.preventDefault()} onDrop={() => moveFeature(p.id, null)}>
              {p.features.map((f) => {
                const seg = f.seg ? SEGMENTS[f.seg] : null;
                return (
                  <li
                    className={"feature" + (f.done ? " done" : "") + (open[f.id] ? " open" : "") + (drag && drag.fid === f.id ? " dragging" : "")}
                    key={f.id}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={(e) => { e.stopPropagation(); moveFeature(p.id, f.id); }}
                  >
                    <div className="featurerow">
                      <span
                        className="draghandle"
                        draggable
                        onDragStart={() => setDrag({ pid: p.id, fid: f.id })}
                        onDragEnd={() => setDrag(null)}
                        title="Glisser pour déplacer"
                        aria-label="Déplacer"
                      >⠿</span>
                      <button
                        className={"donedot" + (f.done ? " on" : "")}
                        onClick={() => patchFeature(p.id, f.id, { done: !f.done })}
                        aria-label={f.done ? "Marquer non fait" : "Marquer fait"}
                        title={f.done ? "Fait" : "À faire"}
                      >
                        {f.done ? "✓" : ""}
                      </button>
                      {edit ? (
                        <input className="fname" value={f.name} onChange={(e) => patchFeature(p.id, f.id, { name: e.target.value })} />
                      ) : (
                        <button className="fname btn" onClick={() => toggleOpen(f.id)}>
                          <span className="fnametext">{f.name}</span>
                          {seg && (
                            <span className="segchip mini" style={{ color: seg.color, borderColor: seg.color + "55", background: seg.color + "14" }}>
                              {seg.name}
                            </span>
                          )}
                          <span className="chev">{open[f.id] ? "−" : "+"}</span>
                        </button>
                      )}
                      {edit && (
                        <button className="del" onClick={() => delFeature(p.id, f.id)} aria-label="Supprimer la feature">×</button>
                      )}
                    </div>
                    {edit ? (
                      <div className="feditrow">
                        <select className="segselect" value={f.seg || ""} onChange={(e) => patchFeature(p.id, f.id, { seg: e.target.value || null })}>
                          <option value="">Sans segment</option>
                          {Object.entries(SEGMENTS).map(([kk, v]) => (
                            <option key={kk} value={kk}>{v.name}</option>
                          ))}
                        </select>
                        <textarea
                          className="fdesc-edit"
                          rows={2}
                          placeholder="Description de la feature…"
                          value={f.desc}
                          onChange={(e) => patchFeature(p.id, f.id, { desc: e.target.value })}
                        />
                      </div>
                    ) : (
                      open[f.id] && <p className="fdesc">{f.desc || "Pas encore de description."}</p>
                    )}
                  </li>
                );
              })}
            </ul>

            {edit && (
              <button className="addrow" onClick={() => addFeature(p.id)}>
                + Ajouter une feature
              </button>
            )}
          </div>
        );
      })}

      {edit && (
        <button className="addphase" onClick={addPhase}>
          + Ajouter une phase
        </button>
      )}
    </div>
  );
}

/* ---------------- Competitors ---------------- */
function CompetitorsModule({ data, setData, notes, setNotes }) {
  const [edit, setEdit] = useState(false);
  const cols = data.cols || [];
  const rows = data.rows || [];

  const setCol = (ci, v) => setData({ ...data, cols: cols.map((c, i) => (i === ci ? v : c)) });
  const setCell = (ri, ci, v) =>
    setData({ ...data, rows: rows.map((r, i) => (i === ri ? { ...r, cells: r.cells.map((c, j) => (j === ci ? v : c)) } : r)) });
  const setCrit = (ri, v) => setData({ ...data, rows: rows.map((r, i) => (i === ri ? { ...r, crit: v } : r)) });
  const addCol = () =>
    setData({ ...data, cols: [...cols, "Concurrent"], rows: rows.map((r) => ({ ...r, cells: [...r.cells, ""] })) });
  const delCol = (ci) =>
    setData({ ...data, cols: cols.filter((_, i) => i !== ci), rows: rows.map((r) => ({ ...r, cells: r.cells.filter((_, j) => j !== ci) })) });
  const addRow = () => setData({ ...data, rows: [...rows, { crit: "Nouveau critère", cells: cols.map(() => "") }] });
  const delRow = (ri) => setData({ ...data, rows: rows.filter((_, i) => i !== ri) });

  return (
    <div className="competitors">
      <div className="rmbar">
        <span className="rmcount">{cols.length} acteurs · {rows.length} critères</span>
        <button className={"rmedit" + (edit ? " on" : "")} onClick={() => setEdit((e) => !e)}>
          {edit ? "Aperçu" : "Éditer"}
        </button>
      </div>

      <div className="cmpscroll">
        <table className="cmptable">
          <thead>
            <tr>
              <th className="critcol">Critère</th>
              {cols.map((c, ci) => (
                <th key={ci} className={ci === 0 ? "uscol" : ""}>
                  {edit ? (
                    <div className="thedit">
                      <input value={c} onChange={(e) => setCol(ci, e.target.value)} />
                      {cols.length > 1 && (
                        <button className="del" onClick={() => delCol(ci)} aria-label="Retirer ce concurrent">×</button>
                      )}
                    </div>
                  ) : (
                    <span>{c}</span>
                  )}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((r, ri) => (
              <tr key={ri}>
                <th scope="row" className="critcol">
                  {edit ? (
                    <div className="thedit">
                      <input value={r.crit} onChange={(e) => setCrit(ri, e.target.value)} />
                      <button className="del" onClick={() => delRow(ri)} aria-label="Retirer ce critère">×</button>
                    </div>
                  ) : (
                    r.crit
                  )}
                </th>
                {r.cells.map((cell, ci) => (
                  <td key={ci} className={ci === 0 ? "uscol" : ""}>
                    {edit ? (
                      <textarea rows={2} value={cell} onChange={(e) => setCell(ri, ci, e.target.value)} />
                    ) : (
                      <span className="cellval">{cell}</span>
                    )}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {edit && (
        <div className="cmpbtns">
          <button className="addrow" onClick={addRow}>+ Critère</button>
          <button className="addrow" onClick={addCol}>+ Concurrent</button>
        </div>
      )}

      <div className="edge">
        <span className="edgeicon">★</span>
        <div className="edgebody">
          <p className="edgelabel">Avantage différenciateur</p>
          {edit ? (
            <textarea rows={4} value={data.edge || ""} onChange={(e) => setData({ ...data, edge: e.target.value })} />
          ) : (
            <p className="edgetext">{data.edge}</p>
          )}
        </div>
      </div>

      <div className="block">
        <div className="blockhead"><h3>Notes concurrence</h3></div>
        <NotesEditor rows={3} placeholder="Veille, nouveaux entrants, angles à creuser…" value={notes} onChange={(v) => setNotes(v)} />
      </div>
    </div>
  );
}

/* ---------------- Discovery (Problématiques → Hypothèses → Opportunités) ---------------- */
function dbadge(cfg) {
  if (cfg.fill) return { color: "#fff", background: cfg.color, borderColor: cfg.color };
  return {
    color: cfg.color,
    background: cfg.color + "12",
    borderColor: cfg.color + (cfg.dashed ? "88" : "55"),
    borderStyle: cfg.dashed ? "dashed" : "solid",
    textDecoration: cfg.strike ? "line-through" : "none",
  };
}

function ClusterFilter({ clusters, cf, setCf }) {
  return (
    <div className="discofilter">
      <span className="discofilterlbl">Cluster</span>
      <div className="filterbar">
        <button className={cf === "all" ? "on" : ""} onClick={() => setCf("all")}>Tous</button>
        {clusters.map((c) => (
          <button key={c.id} className={cf === c.id ? "on" : ""} title={c.label || "(sans nom)"} onClick={() => setCf(c.id)}>{c.label || "(sans nom)"}</button>
        ))}
        <button className={cf === "none" ? "on" : ""} onClick={() => setCf("none")}>Non rattaché</button>
      </div>
    </div>
  );
}

function ProblemsBlock({ d, upd, cf, hypsFor, oppsFor }) {
  const [editCl, setEditCl] = useState(false);
  const problems = d.problems;
  const addProb = () => upd({ problems: [...problems, { id: rid("pb"), intitule: "", cluster: "", priorite: "nonprio", open: true }] });
  const patchProb = (id, p) => upd({ problems: problems.map((x) => (x.id === id ? { ...x, ...p } : x)) });
  const delProb = (id) => upd({ problems: problems.filter((x) => x.id !== id) });
  const addCluster = () => upd({ clusters: [...d.clusters, { id: rid("cl"), label: "" }] });
  const patchCluster = (id, label) => upd({ clusters: d.clusters.map((c) => (c.id === id ? { ...c, label } : c)) });
  const delCluster = (id) => upd({ clusters: d.clusters.filter((c) => c.id !== id), problems: problems.map((p) => (p.cluster === id ? { ...p, cluster: "" } : p)) });

  const shown = problems.filter((p) => (cf === "all" ? true : cf === "none" ? !p.cluster : p.cluster === cf));

  return (
    <div className="probs">
      <div className="discohead">
        <h3>Problématiques</h3>
        <span className="discohint">L'ossature — la friction, formulée comme douleur client. La priorité vient du terrain.</span>
      </div>

      <div className="rmbar">
        <span className="rmcount">{problems.length} problématique{problems.length > 1 ? "s" : ""}</span>
        <div className="rmbaractions">
          <button className="miniaction" onClick={() => setEditCl((e) => !e)}>{editCl ? "Fermer les clusters" : "Éditer les clusters"}</button>
          <button className="addrow" onClick={addProb}>+ Problématique</button>
        </div>
      </div>

      {editCl && (
        <div className="clusteredit">
          {d.clusters.map((c) => (
            <div className="row" key={c.id}>
              <input className="grow" value={c.label} placeholder="Nom du cluster" onChange={(e) => patchCluster(c.id, e.target.value)} />
              <button className="del" onClick={() => delCluster(c.id)} aria-label="Retirer le cluster">×</button>
            </div>
          ))}
          <button className="addrow" onClick={addCluster}>+ Cluster</button>
        </div>
      )}

      {shown.length === 0 && <p className="empty">Aucune problématique{cf !== "all" ? " dans ce filtre" : ""}. Elles se remplissent au fil du terrain.</p>}

      {shown.map((p) => {
        const pr = PROB_PRIORITY[p.priorite] || PROB_PRIORITY.nonprio;
        const nh = hypsFor(p.id).length, no = oppsFor(p.id).length;
        const clab = p.cluster ? ((d.clusters.find((c) => c.id === p.cluster) || {}).label || "cluster inconnu") : "";
        return (
          <div className="probcard" key={p.id}>
            <div className="probhead">
              <span className="probbadge" style={dbadge(pr)}>{pr.label}</span>
              <button className="hclaimbtn" onClick={() => patchProb(p.id, { open: !p.open })}>
                <span className="hclaimtext">{p.intitule || "Nouvelle problématique — clique pour éditer"}</span>
                <span className="chev">{p.open ? "−" : "+"}</span>
              </button>
            </div>
            <div className="probmeta">
              {p.cluster ? <span className="probcluster">{clab}</span> : <span className="probcluster muted">sans cluster</span>}
              <span className="probretro">{nh} hypothèse{nh > 1 ? "s" : ""} · {no} opportunité{no > 1 ? "s" : ""} liées</span>
              {(p.verbatims || []).length > 0 && <span className="probvbc">{p.verbatims.length} verbatim{p.verbatims.length > 1 ? "s" : ""}</span>}
            </div>
            {p.open && (
              <div className="hbody">
                <div className="field">
                  <label>Intitulé — la friction, comme douleur client</label>
                  <textarea rows={2} value={p.intitule} placeholder="Ex. La cliente ne sait pas à quoi ressemblera le résultat avant de payer" onChange={(e) => patchProb(p.id, { intitule: e.target.value })} />
                </div>
                <div className="hselrow">
                  <div className="field">
                    <label>Cluster</label>
                    <select value={p.cluster} onChange={(e) => patchProb(p.id, { cluster: e.target.value })}>
                      <option value="">— non classé —</option>
                      {d.clusters.map((c) => <option key={c.id} value={c.id}>{c.label || "(sans nom)"}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Priorité</label>
                    <select value={p.priorite} onChange={(e) => patchProb(p.id, { priorite: e.target.value })}>
                      {Object.entries(PROB_PRIORITY).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </div>
                </div>
                {(p.verbatims || []).length > 0 && (
                  <div className="field">
                    <label>Verbatims — issus du board</label>
                    <div className="probvbs">
                      {p.verbatims.map((v, i) => (
                        <p className="probvb" key={i}>« {v.text} »{v.src && <span> — {v.src}</span>}</p>
                      ))}
                    </div>
                  </div>
                )}
                <p className="linkhint">Interviews liées : — <span className="muted">(compteur automatique au prochain livrable — le protocole d'interview)</span></p>
                <button className="del hdel" onClick={() => delProb(p.id)} aria-label="Supprimer la problématique">Supprimer</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function OppsBlock({ d, upd, cf }) {
  const opps = d.opps, problems = d.problems;
  const addOpp = () => upd({ opps: [...opps, { id: rid("op"), intitule: "", probs: [], statut: "emergente", source: "", open: true }] });
  const patchOpp = (id, p) => upd({ opps: opps.map((x) => (x.id === id ? { ...x, ...p } : x)) });
  const delOpp = (id) => upd({ opps: opps.filter((x) => x.id !== id) });
  const toggleP = (o, pid) => { const cur = o.probs || []; patchOpp(o.id, { probs: cur.includes(pid) ? cur.filter((x) => x !== pid) : [...cur, pid] }); };
  const setStatutGuarded = (o, val) => { if (val === "confirmee" && !(o.source && o.source.trim())) return; patchOpp(o.id, { statut: val }); };

  const clusterOf = (pid) => (problems.find((p) => p.id === pid) || {}).cluster || "";
  const shown = opps.filter((o) => (cf === "all" ? true : cf === "none" ? (o.probs || []).length === 0 : (o.probs || []).some((pid) => clusterOf(pid) === cf)));

  return (
    <div className="opps">
      <div className="discohead">
        <h3>Opportunités</h3>
        <span className="discohint">L'espace à saisir — formulé comme opportunité, pas comme solution. N'émerge que du terrain.</span>
      </div>
      <div className="rmbar">
        <span className="rmcount">{opps.length} opportunité{opps.length > 1 ? "s" : ""}</span>
        <button className="addrow" onClick={addOpp}>+ Opportunité</button>
      </div>
      {shown.length === 0 && <p className="empty">Aucune opportunité{cf !== "all" ? " dans ce filtre" : ""}. Elles n'existent pas sans terrain.</p>}
      {shown.map((o) => {
        const stt = OPP_STATUS[o.statut] || OPP_STATUS.emergente;
        const hasSource = !!(o.source && o.source.trim());
        return (
          <div className="oppcard" key={o.id}>
            <div className="probhead">
              <span className="probbadge" style={dbadge(stt)}>{stt.label}</span>
              <button className="hclaimbtn" onClick={() => patchOpp(o.id, { open: !o.open })}>
                <span className="hclaimtext" style={{ textDecoration: stt.strike ? "line-through" : "none" }}>{o.intitule || "Nouvelle opportunité — clique pour éditer"}</span>
                <span className="chev">{o.open ? "−" : "+"}</span>
              </button>
            </div>
            {o.open && (
              <div className="hbody">
                <div className="field">
                  <label>Intitulé — l'espace, pas la solution</label>
                  <textarea rows={2} value={o.intitule} placeholder="Ex. Un besoin de réassurance visuelle partagée avant le RDV" onChange={(e) => patchOpp(o.id, { intitule: e.target.value })} />
                </div>
                <div className="hselrow">
                  <div className="field">
                    <label>Statut</label>
                    <select value={o.statut} onChange={(e) => setStatutGuarded(o, e.target.value)}>
                      {Object.entries(OPP_STATUS).map(([k, v]) => <option key={k} value={k} disabled={k === "confirmee" && !hasSource}>{v.label}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Source <span className="reqhint">(obligatoire pour Confirmée)</span></label>
                    <input value={o.source} placeholder="Quelle interview / quel signal terrain" onChange={(e) => patchOpp(o.id, { source: e.target.value })} />
                  </div>
                </div>
                {!hasSource && <p className="hlock">« Confirmée » exige une source terrain renseignée.</p>}
                <div className="field">
                  <label>Problématiques liées</label>
                  {problems.length === 0 ? (
                    <p className="linkhint">Crée d'abord une problématique pour pouvoir la rattacher.</p>
                  ) : (
                    <div className="linkpick">
                      {problems.map((p) => (
                        <label className={"linkopt" + ((o.probs || []).includes(p.id) ? " on" : "")} key={p.id}>
                          <input type="checkbox" checked={(o.probs || []).includes(p.id)} onChange={() => toggleP(o, p.id)} />
                          {p.intitule || "Sans intitulé"}
                        </label>
                      ))}
                    </div>
                  )}
                </div>
                <button className="del hdel" onClick={() => delOpp(o.id)} aria-label="Supprimer l'opportunité">Supprimer</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function DiscoveryModule({ discovery, setDiscovery, hypotheses, setHypotheses }) {
  const d = { clusters: [], problems: [], opps: [], ...(discovery || {}) };
  const [cf, setCf] = useState("all");
  const upd = (patch) => setDiscovery({ ...d, ...patch });
  const hypsFor = (pid) => hypotheses.filter((h) => (h.probs || []).includes(pid));
  const oppsFor = (pid) => d.opps.filter((o) => (o.probs || []).includes(pid));

  return (
    <div className="disco">
      <ClusterFilter clusters={d.clusters} cf={cf} setCf={setCf} />
      <ProblemsBlock d={d} upd={upd} cf={cf} hypsFor={hypsFor} oppsFor={oppsFor} />
      <div className="discohead discohead2">
        <h3>Hypothèses</h3>
        <span className="discohint">Ce qui se teste. « Non testée » = ta to-do d'interview ; « Invalidée » = ce que tu as appris.</span>
      </div>
      <HypothesesModule items={hypotheses} setItems={setHypotheses} problems={d.problems} clusterFilter={cf} />
      <OppsBlock d={d} upd={upd} cf={cf} />
    </div>
  );
}

/* ---------------- Hypotheses ---------------- */
function HypothesesModule({ items, setItems, problems = [], clusterFilter = "all" }) {
  const [filter, setFilter] = useState("all");
  const [typeFilter, setTypeFilter] = useState("all");

  const patch = (id, p) => setItems(items.map((h) => (h.id === id ? { ...h, ...p } : h)));
  const add = () =>
    setItems([
      ...items,
      { id: rid("hy"), open: true, claim: "", type: "probleme", status: "atester", importance: "high", certainty: "low", note: "", method: "", next: "", preuve: "", probs: [], crit: false },
    ]);
  const del = (id) => setItems(items.filter((h) => h.id !== id));

  const clusterOf = (pid) => (problems.find((p) => p.id === pid) || {}).cluster || "";
  const inCluster = (h) =>
    clusterFilter === "all" ? true : clusterFilter === "none" ? (h.probs || []).length === 0 : (h.probs || []).some((pid) => clusterOf(pid) === clusterFilter);
  const toggleProb = (h, pid) => {
    const cur = h.probs || [];
    patch(h.id, { probs: cur.includes(pid) ? cur.filter((x) => x !== pid) : [...cur, pid] });
  };
  const setStatusGuarded = (h, val) => {
    if (HYP_LOCKED.includes(val) && !(h.preuve && h.preuve.trim())) return;
    patch(h.id, { status: val });
  };

  const counts = { valide: 0, encours: 0, atester: 0, infirme: 0, nuance: 0 };
  items.forEach((h) => { if (counts[h.status] !== undefined) counts[h.status]++; });
  const critItems = items.filter((h) => h.crit);
  const base = items.filter((h) => !h.crit && inCluster(h));
  const shown = base
    .filter((h) => filter === "all" || h.status === filter)
    .filter((h) => typeFilter === "all" || h.type === typeFilter);

  const renderCard = (h) => {
    const typ = HYP_TYPE[h.type];
    const stt = HYP_STATUS[h.status];
    const hasPreuve = !!(h.preuve && h.preuve.trim());
    const linked = (h.probs || []).map((pid) => problems.find((p) => p.id === pid)).filter(Boolean);
    return (
      <div className={"hcard" + (h.crit ? " hcrit" : "")} key={h.id} style={{ borderLeftColor: stt ? stt.color : "var(--stone)" }}>
        <div className="hhead">
          {h.crit && <span className="hcritbadge">★ Critique</span>}
          {stt && (<span className="hstat" style={{ color: stt.color, borderColor: stt.color + "55", background: stt.color + "14" }}>{stt.name}</span>)}
          {typ && (<span className="htype" style={{ color: typ.color, borderColor: typ.color + "55", background: typ.color + "14" }}>{typ.name}</span>)}
          <button className="hclaimbtn" onClick={() => patch(h.id, { open: !h.open })}>
            <span className="hclaimtext">{h.claim || "Nouvelle hypothèse — clique pour éditer"}</span>
            <span className="chev">{h.open ? "−" : "+"}</span>
          </button>
        </div>
        {linked.length > 0 && !h.open && (
          <div className="hlinks">{linked.map((p) => <span className="hlinkchip" key={p.id}>{p.intitule || "Problématique"}</span>)}</div>
        )}
        {h.open && (
          <div className="hbody">
            <div className="field">
              <label>Énoncé — « Nous supposons que… »</label>
              <textarea rows={2} value={h.claim} placeholder="Ex. Les clientes ont peur du résultat avant le RDV" onChange={(e) => patch(h.id, { claim: e.target.value })} />
            </div>
            <div className="hselrow">
              <div className="field">
                <label>Type</label>
                <select value={h.type} onChange={(e) => patch(h.id, { type: e.target.value })}>
                  {Object.entries(HYP_TYPE).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Statut</label>
                <select value={h.status} onChange={(e) => setStatusGuarded(h, e.target.value)}>
                  {Object.entries(HYP_STATUS).map(([k, v]) => <option key={k} value={k} disabled={HYP_LOCKED.includes(k) && !hasPreuve}>{v.name}</option>)}
                </select>
              </div>
            </div>
            {!hasPreuve && <p className="hlock">Validée / Invalidée / Nuancée exigent une preuve renseignée.</p>}
            <div className="field">
              <label>Preuve — verbatim / interview <span className="reqhint">(obligatoire pour changer de statut)</span></label>
              <textarea rows={2} value={h.preuve || ""} placeholder="« … » ou réf. interview — vide tant que non testé" onChange={(e) => patch(h.id, { preuve: e.target.value })} />
            </div>
            <div className="field">
              <label>Problématiques liées</label>
              {problems.length === 0 ? (
                <p className="linkhint">Crée d'abord une problématique pour pouvoir la rattacher.</p>
              ) : (
                <div className="linkpick">
                  {problems.map((p) => (
                    <label className={"linkopt" + ((h.probs || []).includes(p.id) ? " on" : "")} key={p.id}>
                      <input type="checkbox" checked={(h.probs || []).includes(p.id)} onChange={() => toggleProb(h, p.id)} />
                      {p.intitule || "Sans intitulé"}
                    </label>
                  ))}
                </div>
              )}
            </div>
            <div className="hselrow">
              <div className="field">
                <label>Importance</label>
                <select value={h.importance || "high"} onChange={(e) => patch(h.id, { importance: e.target.value })}>
                  <option value="high">Élevée</option>
                  <option value="low">Faible</option>
                </select>
              </div>
              <div className="field">
                <label>Certitude</label>
                <select value={h.certainty || "low"} onChange={(e) => patch(h.id, { certainty: e.target.value })}>
                  <option value="high">Élevée</option>
                  <option value="low">Faible</option>
                </select>
              </div>
            </div>
            <div className="field">
              <label>Méthode de validation</label>
              <textarea rows={2} value={h.method} placeholder="Discovery (interviews) · test produit · métriques…" onChange={(e) => patch(h.id, { method: e.target.value })} />
            </div>
            <div className="field">
              <label>Note / ce qu'on sait déjà</label>
              <textarea rows={2} value={h.note} placeholder="Signaux, données, retours terrain…" onChange={(e) => patch(h.id, { note: e.target.value })} />
            </div>
            <div className="field">
              <label>Prochaine action</label>
              <textarea rows={2} value={h.next} placeholder="La prochaine étape concrète pour creuser" onChange={(e) => patch(h.id, { next: e.target.value })} />
            </div>
            <label className="critcheck"><input type="checkbox" checked={!!h.crit} onChange={(e) => patch(h.id, { crit: e.target.checked })} /> Hypothèse critique (la plus risquée) — épinglée en haut</label>
            <button className="del hdel" onClick={() => del(h.id)} aria-label="Supprimer l'hypothèse">Supprimer</button>
          </div>
        )}
      </div>
    );
  };

  const [amapBig, setAmapBig] = useState(false);
  useEffect(() => {
    if (!amapBig) return;
    const onKey = (e) => { if (e.key === "Escape") setAmapBig(false); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [amapBig]);

  const AMAP_QUADRANTS = [
    { imp: "high", cert: "low", label: "À tester en priorité", sub: "risque élevé", prio: true },
    { imp: "high", cert: "high", label: "Solides", sub: "pas prioritaires" },
    { imp: "low", cert: "low", label: "Faible impact", sub: "plus tard" },
    { imp: "low", cert: "high", label: "Sûres", sub: "peu de risque" },
  ];

  const renderAmapGrid = (big) => (
    <div className="amapwrap">
      <div className="amapy">Importance ↑</div>
      <div className="amapmain">
        <div className="amapgrid">
          {AMAP_QUADRANTS.map((q) => {
            const inCell = items.filter((h) => (h.importance || "high") === q.imp && (h.certainty || "low") === q.cert);
            return (
              <div className={"amapcell" + (q.prio ? " prio" : "")} key={q.imp + q.cert}>
                <div className="amapqlabel">{q.label} <span>· {q.sub}</span></div>
                <div className="amapchips">
                  {inCell.length === 0 ? (
                    <span className="amapempty">—</span>
                  ) : (
                    inCell.map((h) => (
                      <button
                        className={"achip" + (h.crit ? " achipcrit" : "")}
                        key={h.id}
                        title={h.claim}
                        onClick={() => { setAmapBig(false); setFilter("all"); patch(h.id, { open: true }); }}
                      >
                        {h.crit && <span className="achipstar">★</span>}
                        {h.claim ? (big ? h.claim : h.claim.length > 34 ? h.claim.slice(0, 34) + "…" : h.claim) : "Sans énoncé"}
                      </button>
                    ))
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div className="amapx">Certitude →</div>
      </div>
    </div>
  );

  return (
    <div className="hyp">
      <div className="amap">
        <div className="amaphead">
          <h3>Carte des assomptions</h3>
          <span className="amaphint">Chaque hypothèse se place selon son importance et ta certitude.</span>
          <button className="amapzoom" onClick={() => setAmapBig(true)} aria-label="Agrandir la carte">⤢ Agrandir</button>
        </div>
        {renderAmapGrid(false)}
      </div>

      {amapBig && (
        <div className="amapmodal" onClick={() => setAmapBig(false)}>
          <div className="amapmodalbox" onClick={(e) => e.stopPropagation()}>
            <div className="amapmodalhead">
              <div>
                <h3>Carte des assomptions</h3>
                <span className="amaphint">{items.length} hypothèses · clique l'une d'elles pour ouvrir sa fiche</span>
              </div>
              <button className="amapclose" onClick={() => setAmapBig(false)} aria-label="Fermer">×</button>
            </div>
            <div className="amapmodalbody">{renderAmapGrid(true)}</div>
          </div>
        </div>
      )}

      {critItems.length > 0 && (
        <div className="hcritzone">
          <div className="hcrittitle">Hypothèse critique — la plus risquée, toujours visible</div>
          {critItems.map(renderCard)}
        </div>
      )}

      <div className="rmbar">
        <span className="rmcount">
          {items.length} hypothèses · {counts.valide} validées · {counts.encours} en cours · {counts.nuance} nuancées
        </span>
        <button className="addrow" onClick={add}>+ Hypothèse</button>
      </div>

      <div className="filterbar filterbar-type">
        <button className={typeFilter === "all" ? "on" : ""} onClick={() => setTypeFilter("all")}>Tous types</button>
        {Object.entries(HYP_TYPE).map(([k, v]) => (
          <button key={k} className={typeFilter === k ? "on" : ""} onClick={() => setTypeFilter(k)} style={typeFilter === k ? { background: v.color, borderColor: v.color, color: "#fff" } : { color: v.color, borderColor: v.color + "55" }}>{v.name}</button>
        ))}
      </div>
      <div className="filterbar">
        <button className={filter === "all" ? "on" : ""} onClick={() => setFilter("all")}>Tous statuts</button>
        {Object.entries(HYP_STATUS).map(([k, v]) => (
          <button key={k} className={filter === k ? "on" : ""} onClick={() => setFilter(k)}>{v.name}</button>
        ))}
      </div>

      {shown.length === 0 && <p className="empty">Aucune hypothèse dans ce filtre.</p>}

      {shown.map(renderCard)}
    </div>
  );
}

  const addFeat = (id) => patch(id, { features: [...tiers.find((t) => t.id === id).features, ""] });
  const delFeat = (id, fi) => patch(id, { features: tiers.find((t) => t.id === id).features.filter((_, i) => i !== fi) });
  const addTier = () =>
    setPricing({ ...pricing, tiers: [...tiers, { id: rid("tr"), cible: "", name: "Nouveau palier", price: "", period: "", featured: false, tag: "", features: [""] }] });
  const delTier = (id) => setPricing({ ...pricing, tiers: tiers.filter((t) => t.id !== id) });

    <div className="pricing">

                <input value={t.cible} onChange={(e) => patch(t.id, { cible: e.target.value })} placeholder="Utilisatrice, Coiffeuse…" />

                <label>Détail prix</label>
                <input value={t.period} onChange={(e) => patch(t.id, { period: e.target.value })} placeholder="/mois · 44€/an…" />
                <label className="featline">
                  <input type="checkbox" checked={t.featured} onChange={(e) => patch(t.id, { featured: e.target.checked })} />

                  <>

                    <input value={t.tag} onChange={(e) => patch(t.id, { tag: e.target.value })} placeholder="Cœur de cible…" />

                {t.features.map((f, i) => (
                  <div className="featrow" key={i}>
                    <input value={f} onChange={(e) => setFeat(t.id, i, e.target.value)} />
                    <button className="del" onClick={() => delFeat(t.id, i)} aria-label="Retirer">×</button>
                  </div>
                ))}
                <button className="addrow" onClick={() => addFeat(t.id)}>+ Avantage</button>
                <button className="del tierdel" onClick={() => delTier(t.id)}>Supprimer ce palier</button>
              </div>
            ) : (
              <>
                {t.featured && t.tag && <span className="pricetag">{t.tag}</span>}

                <h3 className="pricename">{t.name}</h3>

/* ---------------- TAM / SAM / SOM (Marché) ---------------- */
function TsomBadge({ status, onGold }) {
  const s = TSOM_STATUS[status] || TSOM_STATUS.asourcer;
  const empty = status === "asourcer";
  const style = empty
    ? { color: s.color, background: onGold ? "rgba(253,251,244,.9)" : "transparent", borderColor: s.color }
    : { color: "#fff", background: s.color, borderColor: s.color };
  return <span className="tsombadge" style={style}>{s.label}</span>;
}

function TsomModule({ data, setData }) {
  const [edit, setEdit] = useState(false);
  const d = { axis: "", tam: {}, sam: {}, som: {}, ...(data || {}) };
  const upd = (patch) => setData({ ...d, ...patch });
  const updLvl = (lvl, p) => upd({ [lvl]: { ...d[lvl], ...p } });
  const amt = (v) => (v && String(v).trim() ? String(v).trim() : "—");

/* ---------------- Ressources ---------------- */
function resHref(url) {
  const u = (url || "").trim();
  if (!u) return "";
  return /^https?:\/\//i.test(u) ? u : "https://" + u;
}
function resDomain(url) {
  const u = resHref(url);
  if (!u) return "";
  try {
    return new URL(u).hostname.replace(/^www\./i, "");
  } catch (e) {
    return u.replace(/^https?:\/\//i, "").replace(/^www\./i, "").split("/")[0];
  }
}

/* ---------------- Affinity board ---------------- */
function AffinityBoard({ state, setAffinity, setDiscovery }) {
  const aff = state.affinity && Array.isArray(state.affinity.notes)
    ? { zones: [], ...state.affinity }
    : DEFAULT_AFFINITY();
  const notes = aff.notes;
  const zones = aff.zones || [];
  const canvasRef = useRef(null);
  const dragRef = useRef(null);
  const [drag, setDrag] = useState(null);
  const [editId, setEditId] = useState(null);
  const [flash, setFlash] = useState(null);

  const upd = (patchObj) => setAffinity({ ...aff, ...patchObj });
  const patch = (id, p) => upd({ notes: notes.map((n) => (n.id === id ? { ...n, ...p } : n)) });
  const del = (id) => { setEditId(null); upd({ notes: notes.filter((n) => n.id !== id) }); };
  const patchZone = (id, p) => upd({ zones: zones.map((z) => (z.id === id ? { ...z, ...p } : z)) });
  const delZone = (id) => upd({ zones: zones.filter((z) => z.id !== id) });

  /* post-its contenus dans une zone — par géométrie (le centre du post-it) */
  const notesIn = (z) =>
    notes.filter((n) => {
      const cx = n.x + NOTE_W / 2, cy = n.y + NOTE_H / 2;
      return cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + z.h;
    });

  const addZone = () => {
    const y = zones.length ? Math.max(...zones.map((z) => z.y + z.h)) + 24 : 8;
    upd({ zones: [...zones, { id: rid("zn"), label: "", x: 8, y, w: 400, h: 300 }] });
  };

  const toProblem = (z) => {
    const inside = notesIn(z);
    if (!z.label.trim() || !inside.length) return;
    const dv = state.discovery && Array.isArray(state.discovery.problems) ? state.discovery : DEFAULT_DISCOVERY();
    const prob = {
      id: rid("pb"),
      intitule: z.label.trim(),
      cluster: "",
      priorite: "nonprio",
      open: false,
      verbatims: inside.map((n) => ({ text: n.text, src: n.srcName || "" })),
    };
    setDiscovery({ ...dv, problems: [...(dv.problems || []), prob] });
    patchZone(z.id, { done: true });
    setFlash(z.id);
    setTimeout(() => setFlash(null), 2200);
  };

  const freeSpot = (i) => {
    const perRow = 4;
    return { x: 24 + (i % perRow) * (NOTE_W + 16), y: 24 + Math.floor(i / perRow) * (NOTE_H + 16) };
  };

  const addNote = () => {
    const id = rid("nt");
    upd({ notes: [...notes, { id, text: "", color: "kraft", src: null, ...freeSpot(notes.length) }] });
    setEditId(id);
  };

  const importVerbatims = () => {
    const done = new Set(notes.map((n) => n.src).filter(Boolean));
    const fresh = (state.interviews || [])
      .filter((i) => i.verbatim && i.verbatim.trim() && !done.has(i.id))
      .map((i, k) => ({
        id: rid("nt"),
        text: i.verbatim.trim(),
        color: "kraft",
        src: i.id,
        srcName: i.person || "",
        ...freeSpot(notes.length + k),
      }));
    if (fresh.length) upd({ notes: [...notes, ...fresh] });
  };

  const pendingCount = (() => {
    const done = new Set(notes.map((n) => n.src).filter(Boolean));
    return (state.interviews || []).filter((i) => i.verbatim && i.verbatim.trim() && !done.has(i.id)).length;
  })();

  const startDrag = (e, kind, obj) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const sx = canvasRef.current.scrollLeft, sy = canvasRef.current.scrollTop;
    dragRef.current = {
      kind, id: obj.id,
      offX: e.clientX - rect.left - obj.x + sx,
      offY: e.clientY - rect.top - obj.y + sy,
      w0: obj.w, h0: obj.h,
      startX: e.clientX, startY: e.clientY,
      moved: false, sx: e.clientX, sy: e.clientY,
    };
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
  };

  const onPointerDown = (e, n) => {
    if (editId === n.id) return;
    e.stopPropagation();
    startDrag(e, "note", n);
  };

  const onPointerMove = (e) => {
    const d = dragRef.current;
    if (!d) return;
    if (!d.moved && Math.abs(e.clientX - d.sx) < 4 && Math.abs(e.clientY - d.sy) < 4) return;
    d.moved = true;
    const rect = canvasRef.current.getBoundingClientRect();
    if (d.kind === "resize") {
      setDrag({ kind: "resize", id: d.id, w: Math.max(160, d.w0 + (e.clientX - d.startX)), h: Math.max(120, d.h0 + (e.clientY - d.startY)) });
      return;
    }
    const x = Math.max(0, e.clientX - rect.left - d.offX + canvasRef.current.scrollLeft);
    const y = Math.max(0, e.clientY - rect.top - d.offY + canvasRef.current.scrollTop);
    setDrag({ kind: d.kind, id: d.id, x, y });
  };

  const onPointerUp = () => {
    const d = dragRef.current;
    if (!d) return;
    if (d.moved && drag) {
      if (d.kind === "note") patch(d.id, { x: drag.x, y: drag.y });
      else if (d.kind === "zone") patchZone(d.id, { x: drag.x, y: drag.y });
      else if (d.kind === "resize") patchZone(d.id, { w: drag.w, h: drag.h });
    } else if (d.kind === "note") setEditId(d.id);
    dragRef.current = null;
    setDrag(null);
  };
