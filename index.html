const firebaseConfig = {
  apiKey: "AIzaSyAxCUQmdcSJXue0VcMg9iTqWdSeCDa4O_U",
  authDomain: "crown-on-me-cockpit.firebaseapp.com",
  projectId: "crown-on-me-cockpit",

  appId: "1:819009172478:web:127b5dcb2ff89b8f9b86af",

};
// ============================================================

(function () {
  var KEY = "crownonme:cockpit:v2";
  var hasConfig = !!(firebaseConfig && firebaseConfig.apiKey);
  var db = null, auth = null, provider = null, authReady = Promise.resolve(null);

  if (hasConfig) {
    try {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
      provider = new firebase.auth.GoogleAuthProvider();
      authReady = new Promise(function (res) {
        auth.onAuthStateChanged(function (u) { renderBar(u); res(u); });
      });
    } catch (e) { console.error("Firebase init:", e); }
  }

  function currentUser() { return (auth && auth.currentUser) ? auth.currentUser : null; }
  function uid() { var u = currentUser(); return u ? u.uid : null; }

  window.storage = {
    get: async function (key) {
      if (hasConfig) {
        await authReady;
        var u = uid();
        if (u) {
          try {
            var ref = db.collection("cockpit").doc(u);
            var snap = await ref.get();
            if (snap.exists && snap.data() && typeof snap.data().value === "string") return { value: snap.data().value };
            var local = localStorage.getItem(key);
            if (local) { await ref.set({ value: local, updatedAt: Date.now() }); return { value: local }; }
            return null;
          } catch (e) { console.error("Firestore get:", e); }
        }
      }
      var v = localStorage.getItem(key);
      return v ? { value: v } : null;
    },
    set: async function (key, value) {
      try { localStorage.setItem(key, value); } catch (e) {}
      var u = uid();
      if (hasConfig && u) {
        try { await db.collection("cockpit").doc(u).set({ value: value, updatedAt: Date.now() }); }
        catch (e) { console.error("Firestore set:", e); }
      }
      return { ok: true };
    }
  };

  function el(tag, cls, txt) { var e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }

  function renderBar(u) {
    var bar = document.getElementById("syncbar");
    if (!bar) return;
    bar.innerHTML = "";
    var left = el("div", "sb-left");
    var dot = el("span", "sb-dot");
    var status = el("span", "sb-status");
    if (!hasConfig) { dot.classList.add("local"); status.textContent = "Local — ajoute ta config Firebase pour synchroniser"; }
    else if (u) { dot.classList.add("synced"); status.textContent = "Synchronisé — " + (u.email || "connectée"); }
    else { dot.classList.add("local"); status.textContent = "Local — non connectée"; }
    left.appendChild(dot); left.appendChild(status);

    var right = el("div", "sb-right");
    if (hasConfig && !u) {
      var bi = el("button", "sb-btn primary", "Se connecter avec Google");
      bi.onclick = function () { auth.signInWithPopup(provider).then(function () { location.reload(); }).catch(function (e) { alert("Connexion échouée : " + e.message); }); };
      right.appendChild(bi);
    }
    if (hasConfig && u) {
      var bo = el("button", "sb-btn", "Se déconnecter");
      bo.onclick = function () { auth.signOut().then(function () { location.reload(); }); };
      right.appendChild(bo);
    }
    var bs = el("button", "sb-btn", "Sauvegarder .json");
    bs.onclick = async function () {
      var r = await window.storage.get(KEY);
      var data = (r && r.value) ? r.value : "{}";
      var blob = new Blob([data], { type: "application/json" });
      var a = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = "cockpit-sauvegarde.json"; a.click();
    };
    right.appendChild(bs);
    var br = el("button", "sb-btn", "Restaurer .json");
    br.onclick = function () {
      var inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json,application/json";
      inp.onchange = function () {
        var f = inp.files && inp.files[0]; if (!f) return;
        var rd = new FileReader();
        rd.onload = async function () {
          try { JSON.parse(rd.result); await window.storage.set(KEY, String(rd.result)); location.reload(); }
          catch (e) { alert("Fichier .json invalide."); }
        };
        rd.readAsText(f);
      };
      inp.click();
    };
    right.appendChild(br);

    bar.appendChild(left); bar.appendChild(right);
  }

  renderBar(currentUser());

  // ---- diagnostic auto (si rien ne s'affiche) ----
  setTimeout(function () {
    var root = document.getElementById("root");
    if (!root || root.childNodes.length > 0) return;
    function ok(b){ return b ? "OK" : "MANQUANT"; }
    var reactOk = (typeof React !== "undefined");
    var domOk = (typeof ReactDOM !== "undefined");
    var rechartsOk = (typeof Recharts !== "undefined");
    var babelOk = (typeof Babel !== "undefined");
    var h = "<div style='padding:20px;font:13px/1.7 monospace;color:#0d0d0b;'>";
    h += "<b>Diagnostic — rien ne s'est affiché :</b><br><br>";
    h += "React : " + ok(reactOk) + "<br>";
    h += "ReactDOM : " + ok(domOk) + "<br>";
    h += "Recharts : " + ok(rechartsOk) + "<br>";
    h += "Babel : " + ok(babelOk) + "<br><br>";
    if (!reactOk || !domOk || !babelOk) {
      h += "Une librairie n'a pas pu se charger depuis Internet.<br>";
      h += "&rarr; Vérifie que tu es <b>en ligne</b>, désactive un éventuel bloqueur de scripts, puis recharge.";

      h += "Les librairies sont chargées mais l'app n'a pas démarré.<br>";
      h += "&rarr; Ouvre la console (F12 &gt; Console) et copie-moi les lignes <b>rouges</b>.";
    }
    h += "</div>";
    root.innerHTML = h;
  }, 2000);

})();

// Récupère les données si l'ancien Canvas (BMC) était rempli, en mappant les blocs communs.
function migrateCanvas(b) {
  const out = BMC_EMPTY();
  if (!b || typeof b !== "object") return out;
  Object.keys(out).forEach((k) => { if (typeof b[k] === "string") out[k] = b[k]; });
  const map = { valeur: "uvp", segments: "segments", canaux: "canaux", revenus: "revenus", couts: "couts" };
  Object.entries(map).forEach(([from, to]) => { if (b[from] && !out[to]) out[to] = b[from]; });
  return out;
}

/* ---------------- Crown ---------------- */
function Crown({ pct }) {
  const n = 7;
  const W = 210;
  const baseY = 54;
  const filled = Math.round((pct / 100) * n);
  const cxOf = (i) => 22 + i * ((W - 44) / (n - 1));
  const toothTop = (i) => baseY - (22 + 11 * Math.sin((Math.PI * i) / (n - 1)));
  return (
    <svg viewBox={`0 0 ${W} 80`} className="crown" role="img" aria-label={`Couronne remplie à ${pct}%`}>
      <path d={`M12 ${baseY} L${W - 12} ${baseY} L${W - 18} 74 L18 74 Z`} fill="var(--plum)" stroke="var(--plum-deep)" strokeWidth="1.5" />
      {Array.from({ length: n }).map((_, i) => {
        const cx = cxOf(i);
        const on = i < filled;
        return (
          <g key={i}>
            <polygon
              points={`${cx - 13},${baseY} ${cx + 13},${baseY} ${cx},${toothTop(i)}`}
              fill={on ? "var(--gold)" : "var(--band-faint)"}
              stroke={on ? "var(--gold-deep)" : "var(--band-line)"}
              strokeWidth="1.4"
              style={{ transition: "fill .4s ease, stroke .3s ease" }}
            />
            <circle cx={cx} cy={toothTop(i) + 4} r="2.8" fill={on ? "var(--gold-deep)" : "var(--band-line)"} />
          </g>
        );
      })}
      <circle cx={W / 2} cy={64} r="3.2" fill="var(--gold)" />
    </svg>
  );
}

  useEffect(() => {
    let alive = true;
    (async () => {
      if (hasStorage) {
        try {
          const res = await window.storage.get(KEY);
          if (res && res.value && alive) {
            const merged = { ...buildDefault(), ...JSON.parse(res.value) };
            merged.roadmap = migrateRoadmap(merged.roadmap);
            if (!Array.isArray(merged.hypotheses)) merged.hypotheses = DEFAULT_HYPOTHESES();
            else merged.hypotheses = merged.hypotheses.map((h) => ({ importance: "high", certainty: "low", ...h }));
            if (!merged.competitors) merged.competitors = DEFAULT_COMPETITORS();
            merged.bmc = migrateCanvas(merged.bmc);
            if (!merged.pricing || !Array.isArray(merged.pricing.tiers)) merged.pricing = DEFAULT_PRICING();
            if (!merged.produit || !Array.isArray(merged.produit.briques)) merged.produit = DEFAULT_PRODUIT();
            if (!merged.tech || !Array.isArray(merged.tech.services)) merged.tech = DEFAULT_TECH();
            if (!merged.segper || !Array.isArray(merged.segper.segments)) merged.segper = DEFAULT_SEGPER();
            if (!Array.isArray(merged.meetings)) merged.meetings = [];
            if (!Array.isArray(merged.interviews)) merged.interviews = [];
            if (!Array.isArray(merged.todos)) merged.todos = [];
            if (!merged.touched || typeof merged.touched !== "object") merged.touched = {};
            prefillEmptyFields(merged);
            applyOneTimeSeeds(merged);
            setState(merged);
            loaded.current = true;
            return;
          }
        } catch (e) {}
      }
      if (alive) {
        setState(applyOneTimeSeeds(prefillEmptyFields(buildDefault())));
        loaded.current = true;
      }
    })();
    return () => (alive = false);
  }, []);

  useEffect(() => {
    if (!state || !loaded.current) return;
    setSaved(false);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      if (hasStorage) {
        try {
          await window.storage.set(KEY, JSON.stringify(state));
          setSaved(true);
        } catch (e) {
          setSaved(false);
        }

  const setField = (sec, fk, val) =>
    setState((p) => ({ ...p, fields: { ...p.fields, [sec]: { ...p.fields[sec], [fk]: val } }, touched: { ...p.touched, [sec]: true } }));

  const setCompetitors = (c) => setState((p) => ({ ...p, competitors: c, touched: { ...p.touched, concurrents: true } }));
  const setHypotheses = (h) => setState((p) => ({ ...p, hypotheses: h, touched: { ...p.touched, hypotheses: true } }));
  const setBmc = (key, val) => setState((p) => ({ ...p, bmc: { ...p.bmc, [key]: val }, touched: { ...p.touched, canvas: true } }));
  const setPricing = (pr) => setState((p) => ({ ...p, pricing: pr, touched: { ...p.touched, tarification: true } }));
  const setProduit = (pd) => setState((p) => ({ ...p, produit: pd, touched: { ...p.touched, produit: true } }));
  const setTech = (tc) => setState((p) => ({ ...p, tech: tc, touched: { ...p.touched, tech: true } }));
  const setSegper = (sp) => setState((p) => ({ ...p, segper: sp, touched: { ...p.touched, segments: true } }));
  const setMeetings = (rows) => setState((p) => ({ ...p, meetings: rows }));
  const setInterviews = (rows) => setState((p) => ({ ...p, interviews: rows }));
  const setTodos = (rows) => setState((p) => ({ ...p, todos: rows }));

  const go = (k) => {
    setActive(k);
    setMenuOpen(false);
  };

  const copyMarkdown = async () => {
    try {
      await navigator.clipboard.writeText(buildMarkdown(state, pct));
      setCopied(true);
      setTimeout(() => setCopied(false), 1600);
    } catch (e) {}
  };

  const onImportFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setImportText(String(r.result || ""));
    r.onerror = () => {};
    r.readAsText(f);
  };

  const applyImport = () => {
    const txt = importText.trim();
    if (!txt) return;
    const tgt = IMPORT_TARGETS.find((t) => t.id === importTarget) || IMPORT_TARGETS[0];
    if (tgt.kind === "journal") {
      addJournal({ section: "general", kind: "note", text: txt });
    } else if (tgt.kind === "produit") {
      const cur = (state.produit && state.produit.notes) || "";
      const val = importMode === "replace" ? txt : cur ? cur + "\n\n" + txt : txt;
      setProduit({ ...state.produit, notes: val });
    } else if (tgt.kind === "field") {
      const cur = (state.fields[tgt.sec] && state.fields[tgt.sec].body) || "";
      const val = importMode === "replace" ? txt : cur ? cur + "\n\n" + txt : txt;
      setField(tgt.sec, "body", val);
    }
    setImportOpen(false);
    setImportText("");
    setActive(tgt.nav);
    setMenuOpen(false);
  };

  return (
    <div className="com-root">
      <StyleTag />

      <div className="mobiletop">
        <button className="burger" onClick={() => setMenuOpen(true)} aria-label="Ouvrir le menu">
          ☰
        </button>
        <span className="mwordmark">Crown On Me</span>
        <span className="mpct">{pct}%</span>
      </div>

      {menuOpen && <div className="scrim" onClick={() => setMenuOpen(false)} />}

      <div className="shell">
        <aside className={"sidebar" + (menuOpen ? " open" : "")}>
          <div className="sidehead">
            <Crown pct={pct} />
            <span className="eyebrow">Cockpit fondatrice</span>
            <h1 className="wordmark">Crown&nbsp;On&nbsp;Me</h1>
            <div className="progwrap">
              <div className="progbar">
                <div className="progfill" style={{ width: pct + "%" }} />
              </div>
              <span className="progtxt">{pct}% couronné</span>
            </div>
            <span className="savestate">{saved ? "✓ Enregistré" : "…"}</span>
          </div>

          <nav className="sidenav">
            <button className={"navitem ovnav" + (active === "overview" ? " on" : "")} onClick={() => go("overview")}>
              <span className="navdot star">◧</span>
              <span className="navlabel">Vue d’ensemble</span>
            </button>
            {GROUPS.map((g) => (
              <div className="navgroup" key={g.title}>
                <p className="navgrouptitle">{g.title}</p>
                {g.keys.map((k) => (
                  <button key={k} className={"navitem " + (isStarted(state, k) ? "st-started" : "st-empty") + (active === k ? " on" : "")} onClick={() => go(k)}>
                    <span className="navdot" />
                    <span className="navlabel">{SECTIONS[k].label}</span>
                  </button>
                ))}
              </div>
            ))}
            <div className="navgroup">
              <p className="navgrouptitle">Suivi</p>
              <button className={"navitem journal" + (active === "journal" ? " on" : "")} onClick={() => go("journal")}>
                <span className="navdot star">✦</span>
                <span className="navlabel">Journal</span>
              </button>
              <button className={"navitem journal" + (active === "meetings" ? " on" : "")} onClick={() => go("meetings")}>
                <span className="navdot star">✦</span>
                <span className="navlabel">Réunions & ateliers</span>
              </button>
              <button className={"navitem journal" + (active === "interviews" ? " on" : "")} onClick={() => go("interviews")}>
                <span className="navdot star">✦</span>
                <span className="navlabel">Interviews</span>
              </button>
            </div>
          </nav>

          <div className="sidefoot">
            <button className="mdbtn" onClick={copyMarkdown}>
              {copied ? "Copié ✓" : "Exporter en Markdown"}
            </button>
            <button className="mdbtn importbtn" onClick={() => setImportOpen(true)}>
              Importer des notes .md
            </button>
            <p className="storenote">
              {hasStorage ? "Sauvegarde auto sur cet appareil." : "Sauvegarde indisponible ici."}
            </p>
          </div>
        </aside>

        <main className="content">
          {active === "overview" ? (
            <Overview state={state} pct={pct} go={go} setStatus={setStatus} addJournal={addJournal} setTodos={setTodos} />
          ) : active === "journal" ? (
            <JournalView state={state} addJournal={addJournal} delJournal={delJournal} />
          ) : active === "meetings" ? (
            <MeetingsView state={state} setMeetings={setMeetings} />
          ) : active === "interviews" ? (
            <InterviewsView state={state} setInterviews={setInterviews} />
          ) : (
            <SectionView
              k={active}
              state={state}
              setField={setField}
              setStatus={setStatus}
              setCap={setCap}
              setCrm={setCrm}
              setFinance={setFinance}
              setRoadmap={setRoadmap}
              setCompetitors={setCompetitors}
              setHypotheses={setHypotheses}
              setBmc={setBmc}
              setPricing={setPricing}
              setProduit={setProduit}
              setTech={setTech}
              setSegper={setSegper}
              addJournal={addJournal}
              delJournal={delJournal}
            />
          )}
        </main>
      </div>

      {importOpen && (
        <div className="bmcmodal-scrim" onClick={() => setImportOpen(false)}>
          <div className="bmcmodal importmodal" onClick={(e) => e.stopPropagation()}>
            <div className="bmcmodalhead">
              <span className="bmcicon big">↓</span>
              <h3>Importer des notes .md</h3>
              <button className="bmcclose" onClick={() => setImportOpen(false)} aria-label="Fermer">×</button>
            </div>
            <p className="bmcmodalq">Choisis un fichier .md (ou colle ton texte), puis dis où ça atterrit. Le contenu arrive tel quel, en texte.</p>

            <label className="implabel">1 · Fichier .md (optionnel)</label>
            <input type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" onChange={onImportFile} className="impfile" />

            <label className="implabel">2 · Ou colle / édite le texte</label>
            <textarea className="imptext" rows={7} placeholder="Colle ici le contenu de ta note…" value={importText} onChange={(e) => setImportText(e.target.value)} />

            <div className="improw">
              <div className="impcol">
                <label className="implabel">3 · Destination</label>
                <select value={importTarget} onChange={(e) => setImportTarget(e.target.value)}>
                  {IMPORT_TARGETS.map((t) => <option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
              </div>
              <div className="impcol">
                <label className="implabel">4 · Mode</label>
                <select value={importMode} onChange={(e) => setImportMode(e.target.value)} disabled={importTarget === "journal"}>
                  <option value="append">Ajouter à la fin</option>
                  <option value="replace">Remplacer</option>
                </select>
              </div>
            </div>
            {importTarget === "journal" && <p className="imphint">Le Journal ajoute toujours une nouvelle entrée.</p>}

            <div className="bmcmodalfoot impfoot">
              <button className="mdbtn" onClick={() => setImportOpen(false)}>Annuler</button>
              <button className="addbtn" onClick={applyImport} disabled={!importText.trim()}>Importer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- Overview (accueil) ---------------- */
function Overview({ state, pct, go, setStatus, addJournal, setTodos }) {
  const [cap, setCap] = useState("");
  const [capKind, setCapKind] = useState("note");
  const [todoInput, setTodoInput] = useState("");
  const todos = state.todos || [];
  const addTodo = () => {
    if (!todoInput.trim()) return;
    setTodos([...todos, { id: Date.now(), text: todoInput.trim(), done: false }]);
    setTodoInput("");
  };
  const toggleTodo = (id) => setTodos(todos.map((t) => (t.id === id ? { ...t, done: !t.done } : t)));
  const delTodo = (id) => setTodos(todos.filter((t) => t.id !== id));
  const submitCap = () => {
    if (!cap.trim()) return;
    addJournal({ section: "general", kind: capKind, text: cap.trim() });
    setCap("");
  };

  const startedCount = ALL_KEYS.filter((k) => isStarted(state, k)).length;
  const emptyCount = ALL_KEYS.length - startedCount;
  const firstEmpty = ALL_KEYS.find((k) => !isStarted(state, k)) || null;
  const chantiers = ((state.tech && state.tech.chantiers) || []).filter((c) => c.label && c.status !== "Fait");
  const hypActions = (state.hypotheses || []).filter((h) => (h.status === "atester" || h.status === "encours") && (h.next || h.claim));
  const topAction = chantiers.length
    ? { text: chantiers[0].label, nav: "tech" }
    : hypActions.length
    ? { text: hypActions[0].next || hypActions[0].claim, nav: "hypotheses" }
    : null;
  const jalons = (state.journal || []).filter((e) => e.kind === "jalon").slice().sort((a, b) => a.ts - b.ts);

  return (
    <div className="section overview">
      {/* 1 · Où j'en suis */}
      <div className="focus">
        <svg className="donut" viewBox="0 0 56 56" role="img" aria-label={`Avancement ${pct} pour cent`}>
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--band-faint)" strokeWidth="5" />
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--gold)" strokeWidth="5" strokeLinecap="round" strokeDasharray="138.2" strokeDashoffset={(138.2 * (1 - pct / 100)).toFixed(1)} transform="rotate(-90 28 28)" />
          <text x="28" y="32" textAnchor="middle" className="donuttext">{pct}%</text>
        </svg>
        <div className="focusbody">
          <h2>Où j’en suis ?</h2>
          <p className="ovhelp">Ton avancement, et par où continuer.</p>
          <p className="ovcountline">{startedCount} entamées · {emptyCount} à remplir</p>
          <div className="focusrow">
            {firstEmpty ? (
              <button className="starthere" onClick={() => go(firstEmpty)}>Continuer → {SECTIONS[firstEmpty].label}</button>
            ) : (
              <p className="fmuted">Toutes les parties sont entamées.</p>
            )}
          </div>
          {topAction && (
            <p className="nextaction" onClick={() => go(topAction.nav)}>
              <span className="nalabel">À faire ensuite</span> {topAction.text}
            </p>
          )}
        </div>
      </div>

      {/* 2 · Aujourd'hui */}
      <div className="today">
        <div className="todaytop">
          <span className="todaylabel">Aujourd’hui</span>
          <span className="todaydate">{formatDateShort(Date.now())}</span>
        </div>
        <p className="todayq">Qu’est-ce qui avance ? Qu’est-ce qui bloque ?</p>
        <textarea className="todayline" rows={2} placeholder="Écris ta ligne du jour…" value={cap} onChange={(e) => setCap(e.target.value)} />
        <div className="todayrow">
          <div className="kindtoggle">
            <button className={capKind === "note" ? "on" : ""} onClick={() => setCapKind("note")}>Note</button>
            <button className={capKind === "jalon" ? "on jalon" : "jalon"} onClick={() => setCapKind("jalon")}>Jalon</button>
          </div>
          <button className="todayadd" onClick={submitCap} disabled={!cap.trim()}>Ajouter</button>
        </div>
      </div>

      {/* 3 · Ma to-do */}
      <div className="todoblock">
        <div className="todohead">
          <h3 className="ovblocktitle">Ma to-do</h3>
          <a className="notionlink" href={NOTION_SB_URL} target="_blank" rel="noopener noreferrer">Startup Banlieue — livrables & tâches (Notion) ↗</a>
        </div>
        <div className="todoadd">
          <input
            placeholder="Ajouter une tâche…"
            value={todoInput}
            onChange={(e) => setTodoInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") addTodo(); }}
          />
          <button className="addbtn" onClick={addTodo} disabled={!todoInput.trim()}>Ajouter</button>
        </div>
        {todos.length === 0 ? (
          <p className="empty">Aucune tâche. Ajoute ta première ci-dessus.</p>
        ) : (
          <ul className="todolist">
            {todos.map((t) => (
              <li className={"todoitem" + (t.done ? " done" : "")} key={t.id}>
                <button className="todocheck" onClick={() => toggleTodo(t.id)} aria-label={t.done ? "Décocher" : "Cocher"}>{t.done ? "✓" : ""}</button>
                <span className="todotext" onClick={() => toggleTodo(t.id)}>{t.text}</span>
                <button className="del" onClick={() => delTodo(t.id)} aria-label="Supprimer">×</button>
              </li>
            ))}
          </ul>
        )}
      </div>

      {/* 4 · Jalons */}
      <h3 className="ovblocktitle">Jalons</h3>
      <p className="ovhelp">Tes caps franchis, dans le temps.</p>
      {jalons.length === 0 ? (
        <p className="empty">Aucun jalon pour l’instant. Note une entrée « jalon » ci-dessus et elle apparaîtra ici.</p>
      ) : (
        <div className={"frise" + (jalons.length > 1 ? " multi" : "")}>
          <div className="frisetrack">
            {jalons.map((e) => (
              <div className="fstep" key={e.id} onClick={() => go("journal")} title={e.text}>
                <span className="fdate">{formatDateShort(e.ts)}</span>
                <span className="fmid"><span className="fdot" /></span>
                <span className="ftext">{e.text}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- Section router ---------------- */
function SectionView({ k, state, setField, setStatus, setCap, setCrm, setFinance, setRoadmap, setCompetitors, setHypotheses, setBmc, setPricing, setProduit, setTech, setSegper, addJournal, delJournal }) {
  const s = SECTIONS[k];
  const started = isStarted(state, k);
  const entries = state.journal.filter((e) => e.section === k);

  return (
    <div className="section">
      <div className="sechead">
        <div>
          <h2>{s.label}</h2>
        </div>
        <span className={"secstate " + (started ? "on" : "")}>{started ? "Entamée" : "À remplir"}</span>
      </div>

      <div className="guide">
        <span className="guideicon">?</span>
        <p>{s.q}</p>
      </div>

      {s.type === "grid" && <FieldGrid k={k} s={s} vals={state.fields[k]} setField={setField} />}
      {s.type === "fields" && <FieldStack k={k} s={s} vals={state.fields[k]} setField={setField} />}
      {s.type === "text" && (
        <NotesEditor
          rows={10}
          placeholder="Écris ici. Pas besoin que ce soit parfait — juste que ce soit posé."
          value={state.fields[k].body}
          onChange={(v) => setField(k, "body", v)}
        />
      )}
      {s.type === "finances" && (
        <FinanceModule
          fin={state.finance}
          setFinance={setFinance}
          notes={state.fields[k].body}
          setNotes={(v) => setField(k, "body", v)}
        />
      )}
      {s.type === "team" && (
        <>
          <FieldStack k={k} s={s} vals={state.fields[k]} setField={setField} />
          <CapTable rows={state.captable} setRows={setCap} />
        </>
      )}
      {s.type === "levee" && (
        <>
          <FieldStack k={k} s={s} vals={state.fields[k]} setField={setField} />
          <CrmTable rows={state.crm} setRows={setCrm} />
        </>
      )}
      {s.type === "roadmap" && <RoadmapModule phases={state.roadmap || []} setRoadmap={setRoadmap} />}
      {s.type === "concurrents" && (
        <CompetitorsModule
          data={state.competitors || { cols: [], rows: [], edge: "" }}
          setData={setCompetitors}
          notes={state.fields[k].body || ""}
          setNotes={(v) => setField(k, "body", v)}
        />
      )}
      {s.type === "hypotheses" && <HypothesesModule items={state.hypotheses || []} setItems={setHypotheses} />}
      {s.type === "bmc" && <BMCModule bmc={state.bmc || {}} setBmc={setBmc} />}
      {s.type === "pricing" && <PricingModule pricing={state.pricing || { tiers: [] }} setPricing={setPricing} />}
      {s.type === "produit" && <ProduitModule data={state.produit || {}} setData={setProduit} />}
      {s.type === "segper" && <SegperModule data={state.segper || {}} setData={setSegper} />}
      {s.type === "tech" && <TechModule data={state.tech || {}} setData={setTech} />}

      <MiniJournal sectionKey={k} entries={entries} addJournal={addJournal} delJournal={delJournal} />
    </div>
  );
}

function FieldGrid({ k, s, vals, setField }) {
  return (
    <div className="fieldgrid">
      {s.fields.map(([fk, label, hint]) => (
        <div className="field" key={fk}>
          <label>{label}</label>
          <NotesEditor rows={3} placeholder={hint} value={vals[fk]} onChange={(v) => setField(k, fk, v)} />
        </div>
      ))}
    </div>
  );
}

function FieldStack({ k, s, vals, setField }) {
  return (
    <div className="fieldstack">
      {s.fields.map(([fk, label, hint]) => (
        <div className="field" key={fk}>
          <label>{label}</label>
          <NotesEditor rows={3} placeholder={hint} value={vals[fk]} onChange={(v) => setField(k, fk, v)} />
        </div>
      ))}
    </div>
  );
}

/* ---------------- Finance module ---------------- */
function FinanceModule({ fin, setFinance, notes, setNotes }) {
  const months = fin.months;
  const capital = num(fin.capital);

  let running = capital;
  let cumProfit = 0;
  let beLabel = null;
  const data = months.map((m) => {
    const r = num(m.revenue);
    const e = num(m.expense);
    running += r - e;
    cumProfit += r - e;
    if (beLabel === null && (r || e) && cumProfit >= 0) beLabel = m.label;
    return { name: m.label || "—", revenue: r, expense: e, cash: Math.round(running) };
  });

  const totalRev = months.reduce((a, m) => a + num(m.revenue), 0);
  const totalExp = months.reduce((a, m) => a + num(m.expense), 0);
  const net = totalRev - totalExp;
  const hasData = totalRev > 0 || totalExp > 0 || capital > 0;

  const upd = (i, key, v) => setFinance({ ...fin, months: months.map((m, idx) => (idx === i ? { ...m, [key]: v } : m)) });
  const addMonth = () => {
    const last = months[months.length - 1];
    setFinance({ ...fin, months: [...months, { label: last ? last.label + " +" : "Mois", revenue: "", expense: "" }] });
  };
  const delMonth = (i) => setFinance({ ...fin, months: months.filter((_, idx) => idx !== i) });

  return (
    <div className="finance">
      <div className="statcards">
        <StatCard label="Capital / apports" value={eur(capital)} tone="capital" />
        <StatCard label="Revenus totaux" value={eur(totalRev)} tone="rev" />
        <StatCard label="Dépenses totales" value={eur(totalExp)} tone="exp" />
        <StatCard label="Résultat net" value={eur(net)} tone={net >= 0 ? "pos" : "neg"} />
      </div>

      <div className="block chartblock">
        <div className="blockhead">
          <h3>Trésorerie & rentabilité</h3>
          {beLabel && <span className="betag">Break-even : {beLabel}</span>}
        </div>
        {hasData ? (
          <div className="chartwrap">
            <ResponsiveContainer width="100%" height={280}>
              <ComposedChart data={data} margin={{ top: 10, right: 8, left: 0, bottom: 0 }}>
                <CartesianGrid stroke="#e9dcc4" vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize: 11, fill: "#5c4351" }} tickLine={false} axisLine={{ stroke: "#e3d3bb" }} />
                <YAxis tick={{ fontSize: 11, fill: "#5c4351" }} tickLine={false} axisLine={false} width={54} tickFormatter={(v) => eur(v)} />
                <Tooltip formatter={(v, n) => [eur(v), n === "revenue" ? "Revenus" : n === "expense" ? "Dépenses" : "Trésorerie"]} contentStyle={{ borderRadius: 10, border: "1px solid #e3d3bb", fontSize: 12 }} />
                {beLabel && <ReferenceLine x={beLabel} stroke={CHART.be} strokeDasharray="4 3" label={{ value: "Break-even", fill: CHART.be, fontSize: 11, position: "top" }} />}
                <Bar dataKey="revenue" name="revenue" fill={CHART.revenue} radius={[3, 3, 0, 0]} maxBarSize={22} />
                <Bar dataKey="expense" name="expense" fill={CHART.expense} radius={[3, 3, 0, 0]} maxBarSize={22} />
                <Line type="monotone" dataKey="cash" name="cash" stroke={CHART.cash} strokeWidth={2.4} dot={{ r: 2.5 }} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        ) : (
          <p className="empty">Remplis le tableau ci-dessous et le graphe s’anime tout seul.</p>
        )}
      </div>

      <div className="block">
        <div className="blockhead">
          <h3>Hypothèses mensuelles</h3>
        </div>
        <div className="field short capfield">
          <label htmlFor="fin-capital">Capital initial / apports</label>
          <input id="fin-capital" inputMode="decimal" placeholder="€" value={fin.capital} onChange={(e) => setFinance({ ...fin, capital: e.target.value })} />
        </div>
        <div className="montable">
          <div className="mrow head">
            <span>Mois</span>
            <span>Revenus</span>
            <span>Dépenses</span>
            <span>Net</span>
            <span />
          </div>
          {months.map((m, i) => {
            const netM = num(m.revenue) - num(m.expense);
            return (
              <div className="mrow" key={i}>
                <input className="mlabel" value={m.label} onChange={(e) => upd(i, "label", e.target.value)} />
                <input inputMode="decimal" placeholder="0" value={m.revenue} onChange={(e) => upd(i, "revenue", e.target.value)} />
                <input inputMode="decimal" placeholder="0" value={m.expense} onChange={(e) => upd(i, "expense", e.target.value)} />
                <span className={"mnet " + (netM >= 0 ? "pos" : "neg")}>{eur(netM)}</span>
                <button className="del" onClick={() => delMonth(i)} aria-label="Supprimer le mois">×</button>
              </div>
            );
          })}

        <button className="addrow" onClick={addMonth}>+ Ajouter un mois</button>

      </div>
    </div>
  );

/* ---------------- Roadmap ---------------- */
function RoadmapModule({ phases, setRoadmap }) {
  const [edit, setEdit] = useState(false);
  const [open, setOpen] = useState({}); // featureId -> bool
  const [sel, setSel] = useState("all"); // "all" | phaseId

  const totalF = phases.reduce((a, p) => a + p.features.length, 0);
  const doneF = phases.reduce((a, p) => a + p.features.filter((f) => f.done).length, 0);

  const patchPhase = (pid, patch) => setRoadmap(phases.map((p) => (p.id === pid ? { ...p, ...patch } : p)));
  const patchFeature = (pid, fid, patch) =>
    setRoadmap(
      phases.map((p) =>
        p.id === pid ? { ...p, features: p.features.map((f) => (f.id === fid ? { ...f, ...patch } : f)) } : p
      )
    );
  const addFeature = (pid) =>
    setRoadmap(
      phases.map((p) =>
        p.id === pid ? { ...p, features: [...p.features, { id: rid("ft"), name: "Nouvelle feature", desc: "", seg: null, done: false }] } : p
      )
    );
  const delFeature = (pid, fid) =>
    setRoadmap(phases.map((p) => (p.id === pid ? { ...p, features: p.features.filter((f) => f.id !== fid) } : p)));
  const addPhase = () =>
    setRoadmap([...phases, { id: rid("ph"), tag: "Phase " + (phases.length + 1), title: "Nouvelle phase", subtitle: "", timeframe: "", features: [] }]);
  const delPhase = (pid) => {
    if (sel === pid) setSel("all");
    setRoadmap(phases.filter((p) => p.id !== pid));
  };
  const toggleOpen = (fid) => setOpen((o) => ({ ...o, [fid]: !o[fid] }));

  const shown = sel === "all" ? phases : phases.filter((p) => p.id === sel);
  const usedSegs = Array.from(new Set(phases.flatMap((p) => p.features.map((f) => f.seg).filter(Boolean))));

  return (
    <div className="roadmap">
      <div className="rmbar">
        <span className="rmcount">
          {doneF}/{totalF} features · {phases.length} phases
        </span>
        <button className={"rmedit" + (edit ? " on" : "")} onClick={() => setEdit((e) => !e)}>
          {edit ? "Terminé" : "Éditer"}
        </button>
      </div>

      {/* Timeline chronologique */}
      <div className="rmtimeline">
        <button className={"tlall" + (sel === "all" ? " on" : "")} onClick={() => setSel("all")}>
          Toutes
        </button>
        <div className="tlaxis">
          {phases.map((p) => {
            const pd = p.features.length && p.features.every((f) => f.done);
            return (
              <button key={p.id} className={"tlnode" + (sel === p.id ? " on" : "") + (pd ? " done" : "")} onClick={() => setSel(p.id)}>
                <span className="tldot" />
                <span className="tltag">{p.tag}</span>
                {p.timeframe && <span className="tltime">{p.timeframe}</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Légende segments */}
      {usedSegs.length > 0 && (
        <div className="seglegend">
          {usedSegs.map((k) => {
            const seg = SEGMENTS[k];
            if (!seg) return null;
            return (
              <span key={k} className="segchip" style={{ color: seg.color, borderColor: seg.color + "55", background: seg.color + "14" }}>
                {seg.name}
              </span>
            );
          })}
        </div>
      )}

      {shown.map((p) => {
        const pi = phases.indexOf(p);
        const pDone = p.features.length && p.features.every((f) => f.done);
        return (
          <div className={"phase" + (pDone ? " complete" : "")} key={p.id}>
            <div className="phasehead">
              <span className="phasenum">{pi + 1}</span>
              {edit ? (
                <div className="phaseedit">
                  <input className="ptag" value={p.tag} placeholder="Phase" onChange={(e) => patchPhase(p.id, { tag: e.target.value })} />
                  <input className="ptitle" value={p.title} placeholder="Titre" onChange={(e) => patchPhase(p.id, { title: e.target.value })} />
                  <input className="psub" value={p.subtitle} placeholder="Sous-titre" onChange={(e) => patchPhase(p.id, { subtitle: e.target.value })} />
                  <input className="ptime" value={p.timeframe} placeholder="Horizon (ex. 3–6 mois)" onChange={(e) => patchPhase(p.id, { timeframe: e.target.value })} />
                  <button className="del phasedel" onClick={() => delPhase(p.id)} aria-label="Supprimer la phase">×</button>
                </div>
              ) : (
                <div className="phaseinfo">
                  <div className="phasetop">
                    <span className="ptagchip">{p.tag}</span>
                    <h3>{p.title}</h3>
                    {p.timeframe && <span className="ptimechip">{p.timeframe}</span>}
                  </div>
                  {p.subtitle && <p className="psubtxt">{p.subtitle}</p>}
                  <div className="phasebar">
                    <div
                      className="phasefill"
                      style={{ width: (p.features.length ? (p.features.filter((f) => f.done).length / p.features.length) * 100 : 0) + "%" }}
                    />
                  </div>
                </div>
              )}
            </div>

            <ul className="features">
              {p.features.map((f) => {
                const seg = f.seg ? SEGMENTS[f.seg] : null;
                return (
                  <li className={"feature" + (f.done ? " done" : "") + (open[f.id] ? " open" : "")} key={f.id}>
                    <div className="featurerow">
                      <button
                        className={"donedot" + (f.done ? " on" : "")}
                        onClick={() => patchFeature(p.id, f.id, { done: !f.done })}
                        aria-label={f.done ? "Marquer non fait" : "Marquer fait"}
                        title={f.done ? "Fait" : "À faire"}
                      >
                        {f.done ? "✓" : ""}
                      </button>
                      {edit ? (
                        <input className="fname" value={f.name} onChange={(e) => patchFeature(p.id, f.id, { name: e.target.value })} />
                      ) : (
                        <button className="fname btn" onClick={() => toggleOpen(f.id)}>
                          <span className="fnametext">{f.name}</span>
                          {seg && (
                            <span className="segchip mini" style={{ color: seg.color, borderColor: seg.color + "55", background: seg.color + "14" }}>
                              {seg.name}
                            </span>
                          )}
                          <span className="chev">{open[f.id] ? "−" : "+"}</span>
                        </button>
                      )}
                      {edit && (
                        <button className="del" onClick={() => delFeature(p.id, f.id)} aria-label="Supprimer la feature">×</button>
                      )}
                    </div>
                    {edit ? (
                      <div className="feditrow">
                        <select className="segselect" value={f.seg || ""} onChange={(e) => patchFeature(p.id, f.id, { seg: e.target.value || null })}>
                          <option value="">Sans segment</option>
                          {Object.entries(SEGMENTS).map(([kk, v]) => (
                            <option key={kk} value={kk}>{v.name}</option>
                          ))}
                        </select>
                        <textarea
                          className="fdesc-edit"
                          rows={2}
                          placeholder="Description de la feature…"
                          value={f.desc}
                          onChange={(e) => patchFeature(p.id, f.id, { desc: e.target.value })}
                        />
                      </div>
                    ) : (
                      open[f.id] && <p className="fdesc">{f.desc || "Pas encore de description."}</p>
                    )}
                  </li>
                );
              })}
            </ul>

            {edit && (
              <button className="addrow" onClick={() => addFeature(p.id)}>
                + Ajouter une feature
              </button>
            )}
          </div>
        );
      })}

      {edit && (
        <button className="addphase" onClick={addPhase}>
          + Ajouter une phase
        </button>
      )}
    </div>
  );
}

/* ---------------- Competitors ---------------- */
function CompetitorsModule({ data, setData, notes, setNotes }) {
  const [edit, setEdit] = useState(false);
  const cols = data.cols || [];
  const rows = data.rows || [];

  const setCol = (ci, v) => setData({ ...data, cols: cols.map((c, i) => (i === ci ? v : c)) });
  const setCell = (ri, ci, v) =>
    setData({ ...data, rows: rows.map((r, i) => (i === ri ? { ...r, cells: r.cells.map((c, j) => (j === ci ? v : c)) } : r)) });
  const setCrit = (ri, v) => setData({ ...data, rows: rows.map((r, i) => (i === ri ? { ...r, crit: v } : r)) });
  const addCol = () =>
    setData({ ...data, cols: [...cols, "Concurrent"], rows: rows.map((r) => ({ ...r, cells: [...r.cells, ""] })) });
  const delCol = (ci) =>
    setData({ ...data, cols: cols.filter((_, i) => i !== ci), rows: rows.map((r) => ({ ...r, cells: r.cells.filter((_, j) => j !== ci) })) });
  const addRow = () => setData({ ...data, rows: [...rows, { crit: "Nouveau critère", cells: cols.map(() => "") }] });
  const delRow = (ri) => setData({ ...data, rows: rows.filter((_, i) => i !== ri) });

  return (
    <div className="competitors">
      <div className="rmbar">
        <span className="rmcount">{cols.length} acteurs · {rows.length} critères</span>
        <button className={"rmedit" + (edit ? " on" : "")} onClick={() => setEdit((e) => !e)}>
          {edit ? "Terminé" : "Éditer"}
        </button>
      </div>

      <div className="cmpscroll">
        <table className="cmptable">
          <thead>
            <tr>
              <th className="critcol">Critère</th>
              {cols.map((c, ci) => (
                <th key={ci} className={ci === 0 ? "uscol" : ""}>
                  {edit ? (
                    <div className="thedit">
                      <input value={c} onChange={(e) => setCol(ci, e.target.value)} />
                      {cols.length > 1 && (
                        <button className="del" onClick={() => delCol(ci)} aria-label="Retirer ce concurrent">×</button>
                      )}
                    </div>
                  ) : (
                    <span>{c}</span>
                  )}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((r, ri) => (
              <tr key={ri}>
                <th scope="row" className="critcol">
                  {edit ? (
                    <div className="thedit">
                      <input value={r.crit} onChange={(e) => setCrit(ri, e.target.value)} />
                      <button className="del" onClick={() => delRow(ri)} aria-label="Retirer ce critère">×</button>
                    </div>
                  ) : (
                    r.crit
                  )}
                </th>
                {r.cells.map((cell, ci) => (
                  <td key={ci} className={ci === 0 ? "uscol" : ""}>
                    {edit ? (
                      <textarea rows={2} value={cell} onChange={(e) => setCell(ri, ci, e.target.value)} />
                    ) : (
                      <span className="cellval">{cell}</span>
                    )}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {edit && (
        <div className="cmpbtns">
          <button className="addrow" onClick={addRow}>+ Critère</button>
          <button className="addrow" onClick={addCol}>+ Concurrent</button>
        </div>
      )}

      <div className="edge">
        <span className="edgeicon">★</span>
        <div className="edgebody">
          <p className="edgelabel">Avantage différenciateur</p>
          {edit ? (
            <textarea rows={4} value={data.edge || ""} onChange={(e) => setData({ ...data, edge: e.target.value })} />
          ) : (
            <p className="edgetext">{data.edge}</p>
          )}
        </div>
      </div>

      <div className="block">
        <div className="blockhead"><h3>Notes concurrence</h3></div>
        <NotesEditor rows={3} placeholder="Veille, nouveaux entrants, angles à creuser…" value={notes} onChange={(v) => setNotes(v)} />
      </div>
    </div>
  );
}

/* ---------------- Hypotheses ---------------- */
function HypothesesModule({ items, setItems }) {
  const [filter, setFilter] = useState("all");

  const patch = (id, p) => setItems(items.map((h) => (h.id === id ? { ...h, ...p } : h)));
  const add = () =>
    setItems([
      ...items,
      { id: rid("hy"), open: true, claim: "", type: "probleme", status: "atester", importance: "high", certainty: "low", note: "", method: "", next: "" },
    ]);
  const del = (id) => setItems(items.filter((h) => h.id !== id));

  const counts = { valide: 0, encours: 0, atester: 0, infirme: 0 };
  items.forEach((h) => { if (counts[h.status] !== undefined) counts[h.status]++; });
  const shown = filter === "all" ? items : items.filter((h) => h.status === filter);

  return (
    <div className="hyp">
      <div className="amap">
        <div className="amaphead">
          <h3>Carte des assomptions</h3>
          <span className="amaphint">Chaque hypothèse se place selon son importance et ta certitude.</span>
        </div>
        <div className="amapwrap">
          <div className="amapy">Importance ↑</div>
          <div className="amapmain">
            <div className="amapgrid">
              {[
                { imp: "high", cert: "low", label: "À tester en priorité", sub: "risque élevé", prio: true },
                { imp: "high", cert: "high", label: "Solides", sub: "pas prioritaires" },
                { imp: "low", cert: "low", label: "Faible impact", sub: "plus tard" },
                { imp: "low", cert: "high", label: "Sûres", sub: "peu de risque" },
              ].map((q) => {
                const inCell = items.filter((h) => (h.importance || "high") === q.imp && (h.certainty || "low") === q.cert);
                return (
                  <div className={"amapcell" + (q.prio ? " prio" : "")} key={q.imp + q.cert}>
                    <div className="amapqlabel">{q.label} <span>· {q.sub}</span></div>
                    <div className="amapchips">
                      {inCell.length === 0 ? (
                        <span className="amapempty">—</span>
                      ) : (
                        inCell.map((h) => (
                          <button className="achip" key={h.id} title={h.claim} onClick={() => { setFilter("all"); patch(h.id, { open: true }); }}>
                            {h.claim ? (h.claim.length > 34 ? h.claim.slice(0, 34) + "…" : h.claim) : "Sans énoncé"}
                          </button>
                        ))
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="amapx">Certitude →</div>
          </div>
        </div>
      </div>

      <div className="rmbar">
        <span className="rmcount">
          {items.length} hypothèses · {counts.valide} validées · {counts.encours} en cours
        </span>
        <button className="addrow" onClick={add}>+ Hypothèse</button>
      </div>

      <div className="filterbar">
        <button className={filter === "all" ? "on" : ""} onClick={() => setFilter("all")}>Toutes</button>
        {Object.entries(HYP_STATUS).map(([k, v]) => (
          <button key={k} className={filter === k ? "on" : ""} onClick={() => setFilter(k)}>{v.name}</button>
        ))}
      </div>

      {shown.length === 0 && <p className="empty">Aucune hypothèse dans ce filtre.</p>}

      {shown.map((h) => {
        const typ = HYP_TYPE[h.type];
        const stt = HYP_STATUS[h.status];
        return (
          <div className="hcard" key={h.id} style={{ borderLeftColor: stt ? stt.color : "var(--stone)" }}>
            <div className="hhead">
              {stt && (
                <span className="hstat" style={{ color: stt.color, borderColor: stt.color + "55", background: stt.color + "14" }}>
                  {stt.name}
                </span>
              )}
              {typ && (
                <span className="htype" style={{ color: typ.color, borderColor: typ.color + "55", background: typ.color + "14" }}>
                  {typ.name}
                </span>
              )}
              <button className="hclaimbtn" onClick={() => patch(h.id, { open: !h.open })}>
                <span className="hclaimtext">{h.claim || "Nouvelle hypothèse — clique pour éditer"}</span>
                <span className="chev">{h.open ? "−" : "+"}</span>
              </button>
            </div>

            {h.open && (
              <div className="hbody">
                <div className="field">
                  <label>Énoncé — « Nous supposons que… »</label>
                  <textarea rows={2} value={h.claim} placeholder="Ex. Les clientes ont peur du résultat avant le RDV" onChange={(e) => patch(h.id, { claim: e.target.value })} />
                </div>
                <div className="hselrow">
                  <div className="field">
                    <label>Type</label>
                    <select value={h.type} onChange={(e) => patch(h.id, { type: e.target.value })}>
                      {Object.entries(HYP_TYPE).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Statut</label>
                    <select value={h.status} onChange={(e) => patch(h.id, { status: e.target.value })}>
                      {Object.entries(HYP_STATUS).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                    </select>
                  </div>
                </div>
                <div className="hselrow">
                  <div className="field">
                    <label>Importance</label>
                    <select value={h.importance || "high"} onChange={(e) => patch(h.id, { importance: e.target.value })}>
                      <option value="high">Élevée</option>
                      <option value="low">Faible</option>
                    </select>
                  </div>
                  <div className="field">
                    <label>Certitude</label>
                    <select value={h.certainty || "low"} onChange={(e) => patch(h.id, { certainty: e.target.value })}>
                      <option value="high">Élevée</option>
                      <option value="low">Faible</option>
                    </select>
                  </div>
                </div>
                <div className="field">
                  <label>Méthode de validation</label>
                  <textarea rows={2} value={h.method} placeholder="Discovery (interviews) · test produit · métriques…" onChange={(e) => patch(h.id, { method: e.target.value })} />
                </div>
                <div className="field">
                  <label>Note / ce qu’on sait déjà</label>
                  <textarea rows={2} value={h.note} placeholder="Signaux, données, retours terrain…" onChange={(e) => patch(h.id, { note: e.target.value })} />
                </div>
                <div className="field">
                  <label>Prochaine action</label>
                  <textarea rows={2} value={h.next} placeholder="La prochaine étape concrète pour creuser" onChange={(e) => patch(h.id, { next: e.target.value })} />
                </div>
                <button className="del hdel" onClick={() => del(h.id)} aria-label="Supprimer l’hypothèse">Supprimer</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function mdToHtml(src) {
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = (t) =>
    t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/_(.+?)_/g, "<em>$1</em>");
  const lines = esc(src || "").split("\n");
  let html = "", inList = false;
  for (const line of lines) {
    const h = line.match(/^(#{1,3})\s+(.*)$/);
    const bullet = line.match(/^\s*[-*]\s+(.*)$/);
    if (bullet) {
      if (!inList) { html += "<ul>"; inList = true; }
      html += "<li>" + inline(bullet[1]) + "</li>";
      continue;
    }
    if (inList) { html += "</ul>"; inList = false; }
    if (h) {
      const lvl = h[1].length + 1;
      html += "<h" + lvl + ">" + inline(h[2]) + "</h" + lvl + ">";
    } else if (line.trim() === "") {
      html += "";
    } else {
      html += "<p>" + inline(line) + "</p>";
    }
  }
  if (inList) html += "</ul>";
  return html || "<p class='nedempty'>Rien à afficher.</p>";
}

function NotesEditor({ value, onChange, rows = 5, placeholder }) {
  const [preview, setPreview] = useState(false);
  const ref = useRef(null);
  const val = value || "";
  const wrapInline = (before, after) => {
    const el = ref.current;
    if (!el) { onChange(val + before + after); return; }
    const s = el.selectionStart, e = el.selectionEnd;
    const sel = val.slice(s, e) || "texte";
    onChange(val.slice(0, s) + before + sel + after + val.slice(e));
  };
  const prefixLines = (pfx) => {
    const el = ref.current;
    const s = el ? el.selectionStart : val.length;
    const e = el ? el.selectionEnd : val.length;
    const lineStart = val.lastIndexOf("\n", s - 1) + 1;
    const seg = val.slice(lineStart, e) || "";
    const out = (seg || "").split("\n").map((l) => pfx + l).join("\n");
    onChange(val.slice(0, lineStart) + out + val.slice(e));
  };
  return (
    <div className="ned">
      <div className="nedbar">
        {!preview && (
          <>
            <button type="button" onClick={() => prefixLines("## ")} title="Titre">Titre</button>
            <button type="button" onClick={() => wrapInline("**", "**")} title="Gras"><b>G</b></button>
            <button type="button" onClick={() => prefixLines("- ")} title="Puce">• Puce</button>
          </>
        )}
        <span className="nedspacer" />
        <button type="button" className={"nedtab" + (preview ? "" : " on")} onClick={() => setPreview(false)}>Écrire</button>
        <button type="button" className={"nedtab" + (preview ? " on" : "")} onClick={() => setPreview(true)}>Aperçu</button>
      </div>
      {preview ? (
        <div className="nedpreview" dangerouslySetInnerHTML={{ __html: mdToHtml(val) }} />
      ) : (
        <textarea ref={ref} rows={rows} placeholder={placeholder} value={val} onChange={(e) => onChange(e.target.value)} />
      )}
    </div>
  );
}

function MeetingsView({ state, setMeetings }) {
  const meetings = state.meetings || [];
  const [openId, setOpenId] = useState(null);
  const [filterTheme, setFilterTheme] = useState(null);
  const [themeInput, setThemeInput] = useState("");

  const add = () => {
    const m = { id: Date.now(), ts: Date.now(), date: formatDateShort(Date.now()), title: "", notes: "", themes: [] };
    setMeetings([m, ...meetings]);
    setOpenId(m.id);
  };
  const upd = (id, p) => setMeetings(meetings.map((m) => (m.id === id ? { ...m, ...p } : m)));
  const del = (id) => { setMeetings(meetings.filter((m) => m.id !== id)); setOpenId(null); };

  const allThemes = Array.from(new Set(meetings.flatMap((m) => m.themes || []))).filter(Boolean);
  const current = meetings.find((m) => m.id === openId);

  if (current) {
    const themes = current.themes || [];
    const related = meetings.filter((m) => m.id !== current.id && (m.themes || []).some((t) => themes.includes(t)));
    const addTheme = () => {
      const t = themeInput.trim();
      if (!t || themes.includes(t)) { setThemeInput(""); return; }
      upd(current.id, { themes: [...themes, t] });
      setThemeInput("");
    };
    return (
      <div className="section">
        <div className="sechead">
          <div><button className="backbtn" onClick={() => setOpenId(null)}>← Toutes les pages</button></div>
          <button className="ghostdel" onClick={() => del(current.id)}>Supprimer</button>
        </div>
        <div className="pageedit">
          <input className="pagetitle" placeholder="Titre de la page (atelier, réunion…)" value={current.title} onChange={(e) => upd(current.id, { title: e.target.value })} />
          <input className="pagedate" placeholder="Date" value={current.date} onChange={(e) => upd(current.id, { date: e.target.value })} />
          <div className="themerow">
            <span className="perlbl">Thématiques</span>
            <div className="themechips">
              {themes.map((t) => (
                <span className="themechip" key={t}>{t}<button onClick={() => upd(current.id, { themes: themes.filter((x) => x !== t) })} aria-label="Retirer">×</button></span>
              ))}
              {themes.length === 0 && <span className="fmuted">aucune</span>}
            </div>
            <div className="themeadd">
              <input list="mtgthemes" placeholder="Ajouter un thème…" value={themeInput} onChange={(e) => setThemeInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addTheme(); }} />
              <button className="miniaction" onClick={addTheme}>Ajouter</button>
              <datalist id="mtgthemes">{allThemes.map((t) => <option key={t} value={t} />)}</datalist>
            </div>
          </div>
          <NotesEditor value={current.notes} onChange={(v) => upd(current.id, { notes: v })} rows={12} placeholder="Notes… (## Titre, **gras**, - puce)" />
          <div className="related">
            <span className="perlbl">Pages liées (mêmes thématiques)</span>
            {related.length === 0 ? (
              <p className="empty">Aucune page ne partage ces thématiques pour l'instant.</p>
            ) : (
              <ul className="relatedlist">
                {related.map((m) => (
                  <li key={m.id} onClick={() => setOpenId(m.id)}>
                    <span className="reltitle">{m.title || "Sans titre"}</span>
                    <span className="reldate">{m.date}</span>
                  </li>
                ))}
              </ul>
            )}
          </div>
        </div>
      </div>
    );
  }

  const list = filterTheme ? meetings.filter((m) => (m.themes || []).includes(filterTheme)) : meetings;
  return (
    <div className="section">
      <div className="sechead">
        <div>
          <h2>Réunions & ateliers</h2>
          <p className="ovhelp">Une page par atelier, reliées par thématiques.</p>
        </div>
        <button className="addbtn" onClick={add}>+ Nouvelle page</button>
      </div>
      {allThemes.length > 0 && (
        <div className="themefilter">
          <button className={"tfchip" + (filterTheme === null ? " on" : "")} onClick={() => setFilterTheme(null)}>Toutes</button>
          {allThemes.map((t) => (
            <button key={t} className={"tfchip" + (filterTheme === t ? " on" : "")} onClick={() => setFilterTheme(t)}>{t}</button>
          ))}
        </div>
      )}
      {list.length === 0 ? (
        <p className="empty">Aucune page. Clique « + Nouvelle page » pour ton prochain atelier.</p>
      ) : (
        <div className="pagelist">
          {list.map((m) => (
            <button className="pagerow" key={m.id} onClick={() => setOpenId(m.id)}>
              <span className="pagerowtitle">{m.title || "Sans titre"}</span>
              <span className="pagerowmeta">
                {(m.themes || []).map((t) => <span className="themechip sm" key={t}>{t}</span>)}
                <span className="pagerowdate">{m.date}</span>
              </span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function JournalView({ state, addJournal, delJournal }) {
  const [text, setText] = useState("");
  const [kind, setKind] = useState("note");
  const [sec, setSec] = useState("general");
  const [filter, setFilter] = useState("all");
  const submit = () => {
    if (!text.trim()) return;
    addJournal({ section: sec, kind, text: text.trim() });
    setText("");
  };
  const entries = filter === "all" ? state.journal : state.journal.filter((e) => e.section === filter);
  return (
    <div className="section journalview">
      <div className="sechead"><div><h2>Journal de bord</h2></div></div>
      <div className="guide"><span className="guideicon">✦</span><p>Toutes tes avancées, en une timeline. Marque un cap comme « jalon » quand il compte.</p></div>

      <div className="block">
        <div className="entryinput big">
          <div className="inputrow">
            <div className="kindtoggle">
              <button className={kind === "note" ? "on" : ""} onClick={() => setKind("note")}>Note</button>
              <button className={kind === "jalon" ? "on jalon" : "jalon"} onClick={() => setKind("jalon")}>Jalon</button>
            </div>
            <select value={sec} onChange={(e) => setSec(e.target.value)} className="secselect">
              <option value="general">Général</option>
              {ALL_KEYS.map((k) => <option key={k} value={k}>{SECTIONS[k].label}</option>)}
            </select>
          </div>
          <textarea rows={3} placeholder="Qu’est-ce qui a bougé aujourd’hui ?" value={text} onChange={(e) => setText(e.target.value)} />
          <button className="addbtn" onClick={submit}>Ajouter au journal</button>
        </div>
      </div>

      <div className="filterbar">
        <button className={filter === "all" ? "on" : ""} onClick={() => setFilter("all")}>Tout</button>
        <button className={filter === "general" ? "on" : ""} onClick={() => setFilter("general")}>Général</button>
        {ALL_KEYS.map((k) => <button key={k} className={filter === k ? "on" : ""} onClick={() => setFilter(k)}>{SECTIONS[k].label}</button>)}
      </div>

      <EntryList entries={entries} delJournal={delJournal} showSection={true} />
    </div>
  );
}

function EntryList({ entries, delJournal, showSection }) {
  if (!entries.length) return <p className="empty">Rien encore ici. La première entrée est toujours la plus dure — puis ça coule.</p>;
  const secLabel = (k) => (k === "general" ? "Général" : (SECTIONS[k] || {}).label || k);
  return (
    <ul className="entries">
      {entries.map((e) => (
        <li className={"entry " + (e.kind === "jalon" ? "isjalon" : "")} key={e.id}>
          <div className="entrymeta">
            <time>{formatDate(e.ts)}</time>
            {e.kind === "jalon" && <span className="jalonbadge">Jalon</span>}
            {showSection && <span className="secbadge">{secLabel(e.section)}</span>}
          </div>
          <p className="entrytext">{e.text}</p>
          <button className="del entrydel" onClick={() => delJournal(e.id)} aria-label="Supprimer">×</button>
        </li>
      ))}
    </ul>
  );
}

/* ---------------- helpers ---------------- */
function formatDate(ts) {
  try {
    return new Intl.DateTimeFormat("fr-FR", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" }).format(new Date(ts));
  } catch (e) {
    return new Date(ts).toLocaleString();
  }
}

function formatDateShort(ts) {
  try {
    return new Intl.DateTimeFormat("fr-FR", { day: "2-digit", month: "short", year: "numeric" }).format(new Date(ts));
  } catch (e) {
    return new Date(ts).toLocaleDateString();
  }
}

function buildMarkdown(state, pct) {
  let md = `# Crown On Me — Cockpit\n\n_Avancement : ${pct}%_\n\n`;
  ALL_KEYS.forEach((k) => {
    const s = SECTIONS[k];
    md += `## ${s.label} — ${isStarted(state, k) ? "Entamée" : "À remplir"}\n\n`;
    const v = state.fields[k];
    if (s.type === "text" || s.type === "finances") {
      if (v.body && v.body.trim()) md += `${v.body.trim()}\n\n`;
    } else if (s.fields) {
      s.fields.forEach(([fk, label]) => {
        if (v[fk] && v[fk].trim()) md += `**${label}**\n${v[fk].trim()}\n\n`;
      });
    }
    if (k === "finances") {
      const cap = num(state.finance.capital);
      const tr = state.finance.months.reduce((a, m) => a + num(m.revenue), 0);
      const te = state.finance.months.reduce((a, m) => a + num(m.expense), 0);
      md += `Capital : ${eur(cap)} · Revenus : ${eur(tr)} · Dépenses : ${eur(te)} · Net : ${eur(tr - te)}\n\n`;
    }
    if (k === "equipe") {
      const rows = state.captable.filter((r) => r.holder || r.share);
      if (rows.length) { md += `**Cap table**\n`; rows.forEach((r) => (md += `- ${r.holder || "?"} : ${r.share || "?"}%\n`)); md += `\n`; }
    }
    if (k === "levee") {
      const rows = state.crm.filter((r) => r.name);
      if (rows.length) { md += `**Pipeline**\n`; rows.forEach((r) => (md += `- ${r.name} (${r.type || "—"}) · ${r.status} · ${r.next || "—"}\n`)); md += `\n`; }
    }
    if (k === "roadmap" && state.roadmap) {
      state.roadmap.forEach((p) => {
        md += `### ${p.tag} — ${p.title}${p.timeframe ? " (" + p.timeframe + ")" : ""}\n`;
        if (p.subtitle) md += `_${p.subtitle}_\n`;
        p.features.forEach((f) => (md += `- ${f.done ? "[x]" : "[ ]"} ${f.name}${f.seg && SEGMENTS[f.seg] ? " [" + SEGMENTS[f.seg].name + "]" : ""}${f.desc ? " — " + f.desc : ""}\n`));
        md += `\n`;
      });
    }
    if (k === "concurrents" && state.competitors) {
      const c = state.competitors;
      if (c.cols && c.cols.length) {
        md += `| Critère | ${c.cols.join(" | ")} |\n`;
        md += `| --- ${c.cols.map(() => "| ---").join(" ")} |\n`;
        (c.rows || []).forEach((r) => {
          md += `| ${r.crit} | ${r.cells.map((x) => (x || "").replace(/\n/g, " ")).join(" | ")} |\n`;
        });
        md += `\n`;
      }
      if (c.edge) md += `**Avantage différenciateur** — ${c.edge}\n\n`;
      const nb = state.fields.concurrents && state.fields.concurrents.body;
      if (nb && nb.trim()) md += `${nb.trim()}\n\n`;
    }
    if (k === "canvas" && state.bmc) {
      BMC_BLOCKS.forEach((b) => {
        const v = state.bmc[b.key];
        if (v && v.trim()) md += `**${b.title}**\n${v.trim()}\n\n`;
      });
    }
    if (k === "produit" && state.produit) {
      const pr = state.produit;
      if (pr.intro) md += `${pr.intro}\n\n`;
      if (Array.isArray(pr.briques) && pr.briques.length) {
        md += `**Briques produit**\n`;
        pr.briques.forEach((b) => (md += `- ${b.icon} ${b.title} — ${b.desc}\n`));
        md += `\n`;
      }
      if (Array.isArray(pr.parcours) && pr.parcours.length) {
        md += `**Parcours utilisateur**\n`;
        pr.parcours.forEach((s, i) => (md += `${i + 1}. ${s.icon} ${s.title}${s.badge ? " [" + s.badge + "]" : ""} — ${s.desc}\n`));
        md += `\n`;
      }
      if (Array.isArray(pr.stack) && pr.stack.filter(Boolean).length) md += `**Stack** : ${pr.stack.filter(Boolean).join(" · ")}\n\n`;
      if (pr.notes && pr.notes.trim()) md += `${pr.notes.trim()}\n\n`;
    }
    if (k === "tarification" && state.pricing && Array.isArray(state.pricing.tiers)) {
      state.pricing.tiers.forEach((t) => {
        md += `### ${t.name}${t.cible ? " — " + t.cible : ""} · ${t.price}${t.period ? " " + t.period : ""}${t.featured && t.tag ? " (" + t.tag + ")" : ""}\n`;
        (t.features || []).filter(Boolean).forEach((f) => (md += `- ${f}\n`));
        md += `\n`;
      });
    }
    if (k === "segments" && state.segper) {
      const sp = state.segper;
      const sg = (sp.segments || []).filter((s) => s.name);
      if (sg.length) { md += `**Segments**\n`; sg.forEach((s) => (md += `- ${s.name} (${s.type})${s.desc ? " — " + s.desc : ""}\n`)); md += `\n`; }
      const pe = (sp.personas || []).filter((p) => p.name);
      if (pe.length) {
        md += `**Personas**\n`;
        pe.forEach((p) => {
          md += `- ${p.name}${p.tagline ? " · " + p.tagline : ""} (${p.type})\n`;
          if (p.context) md += `  - Contexte : ${p.context}\n`;
          if (p.goals) md += `  - Objectifs : ${p.goals}\n`;
          if (p.pains) md += `  - Frustrations : ${p.pains}\n`;
          if (p.quote) md += `  - « ${p.quote} »\n`;
        });
        md += `\n`;
      }
    }
    if (k === "tech" && state.tech) {
      const tc = state.tech;
      if (tc.stack && tc.stack.trim()) md += `**Architecture & stack**\n${tc.stack.trim()}\n\n`;
      const sv = (tc.services || []).filter((s) => s.name);
      if (sv.length) { md += `**Intégrations & services**\n`; sv.forEach((s) => (md += `- ${s.name}${s.role ? " (" + s.role + ")" : ""} · ${s.status}\n`)); md += `\n`; }
      const dc = (tc.decisions || []).filter((d) => d.decision);
      if (dc.length) { md += `**Décisions techniques**\n`; dc.forEach((d) => (md += `- ${d.decision}${d.why ? " — " + d.why : ""}${d.date ? " (" + d.date + ")" : ""}\n`)); md += `\n`; }
      const ch = (tc.chantiers || []).filter((c) => c.label);
      if (ch.length) { md += `**Chantiers & dette technique**\n`; ch.forEach((c) => (md += `- [${c.status}] ${c.label}\n`)); md += `\n`; }
    }
    if (k === "hypotheses" && Array.isArray(state.hypotheses)) {
      state.hypotheses.forEach((h) => {
        const t = HYP_TYPE[h.type] ? HYP_TYPE[h.type].name : "";
        const st = HYP_STATUS[h.status] ? HYP_STATUS[h.status].name : "";
        md += `- **${h.claim || "(sans énoncé)"}** [${t} · ${st}]\n`;
        if (h.method) md += `  - Méthode : ${h.method}\n`;
        if (h.note) md += `  - Note : ${h.note}\n`;
        if (h.next) md += `  - Prochaine action : ${h.next}\n`;
        md += `  - Importance : ${(h.importance || "high") === "high" ? "Élevée" : "Faible"} · Certitude : ${(h.certainty || "low") === "high" ? "Élevée" : "Faible"}\n`;
      });
      md += `\n`;
    }
  });
  if (state.journal.length) {
    md += `## Journal\n\n`;
    state.journal.forEach((e) => {
      const secL = e.section === "general" ? "Général" : (SECTIONS[e.section] || {}).label || e.section;
      md += `- [${formatDate(e.ts)}]${e.kind === "jalon" ? " **JALON**" : ""} (${secL}) ${e.text}\n`;
    });
    md += `\n`;
  }
  if (state.meetings && state.meetings.length) {
    md += `## Réunions & ateliers\n\n`;
    state.meetings.forEach((m) => {
      md += `### ${m.title || "Sans titre"}${m.date ? " — " + m.date : ""}\n`;
      if (m.themes && m.themes.length) md += `_Thématiques : ${m.themes.join(", ")}_\n`;
      md += `\n`;
      if (m.notes) md += `${m.notes}\n\n`;
    });
  }
  if (state.interviews && state.interviews.length) {
    const SL = { todo: "À planifier", planned: "Planifiée", done: "Faite" };
    md += `## Interviews\n\n`;
    state.interviews.forEach((m) => {
      md += `### ${m.person || "Sans nom"}${m.date ? " — " + m.date : ""}\n`;
      md += `- Statut : ${SL[m.status] || m.status}${m.segment ? " · Segment : " + m.segment : ""}\n`;
      if (m.learnings) md += `- Apprentissages : ${m.learnings}\n`;
      if (m.verbatim) md += `- « ${m.verbatim} »\n`;
      md += `\n`;
    });
  }
  if (state.todos && state.todos.length) {
    md += `## Ma to-do\n\n`;
    state.todos.forEach((t) => {
      md += `- [${t.done ? "x" : " "}] ${t.text}\n`;
    });
    md += `\n`;
  }
  return md;
}
